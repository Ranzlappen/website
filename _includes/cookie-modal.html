<!--
CHANGE: Add cookie viewer modal component
REASON: Display formatted overview of all cookies set for the domain
DATE: 2026-04-02
-->
<div class="cookie-overlay" id="cookie-overlay" role="dialog" aria-modal="true" aria-label="Browser Storage Viewer">
  <div class="cookie-box">
    <div class="cookie-header">
      <h3 class="cookie-title">🍪 Browser Storage</h3>
      <button class="cookie-close" id="cookie-close" aria-label="Close cookie viewer">&times;</button>
    </div>
    <div class="cookie-body" id="cookie-body">
      <p class="cookie-empty">No cookies found for this domain.</p>
    </div>
    <div class="cookie-actions">
      <button class="cookie-refresh-btn" id="cookie-refresh" type="button">
        🔄 Refresh App Code
      </button>
      <span class="cookie-refresh-feedback" id="cookie-refresh-feedback" role="status" aria-live="polite"></span>
      <p class="cookie-refresh-note">Clears the service worker &amp; cached HTML / CSS / JS, then reloads with fresh code. Your settings and stored data are kept.</p>
    </div>
    <div class="search-hint">Press <kbd>Esc</kbd> to close</div>
  </div>
</div>

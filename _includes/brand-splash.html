<!-- Brand splash / onboarding loader.
     Shown once per browser session (gated in head.html's pre-paint bootstrap via
     <html data-splash="show">). Hidden by default so a no-JS / repeat-visit load
     never paints it. Honors prefers-reduced-motion by swapping the animation for
     a static poster and skipping the fade. -->
<div class="brand-splash" id="brand-splash" role="status" aria-live="polite">
  <video class="brand-splash__media brand-splash__media--anim"
         src="{{ '/assets/images/loader/brand-loader.mp4' | relative_url }}"
         poster="{{ '/assets/images/loader/brand-loader-poster.webp' | relative_url }}"
         width="600" height="600"
         autoplay muted playsinline preload="auto" aria-hidden="true"></video>
  <img class="brand-splash__media brand-splash__media--static"
       src="{{ '/assets/images/loader/brand-loader-poster.webp' | relative_url }}"
       alt="" width="600" height="600" decoding="async">
  <span class="brand-splash__sr">Loading…</span>
</div>
<script>
  (function () {
    var root = document.documentElement;
    if (root.getAttribute('data-splash') !== 'show') return;
    var el = document.getElementById('brand-splash');
    // Mark shown immediately so navigating away mid-splash still counts as "once".
    try { sessionStorage.setItem('brandSplashShown', '1'); } catch (e) {}

    var video = el.querySelector('.brand-splash__media--anim');
    var reduceMotion = false;
    try {
      reduceMotion = window.matchMedia &&
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    } catch (e) {}

    // Reduced motion: the CSS already swaps the <video> for the static poster, so
    // pause the (hidden) clip too rather than let it decode/play behind the scenes.
    if (reduceMotion && video && video.pause) {
      video.removeAttribute('autoplay');
      video.pause();
    }

    var MIN_MS = 900;            // minimum on-screen time so it doesn't just flash
    var MAX_MS = 9000;           // hard cap so the splash can never get stuck
    var FADE_AT = 0.75;          // begin the fade at 75% of the clip so the 25%
                                 // overlay fade ends right as the clip does
    var start = Date.now();
    var done = false;

    // The splash fades on TWO gates: the page has finished loading AND the clip
    // has reached its last quarter. The overlay's own opacity fade (CSS, ~0.375s
    // = the clip's last 25%) takes the emblem AND the dark backdrop out together,
    // revealing the page beneath. Whichever gate is last wins; a hard cap backstops.
    var pageLoaded = false;
    var animReady = false;

    function fade() {
      if (done) return;
      done = true;
      var wait = Math.max(0, MIN_MS - (Date.now() - start));
      setTimeout(function () {
        var finish = function () {
          root.removeAttribute('data-splash');
          if (el && el.parentNode) el.parentNode.removeChild(el);
        };
        el.classList.add('is-hiding');
        el.addEventListener('transitionend', finish, { once: true });
        setTimeout(finish, 600); // fallback if transitionend never fires
      }, wait);
    }

    function maybeDismiss() {
      if (pageLoaded && animReady) fade();
    }

    // Gate 1: page load.
    if (document.readyState === 'complete') pageLoaded = true;
    else window.addEventListener('load', function () { pageLoaded = true; maybeDismiss(); }, { once: true });

    // Gate 2: clip reaches its last 25%. Reduced-motion (or a missing/failed
    // video) satisfies it immediately so we fall back to the load + MIN_MS floor.
    if (reduceMotion || !video) {
      animReady = true;
    } else {
      var markReady = function () { animReady = true; maybeDismiss(); };
      video.loop = false; // play exactly once
      var onTime = function () {
        if (video.duration && video.currentTime >= video.duration * FADE_AT) {
          video.removeEventListener('timeupdate', onTime);
          markReady();
        }
      };
      video.addEventListener('timeupdate', onTime);
      video.addEventListener('ended', markReady, { once: true }); // fallback
      video.addEventListener('error', markReady, { once: true });
    }

    // Backstop: never let the overlay outlive MAX_MS even if a gate never fires.
    setTimeout(function () { pageLoaded = true; animDone = true; maybeDismiss(); }, MAX_MS);

    maybeDismiss();
  })();
</script>

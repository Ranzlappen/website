<a class="skip-link" href="#main-content">Skip to content</a>

<header class="site-header site-header--transparent" id="site-header" role="banner">
  <div class="header-inner">
    <!-- Logo -->
    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="{{ site.title }} — Home">
      <span class="logo-mark">R</span>
      <span>{{ site.title }}</span>
    </a>

    <!-- Desktop Nav -->
    <nav class="nav-desktop" aria-label="Main navigation">
      {% for link in site.data.navigation.main %}
        <a href="{{ link.url | relative_url }}"
           {% if page.url == link.url %}class="active" aria-current="page"{% endif %}>
          {{ link.title }}
        </a>
      {% endfor %}
    </nav>

    <!-- Actions -->
    <div class="nav-actions">
      <!-- Search -->
      <button class="search-toggle" id="search-toggle" aria-label="Search" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>

      <!-- Theme Toggle -->
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode" type="button">
        <!-- Sun (shown in dark mode) -->
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <!-- Moon (shown in light mode) -->
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

      <!-- Mobile Hamburger -->
      <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle menu" aria-expanded="false" type="button">
        <span class="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
    </div>
  </div>

  <!-- Mobile Nav -->
  <nav class="nav-mobile" id="mobile-nav" aria-label="Mobile navigation">
    {% for link in site.data.navigation.main %}
      <a href="{{ link.url | relative_url }}"
         {% if page.url == link.url %}class="active" aria-current="page"{% endif %}>
        {{ link.title }}
      </a>
    {% endfor %}
  </nav>
</header>

      <stop offset="0" stop-color="#142142" />
      <stop offset="1" stop-color="#0a1020" />
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b8cff" />
      <stop offset="1" stop-color="#3a63d8" />

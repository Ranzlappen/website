<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Tabletop — Game Engine</title>
    <meta name="description" content="Tabletop: a browser game engine for card and board games." />
    <link rel="icon" type="image/svg+xml" href="/games/favicon.svg" />
    <link rel="manifest" href="/games/manifest.webmanifest" />
    <meta name="theme-color" content="#0b1020" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tabletop" />
    <script>
      // SPA deep-link recovery: 404.html on GitHub Pages stashes the path so a
      // refresh on /games/play/... lands back on the right route.
      (function () {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          history.replaceState(null, '', redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

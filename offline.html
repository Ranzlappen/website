<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Offline · RanzLappen</title>
    <link rel="icon" href="/icons/favicon.ico" sizes="any" />
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; }
      body {
        display: grid;
        place-items: center;
        background: #0f1714;
        color: #e7efe9;
        font: 16px/1.6 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        text-align: center;
        padding: 2rem;
      }
      .card { max-width: 28rem; }
      img { width: 96px; height: 96px; margin-bottom: 1.25rem; }
      h1 { font-size: 1.5rem; margin: 0 0 .5rem; }
      p { color: #9fb3a8; margin: 0 0 1.5rem; }
      button {
        font: inherit;
        color: #0f1714;
        background: #4ade80;
        border: 0;
        border-radius: .5rem;
        padding: .6rem 1.2rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/icons/icon-192.png" alt="RanzLappen" />
      <h1>You're offline</h1>
      <p>This page isn't cached yet. Check your connection and try again — pages you've already visited will still work offline.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>

# ──────────────────────────────────────────────────────────────
# Freelance project request tool — option datasets
#
# Consumed by pages/freelance.html (Liquid renders every chip /
# radio card from these lists, so adding an option here is all it
# takes — no HTML or JS edits). Values are slugified into input
# ids; labels are what the visitor sees and what lands in the
# submitted request summary.
# ──────────────────────────────────────────────────────────────

# Why AI-assisted development is a feature, not a footnote (intro cards).
ai_pros:
  - title: "Speed"
    icon: "bolt"
    text: "Working prototypes in days, not weeks. AI handles the boilerplate so the schedule is spent on your actual problem."
  - title: "Value"
    icon: "coins"
    text: "You pay for outcomes, not typing time. The same budget buys more features, more polish, or a lower quote."
  - title: "Quality"
    icon: "shield"
    text: "Time saved on scaffolding goes into review, tests and edge cases. Every line is read, understood and tested before it ships."
  - title: "Transparency"
    icon: "eye"
    text: "You choose how much AI is involved, and you'll always know where it was used. No fine print, no surprises."

# How the process works (steps strip).
steps:
  - title: "Configure"
    text: "Pick project type, stack, features and how you'd like AI involved."
  - title: "Name your price"
    text: "Attach a budget or rate — or leave it open and ask for a proposal."
  - title: "Get a real reply"
    text: "Every request is answered personally, usually within 3 business days."
  - title: "Kickoff"
    text: "We refine scope together. Nothing is billed until we both agree in writing."

# Honest reasons a request may be declined (transparency card).
decline_reasons:
  - "Capacity — I'm one person and take on a limited number of projects at a time."
  - "Competency fit — if the project needs expertise I don't honestly have, I'll say so rather than learn on your budget."
  - "Scope or timeline mismatch — rush deadlines that would force cutting corners."
  - "Budget mismatch — if an offer doesn't cover doing the work properly, I'll decline or counter rather than under-deliver."
  - "Legal or ethical concerns — anything I wouldn't be comfortable putting my name on."

project_types:
  - "Website / landing page"
  - "Web application (SPA)"
  - "E-commerce / shop"
  - "API / backend service"
  - "Automation / scripting"
  - "Data scraping & pipelines"
  - "Browser extension"
  - "Interactive tool / game"
  - "Firebase / serverless app"
  - "Something else"

# Tech stack picker — grouped multi-select.
stack:
  - group: "Frontend"
    options:
      - "React"
      - "TypeScript"
      - "Vue"
      - "Svelte"
      - "Vanilla JS / no framework"
      - "Static site (Jekyll / Eleventy)"
      - "Next.js / SSR"
      - "Tailwind CSS"
  - group: "Backend & APIs"
    options:
      - "Node.js"
      - "Python"
      - "Firebase Cloud Functions"
      - "REST API"
      - "GraphQL"
      - "WebSockets / realtime"
  - group: "Data & storage"
    options:
      - "Firestore"
      - "PostgreSQL"
      - "MySQL / MariaDB"
      - "SQLite"
      - "Firebase Realtime DB"
      - "Redis"
  - group: "Hosting & delivery"
    options:
      - "GitHub Pages"
      - "Firebase Hosting"
      - "Cloudflare"
      - "Vercel / Netlify"
      - "Docker"
      - "Self-hosted VPS"
  - group: "Quality & tooling"
    options:
      - "Unit tests (Vitest / Jest)"
      - "E2E tests (Playwright)"
      - "CI/CD (GitHub Actions)"
      - "Linting & formatting"
      - "Accessibility audit (WCAG)"
      - "Performance budget"

features:
  - "Responsive design"
  - "Dark / light theming"
  - "User accounts & auth"
  - "Payments / checkout"
  - "Admin dashboard / CMS"
  - "Search"
  - "Multi-language (i18n)"
  - "PWA / offline support"
  - "SEO optimization"
  - "Privacy-first analytics"
  - "GDPR / cookie consent"
  - "Email notifications"
  - "File uploads & media"
  - "Import / export (CSV, JSON)"
  - "Realtime sync / multiplayer"
  - "Third-party integrations"
  - "Written documentation"
  - "Post-launch maintenance"

# AI collaboration modes — radio cards.
ai_modes:
  - id: "ai-assisted"
    label: "AI-assisted, human-reviewed"
    badge: "Recommended"
    description: "State-of-the-art AI tooling paired with hands-on engineering review. Fastest turnaround and best value — every line is read, tested and understood before it ships."
  - id: "ai-scaffolding"
    label: "AI for scaffolding only"
    description: "AI drafts boilerplate, configs and test harnesses; all core business logic is written by hand. A middle ground if your policies restrict AI-generated logic."
  - id: "minimal-ai"
    label: "Minimal AI involvement"
    description: "Hand-written code throughout, with AI used at most for research. Fully supported — but expect a longer timeline and a higher quote for the same scope."

timelines:
  - "Flexible — quality first"
  - "Under 2 weeks"
  - "2–4 weeks"
  - "1–3 months"
  - "3+ months / ongoing"

budget_types:
  - "Fixed project price"
  - "Hourly rate"
  - "Open to your proposal"

currencies:
  - "EUR"
  - "USD"
  - "GBP"
  - "CHF"

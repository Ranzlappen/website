batch:
  id: "network-and-transfer"
  order: 4
  name: "Network & Transfer"
  short_name: "Network"
  description: >
    HTTP clients, DNS lookups, port scanners, link state — the tools you
    reach for to ask "is the network broken or is my code broken".
  last_updated: "2026-05-23"

entries:
  - name: "curl"
    description: "Transfer data to / from URLs (HTTP, HTTPS, FTP, SFTP, and more)."
    syntax: "curl [-X <method>] [-H \"<header>\"] [-d <data>] [-o <file>] [-L] [-sS] <url>"
    os: [cross-platform]
    danger: "caution"
    flags:
      - flag: "-X <method>"
        description: "HTTP method (GET default; POST, PUT, DELETE, PATCH…)."
      - flag: "-H \"<header>\""
        description: "Add a request header; repeat for multiple."
      - flag: "-d <data>"
        description: "Request body (also implies POST if -X is not set)."
      - flag: "--data-binary @<file>"
        description: "Send the contents of a file as the body, byte-for-byte."
      - flag: "-o <file>"
        description: "Write response body to a file instead of stdout."
      - flag: "-O"
        description: "Save as the URL's basename."
      - flag: "-L"
        description: "Follow 3xx redirects."
      - flag: "-sS"
        description: "Silent (-s) but show errors (-S). Common in scripts."
      - flag: "-I"
        description: "HEAD request — fetch headers only."
      - flag: "-u <user>:<pass>"
        description: "HTTP basic auth."
      - flag: "-v"
        description: "Verbose — print full request and response headers."
      - flag: "--fail"
        description: "Return a non-zero exit code on 4xx/5xx responses."
    examples:
      - code: "curl -sSL https://example.com/install.sh | sh"
        explain: "Download and execute an install script — only do this for sources you trust."
      - code: "curl -X POST -H \"Content-Type: application/json\" -d '{\"k\":1}' https://api.example/v1/data"
        explain: "Send a JSON POST body to an API endpoint."
      - code: "curl -o output.bin -L https://files.example/dl/123"
        explain: "Follow redirects and save the response to a named file."
    recipes:
      - code: "curl -sSf https://api.example/items | jq '.[] | .name'"
        explain: "Fetch a JSON array and extract just the name field of every item."
      - code: "curl -I -o /dev/null -w '%{http_code}' https://example.com"
        explain: "Check whether a URL is reachable by printing only its HTTP status code."
    gotchas: >
      <code>curl | sh</code> executes arbitrary network code — only do
      this for sources you trust. Default macOS curl lacks brotli/zstd
      support — install via Homebrew for full features. Use
      <code>--fail</code> in scripts so 4xx/5xx responses produce a
      non-zero exit code.
    see_also: ["wget", "httpie", "rsync", "widget-curl"]
    references:
      - "man 1 curl"
      - "https://curl.se/docs/manpage.html"

  - name: "wget"
    description: "Non-interactive network downloader with resume and recursive mirroring support."
    syntax: "wget [-O <file>] [-c] [-r] [-N] [-q] <url>"
    os: [linux, cross-platform, android]
    danger: "caution"
    flags:
      - flag: "-O <file>"
        description: "Output filename (- for stdout)."
      - flag: "-c"
        description: "Continue a partially downloaded file."
      - flag: "-r"
        description: "Recursive — mirror a site."
      - flag: "-N"
        description: "Only download if newer than the local copy."
      - flag: "-q"
        description: "Quiet — no output."
      - flag: "--no-parent"
        description: "Don't follow links above the given directory when mirroring."
      - flag: "-P <dir>"
        description: "Save files into this directory."
    examples:
      - code: "wget https://example.com/big.iso"
        explain: "Download a single file to the current directory."
      - code: "wget -c https://files.example/huge.tar.gz"
        explain: "Resume an interrupted download without re-downloading already-fetched bytes."
      - code: "wget -r -N --no-parent https://docs.example.com/manual/"
        explain: "Mirror a documentation subtree, skipping files that haven't changed."
    recipes:
      - code: "wget -qO- https://api.example/data | jq '.name'"
        explain: "Fetch a URL silently to stdout and pipe directly into jq — equivalent to <code>curl -sS</code>."
    gotchas: >
      Not installed on macOS by default — <code>brew install wget</code>.
      <code>curl</code> covers most of the same use cases and is
      preinstalled everywhere. Overwriting an existing file happens
      silently unless you use <code>-N</code>.
    see_also: ["curl", "aria2c"]
    references:
      - "man 1 wget"

  - name: "ping"
    description: "Send ICMP echo requests to a host and report round-trip time."
    syntax: "ping [-c <count>] [-i <interval>] [-W <timeout>] <host>"
    os: [linux, macos, cross-platform, android]
    danger: "safe"
    flags:
      - flag: "-c <n>"
        description: "Stop after n requests."
      - flag: "-i <s>"
        description: "Wait s seconds between requests (default 1)."
      - flag: "-W <s>"
        description: "Per-reply timeout in seconds."
      - flag: "-4 / -6"
        description: "Force IPv4 or IPv6."
    examples:
      - code: "ping -c 4 1.1.1.1"
        explain: "Send exactly four pings to Cloudflare's resolver to confirm basic connectivity."
      - code: "ping -i 0.2 example.com"
        explain: "Flood-style probe at 5 pings/sec to measure jitter (usually requires root)."
    recipes:
      - code: "ping -c 1 example.com | grep 'bytes from'"
        explain: "One-shot reachability check that exits non-zero if the host doesn't respond."
    gotchas: >
      Some networks block ICMP — "ping fails" doesn't always mean the
      host is down. Sub-second <code>-i</code> values usually require
      root.
    see_also: ["traceroute", "mtr"]
    references:
      - "man 8 ping"

  - name: "traceroute"
    description: "Show the network path (hop by hop) to a host."
    syntax: "traceroute [-n] [-T] [-I] [-w <s>] <host>"
    os: [linux, macos, cross-platform]
    danger: "safe"
    flags:
      - flag: "-n"
        description: "Numeric only — don't resolve hostnames (faster)."
      - flag: "-T"
        description: "Use TCP SYN instead of UDP (often gets past firewalls)."
      - flag: "-I"
        description: "Use ICMP echo (Linux: needs root)."
      - flag: "-w <s>"
        description: "Wait s seconds for each reply."
    examples:
      - code: "traceroute -n example.com"
        explain: "Print each hop's IP without resolving names — faster for quick path debugging."
      - code: "sudo traceroute -T -p 443 example.com"
        explain: "Probe using TCP/443 SYN packets to trace paths that block UDP."
    recipes:
      - code: "traceroute -n example.com | awk '{print $1, $2}'"
        explain: "Extract just hop numbers and IPs, discarding RTT noise."
    see_also: ["mtr", "ping"]
    references:
      - "man 8 traceroute"

  - name: "mtr"
    description: "Combined traceroute + ping with a live rolling display of per-hop loss and latency."
    syntax: "mtr [-r] [-c <count>] [-w] [-n] <host>"
    os: [linux, macos, cross-platform]
    danger: "safe"
    flags:
      - flag: "-r"
        description: "Report mode — run N cycles then print and exit."
      - flag: "-c <n>"
        description: "Number of cycles."
      - flag: "-w"
        description: "Wide report (no truncated hostnames)."
      - flag: "-n"
        description: "Numeric — skip reverse DNS."
    examples:
      - code: "mtr -rwc 20 example.com"
        explain: "Run 20 probe cycles in report mode and print a summary table."
      - code: "mtr -n example.com"
        explain: "Launch the interactive live display with numeric IPs only."
    recipes:
      - code: "mtr -rwc 50 --json example.com | jq '.report.hubs[] | {hop: .count, loss: .\"Loss%\"}'"
        explain: "Emit JSON output and extract hop-by-hop loss percentage for scripted alerting."
    see_also: ["traceroute", "ping"]
    references:
      - "man 8 mtr"

  - name: "dig"
    description: "Detailed DNS lookups — the canonical DNS debugger with full control over query type and resolver."
    syntax: "dig [@<server>] <name> [<type>] [+short] [+trace]"
    os: [linux, macos, cross-platform]
    danger: "safe"
    flags:
      - flag: "@<server>"
        description: "Use this DNS server instead of the system resolver."
      - flag: "<type>"
        description: "Record type — A, AAAA, MX, TXT, NS, CNAME, SOA, ANY."
      - flag: "+short"
        description: "Compact output — just the answer."
      - flag: "+trace"
        description: "Trace the query from the roots downward."
      - flag: "+noall +answer"
        description: "Print only the ANSWER section — cleaner than +short for multi-value records."
    examples:
      - code: "dig example.com"
        explain: "Full A-record lookup against the system resolver with detailed output."
      - code: "dig @1.1.1.1 example.com MX +short"
        explain: "Query Cloudflare's DNS for MX records and show compact results."
      - code: "dig +trace example.com"
        explain: "Walk the delegation chain from root nameservers to find where resolution breaks."
    recipes:
      - code: "dig +short example.com A && dig +short example.com AAAA"
        explain: "Print both IPv4 and IPv6 addresses for a host in two terse lines."
      - code: "dig +noall +answer _dmarc.example.com TXT"
        explain: "Retrieve only the DMARC policy TXT record — useful when verifying email config."
    see_also: ["host", "nslookup"]
    references:
      - "man 1 dig"

  - name: "host"
    description: "Simpler DNS lookup utility — terse output by default, good for quick checks."
    syntax: "host [-t <type>] [-a] <name> [<server>]"
    os: [linux, macos, cross-platform]
    danger: "safe"
    flags:
      - flag: "-t <type>"
        description: "Record type (A, MX, TXT, NS…)."
      - flag: "-a"
        description: "All record types (equivalent to -t ANY)."
    examples:
      - code: "host example.com"
        explain: "Print all A and MX records for a domain in one brief line each."
      - code: "host -t MX example.com"
        explain: "List the mail exchange records for a domain."
    recipes:
      - code: "host example.com 8.8.8.8"
        explain: "Override the resolver to Google DNS — handy for comparing against your local result."
    see_also: ["dig", "nslookup"]
    references:
      - "man 1 host"

  - name: "nslookup"
    description: "Older interactive DNS query tool — still useful on Windows where dig is not bundled."
    syntax: "nslookup [-type=<type>] <name> [<server>]"
    os: [linux, macos, windows, cross-platform]
    danger: "safe"
    flags:
      - flag: "-type=<type>"
        description: "Record type — A, MX, TXT, NS, SOA."
      - flag: "-debug"
        description: "Verbose mode — show full response."
    examples:
      - code: "nslookup example.com"
        explain: "Basic A-record lookup using the system resolver."
      - code: "nslookup example.com 8.8.8.8"
        explain: "Query Google DNS directly — useful for bypassing local resolver caches."
    recipes:
      - code: "nslookup -type=TXT _dmarc.example.com"
        explain: "Look up a DMARC policy record — the syntax works identically on Windows and Linux."
    gotchas: >
      <code>dig</code> is more powerful and has better scripting support;
      reach for <code>nslookup</code> on Windows where <code>dig</code>
      isn't bundled.
    modern: "Prefer <code>dig</code> for scriptable output and more control over query options."
    see_also: ["dig", "host"]
    references:
      - "man 1 nslookup"

  - name: "ss"
    description: "Inspect sockets — listening ports, established connections, and per-socket stats."
    syntax: "ss [-l] [-t] [-u] [-n] [-p] [-a]"
    os: [linux]
    danger: "safe"
    flags:
      - flag: "-l"
        description: "Listening sockets only."
      - flag: "-t"
        description: "TCP."
      - flag: "-u"
        description: "UDP."
      - flag: "-n"
        description: "Numeric — don't resolve hosts or services."
      - flag: "-p"
        description: "Show the owning process (needs root for others' processes)."
      - flag: "-a"
        description: "All sockets (not just listening)."
      - flag: "-s"
        description: "Summary statistics — total counts by state."
    examples:
      - code: "ss -ltnp"
        explain: "List every TCP port currently listening, with the process name."
      - code: "sudo ss -tunap | grep 443"
        explain: "Find all TCP and UDP sockets touching port 443, including the owning process."
    recipes:
      - code: "ss -tlnp | awk 'NR>1 {print $4, $6}'"
        explain: "Print just the local address:port and process for each listening TCP socket."
      - code: "watch -n2 'ss -s'"
        explain: "Live-refresh socket summary statistics every two seconds — good for connection-flood diagnosis."
    gotchas: >
      <code>ss</code> replaced <code>netstat</code> on modern Linux —
      faster and reads <code>/proc/net</code> directly. macOS uses
      <code>netstat</code> + <code>lsof -i</code> instead.
    see_also: ["netstat", "lsof"]
    references:
      - "man 8 ss"

  - name: "netstat"
    description: "List network connections, routing tables, and interface stats."
    syntax: "netstat [-l] [-t] [-u] [-n] [-p] [-r]"
    os: [linux, macos, windows, cross-platform]
    danger: "safe"
    flags:
      - flag: "-l"
        description: "Listening sockets."
      - flag: "-t / -u"
        description: "TCP / UDP."
      - flag: "-n"
        description: "Numeric addresses and ports."
      - flag: "-p"
        description: "Show owning process (Linux; not BSD/macOS)."
      - flag: "-r"
        description: "Routing table."
    examples:
      - code: "netstat -ltn"
        explain: "List all listening TCP ports with numeric addresses — works on Linux and macOS."
      - code: "netstat -rn"
        explain: "Print the routing table without resolving hostnames."
    recipes:
      - code: "netstat -ltnp 2>/dev/null | grep LISTEN | awk '{print $4, $7}'"
        explain: "Extract listening address:port and process from netstat — portable Linux one-liner."
    gotchas: >
      Deprecated on modern Linux in favour of <code>ss</code> (faster,
      same data). Still standard on macOS, BSD, and Windows.
    modern: "On Linux, prefer <code>ss</code> — it is faster, actively maintained, and reads kernel data directly."
    see_also: ["ss", "lsof", "route"]
    references:
      - "man 8 netstat"

  - name: "nmap"
    description: "Port scanner and network discovery tool — detect open ports, services, and OS fingerprints."
    syntax: "nmap [-sS|-sT|-sU] [-p <ports>] [-A] [-Pn] <target>"
    os: [linux, macos, windows, cross-platform, root]
    danger: "caution"
    flags:
      - flag: "-sS"
        description: "TCP SYN (stealth) scan — requires root."
      - flag: "-sT"
        description: "TCP connect scan — no root needed but more visible."
      - flag: "-sU"
        description: "UDP scan."
      - flag: "-p <ports>"
        description: "Ports list (22,80,443 or 1-1024)."
      - flag: "-A"
        description: "Aggressive: OS detect, version, scripts, traceroute."
      - flag: "-Pn"
        description: "Skip host discovery — treat all hosts as up."
    examples:
      - code: "nmap -sT -p 22,80,443 example.com"
        explain: "Connect-scan three ports on a host — no root required, works through most NAT."
      - code: "sudo nmap -A 192.168.1.0/24"
        explain: "Aggressive scan of an entire local subnet — detects OS and service versions."
    recipes:
      - code: "nmap -sT -p 1-1024 --open 192.168.1.0/24 | grep -E '^Nmap|open'"
        explain: "Scan common ports across a local subnet and show only hosts with open ports."
    gotchas: >
      Only scan networks you own or have written permission to scan.
      Aggressive scans are noisy and may trigger IDS alerts.
    see_also: ["ss", "masscan"]
    references:
      - "man 1 nmap"

  - name: "ip"
    description: "Show and manipulate routing, devices, addresses, and tunnels — the modern Linux networking Swiss army knife."
    syntax: "ip [<object>] [<command>] [<args>]"
    os: [linux]
    danger: "caution"
    flags:
      - flag: "ip addr"
        description: "Show IP addresses on all interfaces."
      - flag: "ip link"
        description: "Show / change interface link state."
      - flag: "ip route"
        description: "Show / change the routing table."
      - flag: "ip -br a"
        description: "Brief one-line-per-interface summary."
      - flag: "ip -6 addr"
        description: "Show IPv6 addresses only."
    examples:
      - code: "ip addr show"
        explain: "List every network interface with its assigned IP addresses."
      - code: "ip -br a"
        explain: "One-line-per-interface summary — the fastest way to check interface state."
      - code: "sudo ip route add 10.0.0.0/8 via 192.168.1.1"
        explain: "Add a static route sending 10.x traffic through a gateway."
    recipes:
      - code: "ip -4 -br addr | awk '$2 == \"UP\" {print $1, $3}'"
        explain: "Print only the interfaces that are UP along with their IPv4 address."
    gotchas: >
      Replaced the older <code>ifconfig</code> / <code>route</code> /
      <code>arp</code> trio. Not available on macOS — use
      <code>ifconfig</code> + <code>route</code> + <code>netstat -rn</code>
      there.
    modern: "Replaces <code>ifconfig</code> on Linux — prefer <code>ip</code> for scripting and modern distros."
    see_also: ["ifconfig", "ss"]
    references:
      - "man 8 ip"

  - name: "nc"
    slug: "nc-netcat"
    description: "Netcat — read and write arbitrary TCP/UDP connections, the swiss-army knife of networking."
    syntax: "nc [-l] [-u] [-z] [-v] [-w <sec>] [<host>] <port>"
    os: [linux, macos, cross-platform, android]
    danger: "caution"
    flags:
      - flag: "-l"
        description: "Listen mode — bind a port instead of connecting."
      - flag: "-u"
        description: "UDP instead of TCP."
      - flag: "-z"
        description: "Zero-I/O — port scan / connection test."
      - flag: "-v"
        description: "Verbose."
      - flag: "-w <sec>"
        description: "Timeout after n seconds of idle."
      - flag: "-k"
        description: "Keep listening after a client disconnects (GNU netcat)."
    examples:
      - code: "nc -zv example.com 80"
        explain: "Test whether TCP port 80 is reachable on a host without sending any data."
      - code: "nc -l 1234"
        explain: "Open a listening TCP socket on port 1234 — anything connecting prints to stdout."
      - code: "echo hello | nc localhost 1234"
        explain: "Send a one-line message to a listening nc process and close the connection."
    recipes:
      - code: "nc -zv example.com 1 65535 2>&1 | grep succeeded"
        explain: "Quick port sweep — prints only ports that accepted the connection."
      - code: "tar czf - ./dir | nc receiver.local 9999"
        explain: "Stream a compressed archive over the network without creating a temp file — receive with <code>nc -l 9999 | tar xzf -</code>."
    gotchas: >
      Multiple incompatible implementations exist: GNU netcat
      (<code>nc</code>), OpenBSD netcat (the default on macOS and most
      Linux), and <code>ncat</code> from the nmap project. Flag
      behaviour differs, especially around <code>-k</code> and
      <code>-c</code>.
    see_also: ["ncat", "socat", "ss"]
    references:
      - "man 1 nc"

  - name: "ifconfig"
    description: "Show and configure network interfaces — legacy Linux, still the default on macOS and BSD."
    syntax: "ifconfig [<iface>] [up|down] [<addr> netmask <mask>]"
    os: [linux, macos, cross-platform]
    danger: "caution"
    flags:
      - flag: "<iface> up"
        description: "Bring an interface online."
      - flag: "<iface> down"
        description: "Bring an interface offline."
      - flag: "-a"
        description: "Show all interfaces, including downed ones."
    examples:
      - code: "ifconfig"
        explain: "Print all active interfaces with their IP and MAC addresses."
      - code: "sudo ifconfig en0 down"
        explain: "Bring the en0 interface offline — useful for toggling Wi-Fi on macOS."
    recipes:
      - code: "ifconfig | awk '/inet / && !/127.0.0.1/ {print $2}'"
        explain: "Extract all non-loopback IPv4 addresses — works on both Linux and macOS."
    gotchas: >
      Deprecated on modern Linux — use <code>ip</code>. Still default on
      macOS and BSD.
    modern: "On Linux, prefer <code>ip addr</code> — <code>ifconfig</code> is legacy and may not be installed."
    see_also: ["ip"]
    references:
      - "man 8 ifconfig"

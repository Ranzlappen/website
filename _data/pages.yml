# ──────────────────────────────────────────────────────────────
# Unified page registry
#
# To add a new page to the site:
#   1. Drop your HTML/Markdown file into the repo (e.g. pages/foo.html)
#   2. Add one entry below with title, url, menu, and order
#
# menu: where the link appears — [main], [footer], or [main, footer]
# order: sort position within each menu (lower = first)
#
# children: optional list of sub-links. An entry with children renders as a
#   collapsible drawer/dropdown in the header (click/hover panel on desktop,
#   accordion section in the mobile nav) instead of a plain link. Each child
#   is { title, url } (and may set external: true). The parent's own `url`
#   stays reachable — surface it as the first child if you want a direct link.
#
# Changing the "title" here updates the link text everywhere
# (header, mobile nav, and footer) — single source of truth.
# ──────────────────────────────────────────────────────────────

- title: "Home"
  url: "/"
  menu: [main]
  order: 1

- title: "Blog"
  url: "/blog/"
  menu: [main]
  order: 2

- title: "Projects"
  url: "/projects/"
  menu: [main]
  order: 3
  children:
    - title: "All Projects"
      url: "/projects/"
    - title: "Games"
      url: "/games/"

- title: "Categories"
  url: "/categories/"
  menu: [main]
  order: 4

- title: "References"
  url: "/references/"
  menu: [main]
  order: 5

- title: "About"
  url: "/about/"
  menu: [main, footer]
  order: 6

- title: "Contact"
  url: "/contact/"
  menu: [main, footer]
  order: 7

- title: "Disclaimer"
  url: "/disclaimer/"
  menu: [footer]
  order: 8

- title: "Privacy Policy"
  url: "/privacy/"
  menu: [footer]
  order: 9

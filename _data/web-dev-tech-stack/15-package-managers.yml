batch:
  id: "package-managers"
  order: 15
  name: "Package Managers & Registries"
  short_name: "Package Mgrs"
  description: >
    How your project gets its dependencies — the CLIs that resolve, download,
    and link packages (npm, pnpm, Yarn, Bun), the registries they pull from (the
    public npm registry), the equivalent in other ecosystems (Composer for PHP),
    and the build orchestrators that make big monorepos fast (Turborepo). They
    all read a manifest, build a lock file, and populate a dependency tree — they
    just differ on speed, disk usage, and how strict that tree is.
  last_updated: "2026-06-27"

entries:
  - name: "npm"
    slug: "npm"
    tagline: "The default package manager that ships with Node."
    layer: [tooling]
    maturity: industry-standard
    learning_curve: gentle
    first_released: 2010
    description: >
      Node.js's built-in package manager and the original gateway to the
      JavaScript ecosystem.
      It reads `package.json`, resolves a dependency tree into a flat
      `node_modules`, writes a `package-lock.json` for reproducible installs, and
      runs your scripts (`npm run …`). It's the baseline every other JS package
      manager is measured against.
    use_cases:
      - "Default dependency management for any Node/JS project."
      - "Running project scripts and publishing packages to the registry."
      - "Lowest-friction choice when no special speed/disk needs exist."
    prerequisites:
      - { name: "Node.js", slug: "node-js" }
    key_features:
      - "Ships with Node — zero extra install."
      - "Flat node_modules with package-lock.json for reproducibility."
      - "Workspaces for basic monorepo support."
      - "npx for running package binaries without installing them."
    pairs_well_with:
      - { name: "Node.js", slug: "node-js" }
      - { name: "npm registry", slug: "npm-registry" }
    alternatives:
      - { name: "pnpm", slug: "pnpm" }
      - { name: "Yarn", slug: "yarn" }
      - { name: "Bun (package manager)", slug: "bun-pm" }
    example:
      lang: "bash"
      code: "npm install && npm run build"
      explain: "Install all dependencies from package.json, then run the build script."
    gotchas: >
      The flat `node_modules` is *non-deterministic in layout* and permissive —
      it lets you import packages you never declared (phantom dependencies),
      which breaks when a manager like pnpm enforces strictness. It's also the
      slowest and most disk-hungry of the major managers on large installs.
    maintained_by: "npm, Inc. (GitHub / Microsoft)"
    language: "JavaScript"
    license: "Artistic-2.0"
    docs:
      - { label: "docs.npmjs.com", url: "https://docs.npmjs.com" }

  - name: "pnpm"
    slug: "pnpm"
    tagline: "Fast, disk-efficient, and strict about your dependency tree."
    layer: [tooling]
    maturity: mainstream
    learning_curve: gentle
    first_released: 2017
    description: >
      A drop-in npm alternative that stores every package version once in a
      global content-addressed store and hard-links it into each project's
      `node_modules`, so ten projects sharing a dependency cost the disk space
      of one. Its non-flat layout is strict — you can only import what you
      actually declared — which kills phantom-dependency bugs and makes it a
      favorite for the monorepo crowd.
    use_cases:
      - "Monorepos and machines with many projects (huge disk savings)."
      - "Teams that want a strict, phantom-dependency-free node_modules."
      - "Faster CI installs than npm or classic Yarn."
    prerequisites:
      - { name: "Node.js", slug: "node-js" }
    key_features:
      - "Content-addressed global store + hard links — install once, reuse everywhere."
      - "Strict, symlinked node_modules — no phantom dependencies."
      - "First-class workspaces for monorepos."
      - "Compatible with the npm registry and package.json scripts."
    pairs_well_with:
      - { name: "Node.js", slug: "node-js" }
      - { name: "Turborepo", slug: "turborepo" }
      - { name: "npm registry", slug: "npm-registry" }
    alternatives:
      - { name: "npm", slug: "npm" }
      - { name: "Yarn", slug: "yarn" }
      - { name: "Bun (package manager)", slug: "bun-pm" }
    example:
      lang: "bash"
      code: "pnpm install && pnpm -r build"
      explain: "Install dependencies into the shared store, then run the build script across every workspace package."
    gotchas: >
      The symlinked, non-flat layout occasionally trips tooling that assumes a
      flat `node_modules` or resolves modules by walking the real filesystem path
      — a few legacy packages need a `node-linker=hoisted` escape hatch. The
      strictness that catches phantom deps can also surface latent bugs the day
      you switch from npm.
    maintained_by: "pnpm team + OSS community"
    language: "TypeScript"
    license: "MIT"
    docs:
      - { label: "pnpm.io", url: "https://pnpm.io" }

  - name: "Yarn"
    slug: "yarn"
    tagline: "The manager that pushed npm to get faster and deterministic."
    layer: [tooling]
    maturity: mainstream
    learning_curve: moderate
    first_released: 2016
    description: >
      A package manager born at Meta to fix early npm's speed and determinism
      problems — it introduced lock files and parallel installs that npm later
      adopted. Yarn Classic (v1) behaves like npm; Yarn Berry (v2+) is a rewrite
      with Plug'n'Play, which skips `node_modules` entirely and resolves modules
      from a single zipped cache.
    use_cases:
      - "Projects already standardized on Yarn workspaces."
      - "Plug'n'Play setups that want to eliminate node_modules."
      - "Teams wanting plugin-extensible install behavior."
    prerequisites:
      - { name: "Node.js", slug: "node-js" }
    key_features:
      - "Deterministic lock file and parallel installs."
      - "Workspaces for monorepos (Classic and Berry)."
      - "Yarn Berry's Plug'n'Play removes node_modules."
      - "Plugin architecture for extending the CLI."
    pairs_well_with:
      - { name: "Node.js", slug: "node-js" }
      - { name: "npm registry", slug: "npm-registry" }
      - { name: "Turborepo", slug: "turborepo" }
    alternatives:
      - { name: "npm", slug: "npm" }
      - { name: "pnpm", slug: "pnpm" }
      - { name: "Bun (package manager)", slug: "bun-pm" }
    example:
      lang: "bash"
      code: "yarn install && yarn build"
      explain: "Install dependencies and run the build script via the Yarn CLI."
    gotchas: >
      Yarn Classic (v1) and Yarn Berry (v2+) are almost two different tools —
      Berry's Plug'n'Play breaks packages that expect a real `node_modules`, so
      many Berry users fall back to the `node-modules` linker. Pick a major
      version deliberately; mixing advice from both eras causes confusion.
    maintained_by: "Yarn team + OSS community (originally Meta)"
    language: "TypeScript"
    license: "BSD-2-Clause"
    docs:
      - { label: "yarnpkg.com", url: "https://yarnpkg.com" }

  - name: "Bun (package manager)"
    slug: "bun-pm"
    tagline: "`bun install` — an absurdly fast npm-compatible installer."
    layer: [tooling]
    maturity: rising
    learning_curve: gentle
    first_released: 2022
    description: >
      The package-manager half of the Bun runtime — `bun install` reads your
      existing `package.json` and installs from the npm registry, but does it
      many times faster than npm or Yarn thanks to a native (Zig) implementation
      and an aggressive global cache. It's a drop-in installer you can adopt even
      if the rest of your stack still runs on Node.
    use_cases:
      - "Drastically faster dependency installs in dev and CI."
      - "Drop-in `bun install` replacement on existing Node projects."
      - "Greenfield projects already using the Bun runtime end-to-end."
    prerequisites:
      - { name: "Bun", slug: "bun" }
    key_features:
      - "Native (Zig) installer — dramatically faster than npm/Yarn."
      - "Reads package.json + works with the npm registry."
      - "Global cache with hard links for fast, deduplicated installs."
      - "Built into the Bun runtime alongside its bundler and test runner."
    pairs_well_with:
      - { name: "Bun", slug: "bun" }
      - { name: "npm registry", slug: "npm-registry" }
      - { name: "TypeScript", slug: "typescript" }
    alternatives:
      - { name: "npm", slug: "npm" }
      - { name: "pnpm", slug: "pnpm" }
      - { name: "Yarn", slug: "yarn" }
    example:
      lang: "bash"
      code: "bun install"
      explain: "Install all dependencies from package.json using Bun's native installer."
    gotchas: >
      The installer is the most battle-tested part of Bun, but edge cases in
      lifecycle scripts, peer-dependency resolution, and lockfile interop with
      other managers still surface. Bun was acquired by Anthropic in December
      2025 and stays MIT-licensed; the project remains young relative to npm and
      pnpm.
    maintained_by: "Bun team (Anthropic)"
    language: "Zig"
    license: "MIT"
    docs:
      - { label: "bun.sh/docs", url: "https://bun.sh/docs/cli/install" }

  - name: "npm registry"
    slug: "npm-registry"
    tagline: "The public warehouse — 3M+ packages every JS manager pulls from."
    layer: [tooling, infrastructure]
    maturity: industry-standard
    learning_curve: gentle
    first_released: 2010
    description: >
      The public registry at `registry.npmjs.org` that hosts over three million
      JavaScript packages —
      the default source that npm, pnpm, Yarn, and Bun all download from. It's a
      hosted service (not open-source software you self-host), exposing a simple
      <span class="abbr-link" data-abbr="HTTP">HTTP</span>
      <span class="abbr-link" data-abbr="API">API</span> for fetching package
      tarballs and metadata, plus auth for publishing.
    use_cases:
      - "The default install source for every major JS package manager."
      - "Publishing and distributing open-source JS/TS libraries."
      - "Scoped + private packages for org-internal distribution."
    prerequisites:
      - { name: "npm", slug: "npm" }
    key_features:
      - "3M+ packages — the largest software registry in the world."
      - "Simple HTTP API for tarballs and version metadata."
      - "Scoped packages (@org/pkg) and private publishing."
      - "Mirrorable behind a proxy/cache (Verdaccio, Artifactory)."
    pairs_well_with:
      - { name: "npm", slug: "npm" }
      - { name: "pnpm", slug: "pnpm" }
      - { name: "Yarn", slug: "yarn" }
      - { name: "Bun (package manager)", slug: "bun-pm" }
    alternatives:
      - { name: "GitHub Packages", slug: "" }
      - { name: "JSR", slug: "" }
    example:
      lang: "bash"
      code: "npm config get registry"
      explain: "Print the active registry URL — defaults to https://registry.npmjs.org/."
    gotchas: >
      It's a single hosted service, so it's a supply-chain and availability
      choke point — typosquatting, dependency-confusion, and the occasional
      unpublished package (the infamous left-pad incident) all stem from trusting
      a public registry. Pin versions, use a lock file, and consider a caching
      proxy for CI.
    maintained_by: "npm, Inc. (GitHub / Microsoft)"
    language: "Hosted service"
    license: "proprietary"
    docs:
      - { label: "docs.npmjs.com", url: "https://docs.npmjs.com/cli/v10/using-npm/registry" }

  - name: "Composer"
    slug: "composer"
    tagline: "The dependency manager that modernized PHP."
    layer: [tooling]
    maturity: industry-standard
    learning_curve: gentle
    first_released: 2012
    description: >
      The standard dependency manager for PHP
      — it reads a `composer.json`, resolves a compatible set of packages from
      the Packagist registry, writes a `composer.lock` for reproducible installs,
      and generates a PSR-4 autoloader so you never write `require` statements by
      hand. It's the tool that made the modern PHP framework ecosystem (Laravel,
      Symfony) possible.
    use_cases:
      - "Dependency management for any modern PHP project."
      - "Installing and updating frameworks like Laravel or Symfony."
      - "Autoloading classes via the generated PSR-4 autoloader."
    prerequisites:
      - { name: "PHP", slug: "php" }
    key_features:
      - "composer.json manifest + composer.lock for reproducible installs."
      - "Pulls from the Packagist registry by default."
      - "Generates a PSR-4 / classmap autoloader automatically."
      - "Per-project dependencies (no global install soup)."
    pairs_well_with:
      - { name: "PHP", slug: "php" }
      - { name: "Laravel", slug: "laravel" }
    alternatives:
      - { name: "PEAR", slug: "" }
    example:
      lang: "bash"
      code: "composer require laravel/framework"
      explain: "Add Laravel to a PHP project, resolving and locking a compatible version into composer.json."
    gotchas: >
      Resolving large dependency graphs can be slow and memory-hungry — bumping
      PHP's `memory_limit` for Composer is a common ritual. And always commit
      `composer.lock`: without it, `composer install` resolves fresh versions and
      you lose reproducibility across environments.
    maintained_by: "Composer team + OSS community"
    language: "PHP"
    license: "MIT"
    docs:
      - { label: "getcomposer.org", url: "https://getcomposer.org" }

  - name: "Turborepo"
    slug: "turborepo"
    tagline: "High-performance build orchestration for JS/TS monorepos."
    layer: [tooling]
    maturity: rising
    learning_curve: moderate
    first_released: 2021
    description: >
      A monorepo build system from Vercel that sits on top of your package
      manager's workspaces and makes big repos fast through aggressive caching —
      it builds a task dependency graph, runs tasks in parallel, and skips any
      work whose inputs haven't changed (locally and via a shared remote cache).
      It's a task runner, not a package manager: pair it with npm, pnpm, or Yarn
      workspaces.
    use_cases:
      - "Speeding up build/test/lint tasks across a JS/TS monorepo."
      - "Sharing a remote build cache across a team and CI."
      - "Orchestrating task pipelines with explicit dependencies."
    prerequisites:
      - { name: "Node.js", slug: "node-js" }
      - { name: "pnpm", slug: "pnpm" }
    key_features:
      - "Content-aware caching — never rebuild unchanged tasks."
      - "Remote cache shared across machines and CI."
      - "Parallel task execution from a dependency graph (turbo.json)."
      - "Layers on top of npm/pnpm/Yarn workspaces."
    pairs_well_with:
      - { name: "pnpm", slug: "pnpm" }
      - { name: "Vercel", slug: "vercel" }
      - { name: "Next.js", slug: "next-js" }
    alternatives:
      - { name: "Nx", slug: "" }
      - { name: "Lerna", slug: "" }
      - { name: "Bazel", slug: "" }
    example:
      lang: "bash"
      code: "turbo run build test --filter=web"
      explain: "Run build and test for the 'web' package and its dependencies, reusing cached results where inputs are unchanged."
    gotchas: >
      The cache only helps if your task `inputs`/`outputs` in `turbo.json` are
      declared accurately — get them wrong and you'll either cache stale results
      or never get a cache hit. It's an orchestrator on top of workspaces, not a
      replacement for your package manager.
    maintained_by: "Vercel + OSS community"
    language: "Rust"
    license: "MIT"
    docs:
      - { label: "turborepo.com", url: "https://turborepo.com" }

  - name: "Nx"
    slug: "nx"
    tagline: "A smart, extensible build system for monorepos."
    layer: [tooling]
    maturity: mainstream
    learning_curve: moderate
    first_released: 2018
    description: >
      A build system and <span class="abbr-link" data-abbr="Monorepo">monorepo</span>
      toolkit that understands your project graph to run only what changed, cache
      task results locally and remotely, and parallelize across packages. Plugins
      and generators scaffold apps and libraries for React, Node, and more, making
      it more batteries-included than a pure task runner.
    use_cases:
      - "Large monorepos needing affected-only builds and tests."
      - "Teams wanting code generators and enforced module boundaries."
      - "Sharing computation caches across developers and CI for speed."
    prerequisites:
      - { name: "Node.js", slug: "node-js" }
      - { name: "Monorepo basics", slug: "" }
    key_features:
      - "Project-graph-aware task scheduling and `affected` commands."
      - "Local and remote computation caching (Nx Cloud)."
      - "Plugins and generators for common stacks."
      - "Enforceable module-boundary lint rules."
    pairs_well_with:
      - { name: "pnpm", slug: "pnpm" }
      - { name: "TypeScript", slug: "typescript" }
      - { name: "React", slug: "react" }
    alternatives:
      - { name: "Turborepo", slug: "turborepo" }
      - { name: "Bazel", slug: "" }
    example:
      lang: "bash"
      code: "npx nx affected -t test"
      explain: "Runs tests only for the projects affected by your current changes, using the project graph."
    gotchas: >
      Nx is more opinionated and heavier than Turborepo — plugins, generators, and
      its workspace conventions are powerful but can feel like a framework you must
      buy into. The remote-cache (Nx Cloud) is a paid service beyond generous free
      limits, and migrating an existing repo into Nx's structure takes real effort.
    maintained_by: "Nrwl/Nx"
    language: "TypeScript"
    license: "MIT"
    docs:
      - { label: "nx.dev", url: "https://nx.dev" }

  - name: "Volta"
    slug: "volta"
    tagline: "Pin per-project JS toolchain versions, switch automatically."
    layer: [tooling]
    maturity: mainstream
    learning_curve: gentle
    first_released: 2019
    description: >
      A Rust-based toolchain manager that pins the exact Node, npm, pnpm, or Yarn
      version a project needs in its `package.json` and switches to it
      automatically when you `cd` into the directory. Everyone on the team — and
      CI — gets the same tool versions with no manual `nvm use`.
    use_cases:
      - "Ensuring every developer and CI runs the same Node/package-manager version."
      - "Switching toolchains automatically per project without nvm commands."
      - "Avoiding 'works on my machine' bugs caused by version drift."
    prerequisites:
      - { name: "Node.js", slug: "node-js" }
    key_features:
      - "Pins Node/npm/pnpm/Yarn versions in package.json (`volta` field)."
      - "Automatic, near-instant version switching on directory change."
      - "Fast Rust implementation with shimmed binaries."
      - "Cross-platform (macOS, Linux, Windows)."
    pairs_well_with:
      - { name: "Node.js", slug: "node-js" }
      - { name: "pnpm", slug: "pnpm" }
    alternatives:
      - { name: "nvm", slug: "" }
      - { name: "fnm", slug: "" }
      - { name: "Corepack", slug: "corepack" }
    example:
      lang: "bash"
      code: "volta pin node@20.11.0"
      explain: "Records Node 20.11.0 in package.json so anyone in the project auto-uses that version."
    gotchas: >
      Volta works via shims on your PATH, which can clash with other version
      managers (nvm, asdf) if both are installed — pick one. Its package-manager
      handling also overlaps with Node's built-in Corepack, so teams sometimes end
      up with two tools doing similar jobs.
    maintained_by: "Volta team + OSS community"
    language: "Rust"
    license: "BSD-2-Clause"
    docs:
      - { label: "volta.sh", url: "https://volta.sh" }

  - name: "Corepack"
    slug: "corepack"
    tagline: "Node's built-in shim for pnpm and Yarn versions."
    layer: [tooling]
    maturity: mainstream
    learning_curve: gentle
    first_released: 2021
    description: >
      A tool that ships with Node.js and acts as a shim for package managers other
      than npm — it reads the `packageManager` field in `package.json` and
      transparently runs the exact pinned pnpm or Yarn version, downloading it on
      first use. It means a repo can guarantee its package-manager version without
      a separate installer.
    use_cases:
      - "Pinning the team's pnpm or Yarn version via packageManager in package.json."
      - "Guaranteeing CI uses the same package-manager version as developers."
      - "Avoiding a global pnpm/Yarn install — Node provides the shim."
    prerequisites:
      - { name: "Node.js", slug: "node-js" }
    key_features:
      - "Bundled with Node — no separate install."
      - "Reads the packageManager field to select the exact version."
      - "Auto-downloads the pinned pnpm/Yarn on first run."
      - "Keeps package-manager version with the repo, not the machine."
    pairs_well_with:
      - { name: "pnpm", slug: "pnpm" }
      - { name: "Yarn", slug: "yarn" }
      - { name: "Node.js", slug: "node-js" }
    alternatives:
      - { name: "Volta", slug: "volta" }
    example:
      lang: "bash"
      code: "corepack enable && corepack use pnpm@9"
      explain: "Activates Corepack's shims and pins pnpm 9 in package.json for the project."
    gotchas: >
      Corepack is disabled by default and you must run `corepack enable` once per
      machine, which trips up CI that forgets the step. It also handles only pnpm
      and Yarn — not Node itself — and its first-run network download can fail in
      air-gapped or offline environments.
    maintained_by: "Node.js project"
    language: "JavaScript"
    license: "MIT"
    docs:
      - { label: "nodejs.org/api/corepack", url: "https://nodejs.org/api/corepack.html" }

  - name: "uv"
    slug: "uv"
    tagline: "An extremely fast Python package and project manager, in Rust."
    layer: [tooling]
    maturity: rising
    learning_curve: gentle
    first_released: 2024
    description: >
      A Rust-based tool from Astral that aims to replace pip, pip-tools, virtualenv,
      pipx, and parts of Poetry with one fast command. It resolves and installs
      Python dependencies dramatically faster than pip, manages virtual
      environments and Python versions, and reads the standard
      <span class="abbr-link" data-abbr="Lockfile">lockfile</span> via
      `pyproject.toml`.
    use_cases:
      - "Speeding up Python dependency installs in dev and CI."
      - "Managing a project's venv, Python version, and lockfile in one tool."
      - "Running CLI tools in isolated environments (the pipx replacement)."
    prerequisites:
      - { name: "Python", slug: "python" }
    key_features:
      - "10–100× faster resolves/installs than pip, with a global cache."
      - "Project management via pyproject.toml and a uv.lock lockfile."
      - "Installs and pins Python interpreter versions itself."
      - "`uvx`/`uv tool` for isolated CLI tools (pipx-style)."
    pairs_well_with:
      - { name: "Python", slug: "python" }
      - { name: "FastAPI", slug: "fastapi" }
      - { name: "Ruff", slug: "" }
    alternatives:
      - { name: "pip", slug: "pip" }
      - { name: "Poetry", slug: "" }
      - { name: "pipx", slug: "" }
    example:
      lang: "bash"
      code: "uv add fastapi && uv run uvicorn main:app"
      explain: "Adds FastAPI to the project (creating a venv and lockfile) then runs the app inside it."
    gotchas: >
      It moves fast and is still maturing — APIs and behaviour can change between
      releases, and a few corner-case packages or build backends may not resolve
      identically to pip. Mixing uv-managed venvs with manual `pip install` in the
      same environment can also cause drift, so commit to one workflow.
    maintained_by: "Astral"
    language: "Rust"
    license: "Apache-2.0/MIT"
    docs:
      - { label: "docs.astral.sh/uv", url: "https://docs.astral.sh/uv/" }

  - name: "pip"
    slug: "pip"
    tagline: "The standard package installer for Python."
    layer: [tooling]
    maturity: industry-standard
    learning_curve: gentle
    first_released: 2008
    description: >
      The default package manager for Python, used to install libraries from the
      Python Package Index (PyPI). It reads a `requirements.txt` or installs
      packages directly, and ships with every modern Python install, making it the
      universal baseline even as faster tools build on top of it.
    use_cases:
      - "Installing Python packages from PyPI into a virtual environment."
      - "Reproducing dependencies from a requirements.txt file."
      - "Any Python project as the lowest-common-denominator installer."
    prerequisites:
      - { name: "Python", slug: "python" }
    key_features:
      - "Installs from PyPI, Git, URLs, and local paths."
      - "requirements.txt for declaring dependency sets."
      - "Bundled with Python — available everywhere."
      - "Editable installs (`pip install -e .`) for local development."
    pairs_well_with:
      - { name: "Python", slug: "python" }
      - { name: "venv", slug: "" }
      - { name: "Django", slug: "django" }
    alternatives:
      - { name: "uv", slug: "uv" }
      - { name: "Poetry", slug: "" }
      - { name: "Conda", slug: "" }
    example:
      lang: "bash"
      code: "pip install -r requirements.txt"
      explain: "Installs every package listed in requirements.txt into the active environment."
    gotchas: >
      Plain pip has no real lockfile — `requirements.txt` does not by itself pin
      transitive dependencies unless you generate it carefully (e.g. via
      pip-tools), so installs aren't fully reproducible. It also installs into
      whatever environment is active, so forgetting to activate a virtualenv
      pollutes the system Python.
    maintained_by: "PyPA"
    language: "Python"
    license: "MIT"
    docs:
      - { label: "pip.pypa.io", url: "https://pip.pypa.io" }

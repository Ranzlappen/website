batch:
  id: "backend-frameworks"
  order: 8
  name: "Backend Frameworks & APIs"
  short_name: "Backend"
  description: >
    Server-side frameworks for building HTTP APIs and web apps — from the
    minimal, unopinionated Node staples (Express, Fastify) to the
    batteries-included giants (Laravel, Django) and the type-safe modern wave
    (NestJS, FastAPI, tRPC). They handle routing, validation, and serialization;
    pick one to match your language and how much structure you want imposed.
  last_updated: "2026-06-27"

entries:
  - name: "Express"
    slug: "express"
    tagline: "The minimal, ubiquitous Node web framework."
    layer: [backend]
    maturity: industry-standard
    learning_curve: gentle
    first_released: 2010
    description: >
      The de-facto standard <span class="abbr-link" data-abbr="API">web
      API</span> framework for Node.js — a thin, unopinionated layer over the
      HTTP server giving you routing and a middleware pipeline, and almost
      nothing else. You assemble validation, auth, and an
      <span class="abbr-link" data-abbr="ORM">ORM</span> yourself. Express 5
      finally shipped after years on 4.x, modernizing async error handling.
    use_cases:
      - "Lightweight REST APIs and microservices in Node."
      - "Prototypes and glue services where you want minimal ceremony."
      - "Teaching the fundamentals of HTTP routing and middleware."
    prerequisites:
      - { name: "JavaScript", slug: "javascript" }
      - { name: "Node.js", slug: "node-js" }
    key_features:
      - "Minimal core: routing plus a middleware chain."
      - "Enormous ecosystem of compatible middleware packages."
      - "Express 5 awaits rejected promises in route handlers."
      - "Runs almost anywhere Node does."
    pairs_well_with:
      - { name: "TypeScript", slug: "typescript" }
      - { name: "Prisma", slug: "prisma" }
      - { name: "PostgreSQL", slug: "postgresql" }
    alternatives:
      - { name: "Fastify", slug: "fastify" }
      - { name: "Hono", slug: "hono" }
      - { name: "NestJS", slug: "nestjs" }
    example:
      lang: "js"
      code: |-
        const app = require('express')();
        app.get('/', (req, res) => res.send('hello'));
        app.listen(3000);
      explain: >
        A complete Express server — register a GET route handler, then listen on
        port 3000.
    gotchas: >
      Unopinionated means *you* own every decision — validation, structure, and
      error handling are bolt-ons, so large Express codebases drift in style.
      Most middleware is community-maintained and varies in quality; vet what you
      depend on.
    maintained_by: "OpenJS Foundation + OSS community"
    language: "JavaScript"
    license: "MIT"
    docs:
      - { label: "expressjs.com", url: "https://expressjs.com" }

  - name: "Fastify"
    slug: "fastify"
    tagline: "Fast, low-overhead Node framework built around JSON schemas."
    layer: [backend]
    maturity: mainstream
    learning_curve: moderate
    first_released: 2016
    description: >
      A Node.js web framework focused on throughput and developer experience.
      Its headline feature is schema-based validation and serialization — you
      declare a JSON Schema per route and Fastify validates input and compiles a
      fast serializer for the response, which also feeds automatic
      <span class="abbr-link" data-abbr="OpenAPI">OpenAPI</span> docs.
    use_cases:
      - "High-throughput REST APIs where Express overhead matters."
      - "Services that benefit from schema validation and typed routes."
      - "Plugin-structured apps using Fastify's encapsulation model."
    prerequisites:
      - { name: "JavaScript", slug: "javascript" }
      - { name: "Node.js", slug: "node-js" }
      - { name: "TypeScript", slug: "typescript" }
    key_features:
      - "JSON Schema validation and compiled fast serialization."
      - "Encapsulated plugin architecture for modular apps."
      - "Strong TypeScript support and route type inference."
      - "Lifecycle hooks and built-in structured logging (Pino)."
    pairs_well_with:
      - { name: "TypeScript", slug: "typescript" }
      - { name: "Prisma", slug: "prisma" }
      - { name: "PostgreSQL", slug: "postgresql" }
    alternatives:
      - { name: "Express", slug: "express" }
      - { name: "NestJS", slug: "nestjs" }
      - { name: "Hono", slug: "hono" }
    example:
      lang: "js"
      code: |-
        const app = require('fastify')();
        app.get('/', async () => ({ hello: 'world' }));
        app.listen({ port: 3000 });
      explain: >
        A Fastify server — return a plain object from an async handler and
        Fastify serializes it to JSON automatically.
    gotchas: >
      The schema-first model is the win and the friction — skipping schemas
      throws away most of Fastify's speed and type safety. Its plugin
      encapsulation (decorators, `register` scope) is powerful but trips up
      newcomers expecting Express-style global middleware.
    maintained_by: "Fastify team (OpenJS Foundation) + OSS"
    language: "JavaScript"
    license: "MIT"
    docs:
      - { label: "fastify.dev", url: "https://fastify.dev" }

  - name: "NestJS"
    slug: "nestjs"
    tagline: "Opinionated, Angular-inspired TypeScript backend framework."
    layer: [backend]
    maturity: mainstream
    learning_curve: steep
    first_released: 2017
    description: >
      A structured, opinionated Node.js framework written in TypeScript whose
      architecture borrows heavily from Angular — modules, providers, and
      dependency injection. It runs on top of Express or Fastify and adds a
      consistent project structure plus first-class support for
      <span class="abbr-link" data-abbr="REST">REST</span>,
      <span class="abbr-link" data-abbr="GraphQL">GraphQL</span>, WebSockets, and
      microservices.
    use_cases:
      - "Large, long-lived backends where structure and conventions matter."
      - "Enterprise teams wanting DI, modules, and testability out of the box."
      - "APIs spanning REST, GraphQL, and microservice transports."
    prerequisites:
      - { name: "TypeScript", slug: "typescript" }
      - { name: "Node.js", slug: "node-js" }
      - { name: "JavaScript", slug: "javascript" }
    key_features:
      - "Dependency injection and modular architecture (Angular-style)."
      - "Decorators for controllers, routes, guards, and pipes."
      - "Runs on Express or Fastify adapters interchangeably."
      - "First-class REST, GraphQL, WebSocket, and microservice support."
    pairs_well_with:
      - { name: "TypeScript", slug: "typescript" }
      - { name: "Prisma", slug: "prisma" }
      - { name: "TypeORM", slug: "typeorm" }
      - { name: "GraphQL Yoga", slug: "graphql-yoga" }
    alternatives:
      - { name: "Express", slug: "express" }
      - { name: "Fastify", slug: "fastify" }
      - { name: "FastAPI", slug: "fastapi" }
    example:
      lang: "ts"
      code: |-
        @Controller('cats')
        export class CatsController {
          @Get()
          findAll(): string { return 'all cats'; }
        }
      explain: >
        A NestJS controller — the @Controller and @Get decorators wire the class
        method to the GET /cats route.
    gotchas: >
      The heaviest learning curve of the Node frameworks — DI, modules,
      providers, decorators, and metadata reflection are a lot before you write
      real logic. Overkill for a small service, and the abstraction layers can
      obscure what plain Express would make obvious.
    maintained_by: "Kamil Myśliwiec + OSS community"
    language: "TypeScript"
    license: "MIT"
    docs:
      - { label: "nestjs.com", url: "https://nestjs.com" }

  - name: "Hono"
    slug: "hono"
    tagline: "Ultrafast web framework that runs on any JS runtime."
    layer: [backend]
    maturity: rising
    learning_curve: gentle
    first_released: 2021
    description: >
      A tiny, ultrafast web framework with an Express-like
      <span class="abbr-link" data-abbr="API">API</span> that runs on virtually
      any JavaScript runtime — Cloudflare Workers, Deno, Bun, Node, and other
      edge platforms — from a single codebase. It leans on Web Standard
      `Request`/`Response` objects, which is what makes it portable to edge
      runtimes that lack Node APIs.
    use_cases:
      - "Edge APIs on Cloudflare Workers, Deno Deploy, or Bun."
      - "Portable services you want to run on multiple runtimes."
      - "Latency-sensitive endpoints close to the user."
    prerequisites:
      - { name: "JavaScript", slug: "javascript" }
      - { name: "TypeScript", slug: "typescript" }
    key_features:
      - "Runs on Workers, Deno, Bun, Node — one codebase."
      - "Built on Web Standard Request/Response, not Node-only APIs."
      - "Tiny footprint and a very fast router (RegExpRouter)."
      - "Typed middleware, RPC mode, and validators built in."
    pairs_well_with:
      - { name: "Cloudflare Workers", slug: "cloudflare-workers" }
      - { name: "Bun", slug: "bun" }
      - { name: "Deno", slug: "deno" }
      - { name: "Drizzle", slug: "drizzle" }
    alternatives:
      - { name: "Express", slug: "express" }
      - { name: "Fastify", slug: "fastify" }
      - { name: "Cloudflare Workers", slug: "cloudflare-workers" }
    example:
      lang: "ts"
      code: |-
        import { Hono } from 'hono';
        const app = new Hono();
        app.get('/', (c) => c.text('hello'));
        export default app;
      explain: >
        A Hono app — handlers take a context `c` and return a Response; exporting
        it deploys straight to an edge runtime.
    gotchas: >
      Being runtime-agnostic means you must avoid Node-only APIs (`fs`,
      `process`) if you want the edge targets, and each platform has its own
      bindings and deploy story. The ecosystem is younger than Express's, so some
      integrations you'd take for granted aren't there yet.
    maintained_by: "Yusuke Wada + OSS community"
    language: "TypeScript"
    license: "MIT"
    docs:
      - { label: "hono.dev", url: "https://hono.dev" }

  - name: "Laravel"
    slug: "laravel"
    tagline: "PHP's batteries-included, developer-happiness framework."
    layer: [backend]
    maturity: industry-standard
    learning_curve: moderate
    first_released: 2011
    description: >
      The dominant full-stack PHP framework — opinionated and
      batteries-included, with the Eloquent
      <span class="abbr-link" data-abbr="ORM">ORM</span>, Blade templating,
      routing, queues, auth scaffolding, and a deep first-party ecosystem
      (Breeze, Sanctum, Livewire, Forge). It aims to make common web tasks
      elegant rather than make you wire libraries together.
    use_cases:
      - "Full-stack web apps and server-rendered sites in PHP."
      - "SaaS products needing auth, billing, queues, and admin fast."
      - "Teams that value convention and a cohesive first-party ecosystem."
    prerequisites:
      - { name: "PHP", slug: "php" }
      - { name: "Composer", slug: "composer" }
      - { name: "SQL", slug: "" }
    key_features:
      - "Eloquent ORM with expressive Active Record models."
      - "Blade templating and Artisan CLI scaffolding."
      - "Built-in queues, scheduling, events, and broadcasting."
      - "Cohesive first-party stack: Breeze, Sanctum, Livewire, Forge."
    pairs_well_with:
      - { name: "MySQL", slug: "mysql" }
      - { name: "PostgreSQL", slug: "postgresql" }
      - { name: "Alpine.js", slug: "alpine-js" }
      - { name: "Redis", slug: "redis" }
    alternatives:
      - { name: "Django", slug: "django" }
      - { name: "NestJS", slug: "nestjs" }
    example:
      lang: "bash"
      code: "composer create-project laravel/laravel my-app"
      explain: >
        Scaffold a fresh Laravel application with Composer, PHP's package
        manager.
    gotchas: >
      The convenience comes with "magic" — facades, service-container
      auto-resolution, and Eloquent's Active Record hide a lot, which is
      productive until you need to debug or optimize it. Eloquent's lazy loading
      makes N+1 query problems easy to write accidentally.
    maintained_by: "Taylor Otwell / Laravel LLC + OSS"
    language: "PHP"
    license: "MIT"
    docs:
      - { label: "laravel.com", url: "https://laravel.com" }

  - name: "Django"
    slug: "django"
    tagline: "Python's batteries-included framework with a killer admin."
    layer: [backend]
    maturity: industry-standard
    learning_curve: moderate
    first_released: 2005
    description: >
      A mature, batteries-included Python web framework following a
      "model–template–view" pattern. It ships an
      <span class="abbr-link" data-abbr="ORM">ORM</span>, an auto-generated admin
      interface, auth, migrations, forms, and security defaults out of the box —
      famous for letting you build a data-driven site fast without choosing a
      stack of libraries.
    use_cases:
      - "Content- and data-heavy sites needing a real admin interface."
      - "Full-stack Python web apps and server-rendered pages."
      - "REST APIs via Django REST Framework on top of the ORM."
    prerequisites:
      - { name: "Python", slug: "python" }
      - { name: "SQL", slug: "" }
    key_features:
      - "Powerful ORM with migrations baked in."
      - "Auto-generated admin site from your models."
      - "Built-in auth, forms, sessions, and security middleware."
      - "Async views and a huge package ecosystem (DRF, Channels)."
    pairs_well_with:
      - { name: "PostgreSQL", slug: "postgresql" }
      - { name: "Redis", slug: "redis" }
      - { name: "htmx", slug: "htmx" }
      - { name: "Python", slug: "python" }
    alternatives:
      - { name: "FastAPI", slug: "fastapi" }
      - { name: "Laravel", slug: "laravel" }
    example:
      lang: "bash"
      code: "django-admin startproject mysite && python manage.py runserver"
      explain: >
        Scaffold a Django project and start the development server on
        localhost:8000.
    gotchas: >
      It's opinionated and monolithic — great when your app fits the
      model-template-view mold, heavier than you want for a tiny JSON API (where
      FastAPI fits better). The synchronous ORM is the historical core; async
      support exists but isn't as seamless as a from-scratch async framework.
    maintained_by: "Django Software Foundation + OSS"
    language: "Python"
    license: "BSD-3-Clause"
    docs:
      - { label: "djangoproject.com", url: "https://www.djangoproject.com" }

  - name: "FastAPI"
    slug: "fastapi"
    tagline: "Async Python APIs driven by type hints, with free OpenAPI docs."
    layer: [backend]
    maturity: rising
    learning_curve: gentle
    first_released: 2018
    description: >
      A modern, high-performance Python framework for building
      <span class="abbr-link" data-abbr="API">APIs</span>, built on Starlette and
      Pydantic. You annotate function parameters with Python type hints and
      FastAPI uses them to validate requests, serialize responses, and generate
      interactive <span class="abbr-link" data-abbr="OpenAPI">OpenAPI</span> docs
      automatically — all async-first.
    use_cases:
      - "Async JSON APIs and microservices in Python."
      - "ML/data-science model serving with typed request bodies."
      - "Any API where auto-generated OpenAPI docs save time."
    prerequisites:
      - { name: "Python", slug: "python" }
    key_features:
      - "Type-hint-driven request validation via Pydantic."
      - "Automatic interactive OpenAPI/Swagger documentation."
      - "Async-first on the ASGI standard (Starlette under the hood)."
      - "Dependency-injection system for shared logic and auth."
    pairs_well_with:
      - { name: "Python", slug: "python" }
      - { name: "PostgreSQL", slug: "postgresql" }
      - { name: "Redis", slug: "redis" }
      - { name: "htmx", slug: "htmx" }
    alternatives:
      - { name: "Django", slug: "django" }
      - { name: "Express", slug: "express" }
    example:
      lang: "python"
      code: |-
        from fastapi import FastAPI
        app = FastAPI()

        @app.get("/")
        def root():
            return {"hello": "world"}
      explain: >
        A FastAPI app — the return value is serialized to JSON, and an
        interactive docs page is generated automatically at /docs.
    gotchas: >
      "Fast to write" doesn't include the data layer — FastAPI has no built-in
      ORM, so you bring SQLAlchemy/SQLModel and wire migrations yourself. Mixing
      sync and async code, or doing blocking I/O in an async route, quietly
      stalls the event loop.
    maintained_by: "Sebastián Ramírez + OSS community"
    language: "Python"
    license: "MIT"
    docs:
      - { label: "fastapi.tiangolo.com", url: "https://fastapi.tiangolo.com" }

  - name: "tRPC"
    slug: "trpc"
    tagline: "End-to-end typesafe APIs for TypeScript — no schema, no codegen."
    layer: [backend, fullstack]
    maturity: mainstream
    learning_curve: moderate
    first_released: 2020
    description: >
      A library for building end-to-end typesafe
      <span class="abbr-link" data-abbr="API">APIs</span> in a TypeScript
      codebase. Unlike <span class="abbr-link" data-abbr="REST">REST</span> or
      <span class="abbr-link" data-abbr="GraphQL">GraphQL</span>, there's no
      schema language or code generation — the server's procedure types flow
      directly to the client through TypeScript inference, so a backend change
      becomes a client-side type error instantly.
    use_cases:
      - "Full-stack TypeScript monorepos sharing one type system."
      - "Next.js apps wanting typed server calls without REST boilerplate."
      - "Teams that own both ends and want refactors to stay type-safe."
    prerequisites:
      - { name: "TypeScript", slug: "typescript" }
      - { name: "Node.js", slug: "node-js" }
    key_features:
      - "No schema, no codegen — types inferred from the server."
      - "Autocomplete and compile-time errors across the client/server boundary."
      - "Adapters for Next.js, Express, Fastify, and more."
      - "Pairs with TanStack Query for client-side caching."
    pairs_well_with:
      - { name: "Next.js", slug: "next-js" }
      - { name: "TypeScript", slug: "typescript" }
      - { name: "TanStack Query", slug: "tanstack-query" }
      - { name: "Prisma", slug: "prisma" }
    alternatives:
      - { name: "GraphQL Yoga", slug: "graphql-yoga" }
      - { name: "NestJS", slug: "nestjs" }
    example:
      lang: "ts"
      code: |-
        const appRouter = router({
          hello: publicProcedure.query(() => 'world'),
        });
        export type AppRouter = typeof appRouter;
      explain: >
        A tRPC router — exporting its type lets the client call
        `trpc.hello.query()` with full autocomplete and no manual API contract.
    gotchas: >
      It's TypeScript-to-TypeScript only — there's no public, language-agnostic
      contract, so it's a poor fit for third-party consumers, mobile teams on
      other stacks, or public APIs (reach for REST/GraphQL there). The magic also
      tightly couples client and server, which only works in a shared codebase.
    maintained_by: "Alex Johansson + OSS community"
    language: "TypeScript"
    license: "MIT"
    docs:
      - { label: "trpc.io", url: "https://trpc.io" }

  - name: "GraphQL Yoga"
    slug: "graphql-yoga"
    tagline: "A batteries-included, spec-compliant GraphQL server."
    layer: [backend]
    maturity: mainstream
    learning_curve: moderate
    first_released: 2018
    description: >
      A fully-featured <span class="abbr-link" data-abbr="GraphQL">GraphQL</span>
      server from The Guild, built on the GraphQL.js reference implementation. It
      is runtime-agnostic (Node, Bun, Deno, Workers) thanks to Web Standard
      `Request`/`Response`, ships sensible defaults — subscriptions, file
      uploads, and a built-in GraphiQL explorer — and plugs into the Envelop
      plugin ecosystem.
    use_cases:
      - "Standing up a GraphQL API server with minimal config."
      - "Graphs that need subscriptions, uploads, or the Envelop plugin system."
      - "GraphQL endpoints on edge runtimes alongside Node."
    prerequisites:
      - { name: "JavaScript", slug: "javascript" }
      - { name: "TypeScript", slug: "typescript" }
      - { name: "Node.js", slug: "node-js" }
    key_features:
      - "Spec-compliant on the GraphQL.js reference implementation."
      - "Runtime-agnostic: Node, Bun, Deno, Cloudflare Workers."
      - "Subscriptions, file uploads, and GraphiQL built in."
      - "Extensible via the Envelop plugin ecosystem."
    pairs_well_with:
      - { name: "TypeScript", slug: "typescript" }
      - { name: "Apollo Client", slug: "apollo-client" }
      - { name: "Prisma", slug: "prisma" }
      - { name: "NestJS", slug: "nestjs" }
    alternatives:
      - { name: "tRPC", slug: "trpc" }
      - { name: "NestJS", slug: "nestjs" }
    example:
      lang: "ts"
      code: |-
        import { createYoga, createSchema } from 'graphql-yoga';
        const yoga = createYoga({
          schema: createSchema({ typeDefs: 'type Query { hello: String }', resolvers: { Query: { hello: () => 'world' } } }),
        });
      explain: >
        A Yoga server from a schema and resolvers — serve the `yoga` handler from
        any runtime to expose the GraphQL endpoint plus GraphiQL.
    gotchas: >
      Yoga is the *server* — you still design the schema and write resolvers, and
      GraphQL's own footguns (N+1 resolver queries needing DataLoader, query-depth
      and complexity limits to prevent abuse) are on you. For simple typed
      internal APIs, tRPC is often less ceremony.
    maintained_by: "The Guild + OSS community"
    language: "TypeScript"
    license: "MIT"
    docs:
      - { label: "the-guild.dev/graphql/yoga-server", url: "https://the-guild.dev/graphql/yoga-server" }

  - name: "Ruby on Rails"
    slug: "ruby-on-rails"
    tagline: "The original convention-over-configuration fullstack framework."
    layer: [backend, fullstack]
    maturity: industry-standard
    learning_curve: moderate
    first_released: 2004
    description: >
      The opinionated, batteries-included Ruby framework that popularized
      convention over configuration and MVC for the web. It bundles an ORM
      (Active Record), routing, mailers, jobs, and asset handling, and recent
      versions lean into Hotwire (Turbo + Stimulus) to ship rich, mostly
      server-rendered UIs with minimal JavaScript.
    use_cases:
      - "Rapidly building CRUD-heavy web apps and MVPs."
      - "Monolithic SaaS products where developer velocity matters."
      - "Server-rendered apps with Hotwire instead of a heavy SPA."
    prerequisites:
      - { name: "Ruby", slug: "ruby" }
      - { name: "HTML", slug: "html" }
      - { name: "SQL", slug: "sql" }
    key_features:
      - "Active Record ORM with migrations and associations."
      - "Convention over configuration — sane defaults, less wiring."
      - "Hotwire (Turbo + Stimulus) for SPA-like UX, server-rendered."
      - "Generators, mailers, background jobs, and a mature ecosystem of gems."
    pairs_well_with:
      - { name: "PostgreSQL", slug: "postgresql" }
      - { name: "Redis", slug: "redis" }
      - { name: "Hotwire", slug: "" }
    alternatives:
      - { name: "Laravel", slug: "laravel" }
      - { name: "Django", slug: "django" }
      - { name: "ASP.NET Core", slug: "aspnet-core" }
    example:
      lang: "bash"
      code: "rails generate scaffold Post title:string body:text"
      explain: >
        One generator command scaffolds the model, migration, controller, and
        views for a Post resource end to end.
    gotchas: >
      The conventions are productive until you fight them — Active Record makes
      N+1 queries and runaway callbacks easy, and the heavy reliance on magic and
      metaprogramming can make large apps hard to reason about. Boot time and
      memory use are also high relative to leaner stacks.
    maintained_by: "Rails core team + OSS"
    language: "Ruby"
    license: "MIT"
    docs:
      - { label: "rubyonrails.org", url: "https://rubyonrails.org" }

  - name: "Flask"
    slug: "flask"
    tagline: "Python's minimal, unopinionated micro-framework."
    layer: [backend]
    maturity: mainstream
    learning_curve: gentle
    first_released: 2010
    description: >
      A lightweight Python micro-framework that gives you routing, request
      handling, and templating (Jinja2) and stays out of your way for everything
      else. You add an ORM, validation, and auth as extensions, making it ideal
      for small services where you want to choose your own components.
    use_cases:
      - "Small to medium web apps and internal tools."
      - "Lightweight REST APIs and microservices."
      - "Prototypes where you want minimal structure imposed."
    prerequisites:
      - { name: "Python", slug: "python" }
      - { name: "HTML", slug: "html" }
    key_features:
      - "Minimal core — routing plus Jinja2 templating, little else."
      - "Extension ecosystem (SQLAlchemy, Migrate, Login) for the rest."
      - "Werkzeug WSGI foundation with a simple, readable API."
    pairs_well_with:
      - { name: "SQLAlchemy", slug: "sqlalchemy" }
      - { name: "PostgreSQL", slug: "postgresql" }
      - { name: "htmx", slug: "htmx" }
    alternatives:
      - { name: "FastAPI", slug: "fastapi" }
      - { name: "Django", slug: "django" }
      - { name: "Express", slug: "express" }
    example:
      lang: "py"
      code: |-
        from flask import Flask
        app = Flask(__name__)
        @app.route("/")
        def home(): return "Hello"
      explain: >
        A minimal Flask app — the route decorator maps a URL to a view function
        that returns the response.
    gotchas: >
      Flask is synchronous and WSGI-based, so high-concurrency async workloads
      fit FastAPI better. Being unopinionated means every project wires up the
      ORM, validation, and structure differently, which can hurt consistency
      across teams.
    maintained_by: "Pallets + OSS"
    language: "Python"
    license: "BSD-3-Clause"
    docs:
      - { label: "flask.palletsprojects.com", url: "https://flask.palletsprojects.com" }

  - name: "Spring Boot"
    slug: "spring-boot"
    tagline: "Convention-driven Spring for production-ready Java services."
    layer: [backend]
    maturity: industry-standard
    learning_curve: steep
    first_released: 2014
    description: >
      The opinionated layer over the Spring framework that makes Java backends
      production-ready with minimal configuration — auto-configuration, embedded
      servers, and starter dependencies replace mountains of XML. It's the
      default for enterprise JVM services, with deep support for data access,
      security, messaging, and observability.
    use_cases:
      - "Large enterprise REST and microservice backends on the JVM."
      - "Systems needing robust transactions, security, and messaging."
      - "Teams standardized on Java/Kotlin with strong tooling needs."
    prerequisites:
      - { name: "Java", slug: "" }
      - { name: "SQL", slug: "sql" }
    key_features:
      - "Auto-configuration and starter dependencies — little boilerplate."
      - "Embedded Tomcat/Netty so apps run as a self-contained jar."
      - "Spring Data, Security, and Actuator for data, auth, and metrics."
      - "GraalVM native-image support for fast startup and low memory."
    pairs_well_with:
      - { name: "PostgreSQL", slug: "postgresql" }
      - { name: "Kubernetes", slug: "kubernetes" }
      - { name: "Kafka", slug: "" }
    alternatives:
      - { name: "ASP.NET Core", slug: "aspnet-core" }
      - { name: "NestJS", slug: "nestjs" }
      - { name: "Quarkus", slug: "" }
    example:
      lang: "java"
      code: |-
        @RestController
        class HelloController {
          @GetMapping("/") String home() { return "Hello"; }
        }
      explain: >
        A REST controller — the @GetMapping annotation binds the method to a URL
        and Spring serializes the return value as the response.
    gotchas: >
      Power comes with weight — the dependency-injection container, annotation
      magic, and layered abstractions are a lot to learn, and the framework's
      depth means subtle auto-configuration surprises. Startup time and memory
      are heavy unless you adopt GraalVM native images.
    maintained_by: "VMware/Broadcom + OSS"
    language: "Java"
    license: "Apache-2.0"
    docs:
      - { label: "spring.io/projects/spring-boot", url: "https://spring.io/projects/spring-boot" }

  - name: "ASP.NET Core"
    slug: "aspnet-core"
    tagline: "Microsoft's fast, cross-platform fullstack web framework."
    layer: [backend, fullstack]
    maturity: industry-standard
    learning_curve: moderate
    first_released: 2016
    description: >
      A high-performance, cross-platform framework for building APIs and web apps
      on .NET, running on Linux, macOS, and Windows. It spans minimal APIs, MVC,
      Razor Pages, and the Blazor component model (including server and
      WebAssembly), backed by strong tooling and consistently top-tier benchmarks.
    use_cases:
      - "High-throughput REST and gRPC APIs on .NET."
      - "Enterprise web apps with MVC or Razor Pages."
      - "Interactive UIs in C# via Blazor instead of JavaScript."
    prerequisites:
      - { name: "C#", slug: "csharp" }
      - { name: "SQL", slug: "sql" }
    key_features:
      - "Minimal APIs and MVC on one cross-platform runtime."
      - "Blazor for C# component UIs (server + WebAssembly)."
      - "Built-in DI, configuration, logging, and middleware pipeline."
      - "Top-tier performance with Kestrel and AOT compilation."
    pairs_well_with:
      - { name: "Entity Framework Core", slug: "" }
      - { name: "PostgreSQL", slug: "postgresql" }
      - { name: "Azure", slug: "azure" }
    alternatives:
      - { name: "Spring Boot", slug: "spring-boot" }
      - { name: "NestJS", slug: "nestjs" }
      - { name: "Express", slug: "express" }
    example:
      lang: "csharp"
      code: |-
        var app = WebApplication.Create(args);
        app.MapGet("/", () => "Hello");
        app.Run();
      explain: >
        A minimal-API app — MapGet binds a route to a lambda and Run() starts the
        Kestrel server.
    gotchas: >
      The framework spans several UI models — minimal APIs, MVC, Razor Pages,
      Blazor Server, Blazor WASM — and picking the wrong one for your use case is
      a costly detour. Blazor WebAssembly in particular ships a sizable .NET
      runtime, so first-load size needs attention.
    maintained_by: "Microsoft + .NET Foundation"
    language: "C#"
    license: "MIT"
    docs:
      - { label: "learn.microsoft.com/aspnet/core", url: "https://learn.microsoft.com/aspnet/core" }

  - name: "Koa"
    slug: "koa"
    tagline: "Express's successor — tiny, middleware-first, async/await native."
    layer: [backend]
    maturity: mainstream
    learning_curve: gentle
    first_released: 2013
    description: >
      A minimal Node web framework from the Express creators, built around
      async/await and a clean middleware-cascade model. Its core ships almost
      nothing — no router or body parser — so you compose exactly the middleware
      you need, with a `ctx` object wrapping request and response.
    use_cases:
      - "Lightweight APIs where you want full control over middleware."
      - "Modern async/await codebases avoiding Express callback patterns."
      - "A minimal base to compose your own framework on top of."
    prerequisites:
      - { name: "JavaScript", slug: "javascript" }
      - { name: "Node.js", slug: "node-js" }
    key_features:
      - "Async/await-native middleware with an elegant downstream/upstream cascade."
      - "Tiny core — bring your own router, body parser, and helpers."
      - "Single `ctx` object encapsulating request and response."
    pairs_well_with:
      - { name: "Node.js", slug: "node-js" }
      - { name: "TypeScript", slug: "typescript" }
    alternatives:
      - { name: "Express", slug: "express" }
      - { name: "Fastify", slug: "fastify" }
      - { name: "Hono", slug: "hono" }
    example:
      lang: "js"
      code: |-
        const app = new Koa();
        app.use(async (ctx) => { ctx.body = "Hello"; });
        app.listen(3000);
      explain: >
        A Koa app with one async middleware that sets the response body on the
        shared ctx object.
    gotchas: >
      The minimal core is a double-edged sword — you assemble routing, body
      parsing, and validation from separate packages, and the ecosystem is far
      smaller than Express's. Momentum has also slowed as Fastify and Hono draw
      attention.
    maintained_by: "Koa team (Express creators)"
    language: "JavaScript"
    license: "MIT"
    docs:
      - { label: "koajs.com", url: "https://koajs.com" }

  - name: "Elysia"
    slug: "elysia"
    tagline: "Bun-first, end-to-end type-safe framework with blazing throughput."
    layer: [backend]
    maturity: rising
    learning_curve: gentle
    first_released: 2022
    description: >
      A TypeScript web framework built for Bun that pairs extreme performance
      with end-to-end type safety. Its schema-driven design validates and types
      requests automatically, and the Eden client gives the frontend fully typed
      calls to the backend — a tRPC-like experience over plain HTTP.
    use_cases:
      - "High-throughput APIs running on the Bun runtime."
      - "End-to-end typed fullstack apps via the Eden client."
      - "Greenfield TypeScript services wanting modern ergonomics."
    prerequisites:
      - { name: "TypeScript", slug: "typescript" }
      - { name: "Bun", slug: "bun" }
    key_features:
      - "Schema-first validation that also infers request/response types."
      - "Eden client for end-to-end type-safe API calls."
      - "Very high throughput on Bun; plugin system for auth, CORS, swagger."
    pairs_well_with:
      - { name: "Bun", slug: "bun" }
      - { name: "TypeScript", slug: "typescript" }
      - { name: "Drizzle", slug: "drizzle" }
    alternatives:
      - { name: "Hono", slug: "hono" }
      - { name: "Fastify", slug: "fastify" }
      - { name: "tRPC", slug: "trpc" }
    example:
      lang: "ts"
      code: |-
        new Elysia()
          .get("/", () => "Hello")
          .listen(3000);
      explain: >
        An Elysia app with one route — the fluent builder registers the handler
        and starts the Bun server on port 3000.
    gotchas: >
      Elysia is Bun-first — running it on Node loses some performance and
      features, so it ties you to that runtime. It's young and fast-moving, so
      APIs still shift between versions and the plugin ecosystem is smaller than
      Express's or Fastify's.
    maintained_by: "SaltyAom + OSS"
    language: "TypeScript"
    license: "MIT"
    docs:
      - { label: "elysiajs.com", url: "https://elysiajs.com" }

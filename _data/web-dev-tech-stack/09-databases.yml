batch:
  id: "databases"
  order: 9
  name: "Databases & Datastores"
  short_name: "Databases"
  description: >
    Where the data lives — the battle-tested relational engines (PostgreSQL,
    MySQL, SQLite), the document and key-value stores (MongoDB, Redis), and the
    managed/serverless platforms that wrap them with auth, realtime, and
    branching (Firestore, Supabase, PlanetScale, Neon). Watch the licenses here:
    several once-open stores moved to source-available terms.
  last_updated: "2026-06-27"

entries:
  - name: "PostgreSQL"
    slug: "postgresql"
    tagline: "The world's most advanced open-source relational database."
    layer: [database]
    maturity: industry-standard
    learning_curve: moderate
    first_released: 1996
    description: >
      The default open-source relational database for new projects — a mature,
      standards-compliant SQL engine known for correctness, extensibility, and a
      deep feature set: rich types (JSONB, arrays, ranges), full-text search,
      window functions, and an extension ecosystem (PostGIS, pgvector). Most
      modern <span class="abbr-link" data-abbr="ORM">ORMs</span> and serverless
      platforms target it first.
    use_cases:
      - "The default relational store for new web and SaaS backends."
      - "Workloads mixing relational data with JSON or vector/geo queries."
      - "Anything needing strong ACID guarantees and complex queries."
    prerequisites:
      - { name: "SQL", slug: "" }
    key_features:
      - "Full ACID compliance and rich SQL (window functions, CTEs)."
      - "JSONB for schemaless data alongside relational tables."
      - "Extensions: PostGIS (geo), pgvector (embeddings), and more."
      - "MVCC concurrency and robust replication."
    pairs_well_with:
      - { name: "Prisma", slug: "prisma" }
      - { name: "Drizzle", slug: "drizzle" }
      - { name: "Supabase", slug: "supabase" }
      - { name: "Neon", slug: "neon" }
    alternatives:
      - { name: "MySQL", slug: "mysql" }
      - { name: "SQLite", slug: "sqlite" }
      - { name: "MongoDB", slug: "mongodb" }
    example:
      lang: "sql"
      code: |-
        CREATE TABLE users (id serial PRIMARY KEY, email text UNIQUE);
        INSERT INTO users (email) VALUES ('a@b.com');
      explain: >
        Create a table with an auto-incrementing primary key and a unique
        constraint, then insert a row.
    gotchas: >
      Connection-heavy: each connection is a process, so serverless functions
      that open connections per-invocation exhaust the server — you need a pooler
      (PgBouncer, or a platform like Neon/Supabase that bundles one). Tuning
      `VACUUM` and autovacuum on write-heavy tables is a real operational concern.
    maintained_by: "PostgreSQL Global Development Group"
    language: "C"
    license: "PostgreSQL License"
    docs:
      - { label: "postgresql.org/docs", url: "https://www.postgresql.org/docs/" }

  - name: "MySQL"
    slug: "mysql"
    tagline: "The ubiquitous open-source relational database."
    layer: [database]
    maturity: industry-standard
    learning_curve: moderate
    first_released: 1995
    description: >
      One of the most widely deployed relational databases, the "M" in the
      classic LAMP stack and the default behind much of the PHP web. Owned by
      Oracle and dual-licensed (GPL plus a commercial license), with the
      community-driven fork MariaDB as a drop-in alternative. Reliable, fast on
      read-heavy workloads, and supported by every host and
      <span class="abbr-link" data-abbr="ORM">ORM</span>.
    use_cases:
      - "Classic LAMP / PHP web apps and WordPress sites."
      - "Read-heavy applications with well-understood schemas."
      - "Projects on hosts where MySQL is the default offering."
    prerequisites:
      - { name: "SQL", slug: "" }
    key_features:
      - "ACID transactions via the InnoDB storage engine."
      - "Mature replication and broad hosting support everywhere."
      - "Pluggable storage engines (InnoDB, MyISAM)."
      - "MariaDB fork as a drop-in, fully open alternative."
    pairs_well_with:
      - { name: "Laravel", slug: "laravel" }
      - { name: "PlanetScale", slug: "planetscale" }
      - { name: "Prisma", slug: "prisma" }
      - { name: "PHP", slug: "php" }
    alternatives:
      - { name: "PostgreSQL", slug: "postgresql" }
      - { name: "SQLite", slug: "sqlite" }
      - { name: "PlanetScale", slug: "planetscale" }
    example:
      lang: "sql"
      code: |-
        CREATE TABLE users (id INT AUTO_INCREMENT PRIMARY KEY, email VARCHAR(255) UNIQUE);
        INSERT INTO users (email) VALUES ('a@b.com');
      explain: >
        Create a table with an auto-incrementing key and insert a row — note
        MySQL's AUTO_INCREMENT and VARCHAR length versus Postgres.
    gotchas: >
      Feature parity with Postgres lags in places — historically weaker support
      for advanced SQL, stricter SQL-mode quirks, and gotchas around default
      character sets (use `utf8mb4`, not the legacy `utf8`, for full Unicode).
      The dual GPL/commercial license matters if you embed or redistribute it.
    maintained_by: "Oracle Corporation"
    language: "C++"
    license: "GPL-2.0"
    docs:
      - { label: "dev.mysql.com/doc", url: "https://dev.mysql.com/doc/" }

  - name: "SQLite"
    slug: "sqlite"
    tagline: "A zero-config, embedded SQL database in a single file."
    layer: [database]
    maturity: industry-standard
    learning_curve: gentle
    first_released: 2000
    description: >
      A self-contained, serverless, zero-configuration SQL database engine — the
      entire database is a single file on disk and the engine is a library linked
      into your app, with no separate process to run. It is the most widely
      deployed database in the world (every phone, browser, and OS ships it) and
      is increasingly used for production web apps at the edge.
    use_cases:
      - "Embedded storage in mobile, desktop, and CLI apps."
      - "Local development, tests, and prototypes — no server to run."
      - "Edge / low-traffic web apps (often via Turso/libSQL or LiteFS)."
    prerequisites:
      - { name: "SQL", slug: "" }
    key_features:
      - "Entire database is one portable file; no server process."
      - "Zero configuration — link the library and open a file."
      - "Full transactional ACID even across crashes."
      - "Tiny, public-domain, and embedded almost everywhere."
    pairs_well_with:
      - { name: "Drizzle", slug: "drizzle" }
      - { name: "Prisma", slug: "prisma" }
      - { name: "Bun", slug: "bun" }
    alternatives:
      - { name: "PostgreSQL", slug: "postgresql" }
      - { name: "MySQL", slug: "mysql" }
    example:
      lang: "bash"
      code: "sqlite3 app.db 'CREATE TABLE users(id INTEGER PRIMARY KEY, email TEXT);'"
      explain: >
        Create (or open) the file app.db and run SQL against it with the sqlite3
        CLI — no server needed.
    gotchas: >
      Single-writer by design — concurrent writes serialize, so it's a poor fit
      for write-heavy, high-concurrency multi-user backends without a layer like
      libSQL/Turso. It's also loosely typed by default (type affinity, not strict
      types) unless you opt into `STRICT` tables.
    maintained_by: "D. Richard Hipp / SQLite Consortium"
    language: "C"
    license: "Public Domain"
    docs:
      - { label: "sqlite.org/docs.html", url: "https://www.sqlite.org/docs.html" }

  - name: "MongoDB"
    slug: "mongodb"
    tagline: "The popular document database for flexible, JSON-like data."
    layer: [database]
    maturity: mainstream
    learning_curve: moderate
    first_released: 2009
    description: >
      A document-oriented <span class="abbr-link" data-abbr="NoSQL">NoSQL</span>
      database that stores records as flexible, JSON-like BSON documents instead
      of rows in tables — so the schema can vary per document and nested data
      lives together. Popular for its developer-friendly model and horizontal
      scaling; its managed Atlas service is the common way to run it. Licensed
      under the source-available SSPL, not an OSI-approved open-source license.
    use_cases:
      - "Apps with flexible or rapidly-evolving schemas."
      - "Content, catalogs, and event data that fit a document shape."
      - "Horizontally-scaled workloads via sharding (often on Atlas)."
    prerequisites:
      - { name: "JavaScript", slug: "javascript" }
    key_features:
      - "Flexible JSON-like (BSON) documents, no fixed schema."
      - "Aggregation pipeline for complex transformations."
      - "Built-in sharding for horizontal scale and replica sets."
      - "Managed Atlas service with search and vector search."
    pairs_well_with:
      - { name: "Mongoose", slug: "mongoose" }
      - { name: "Express", slug: "express" }
      - { name: "Node.js", slug: "node-js" }
    alternatives:
      - { name: "PostgreSQL", slug: "postgresql" }
      - { name: "Firebase Firestore", slug: "firestore" }
    example:
      lang: "js"
      code: |-
        db.users.insertOne({ email: 'a@b.com', roles: ['admin'] });
      explain: >
        Insert a document into the users collection — note the nested array;
        there's no table schema to declare first.
    gotchas: >
      Schema flexibility is a double-edged sword — without discipline (or an ODM
      like Mongoose) data drifts into inconsistent shapes. Multi-document
      transactions exist but cost more than in a relational DB, and modeling
      relationships you'd join in SQL often means denormalizing. The SSPL license
      blocks offering MongoDB itself as a managed service.
    maintained_by: "MongoDB, Inc."
    language: "C++"
    license: "SSPL"
    docs:
      - { label: "mongodb.com/docs", url: "https://www.mongodb.com/docs/" }

  - name: "Redis"
    slug: "redis"
    tagline: "Blazing-fast in-memory key-value store, cache, and message broker."
    layer: [database]
    maturity: industry-standard
    learning_curve: moderate
    first_released: 2009
    description: >
      An in-memory data-structure store used as a cache, key-value database, and
      message broker. It keeps data in RAM (with optional persistence to disk)
      for sub-millisecond access, and offers rich types — strings, hashes, lists,
      sets, sorted sets, streams, and pub/sub. After a 2024 move to
      source-available terms, Redis 8 (2025) re-added the
      OSI-approved AGPLv3 as a
      license option.
    use_cases:
      - "Caching layer in front of a slower primary database."
      - "Sessions, rate limiting, and ephemeral counters."
      - "Job queues, pub/sub, leaderboards (sorted sets), and streams."
    prerequisites: []
    key_features:
      - "Sub-millisecond in-memory reads and writes."
      - "Rich data types: hashes, lists, sets, sorted sets, streams."
      - "Pub/sub and stream messaging primitives."
      - "Optional persistence (RDB snapshots, AOF) and replication."
    pairs_well_with:
      - { name: "PostgreSQL", slug: "postgresql" }
      - { name: "Django", slug: "django" }
      - { name: "Express", slug: "express" }
      - { name: "Laravel", slug: "laravel" }
    alternatives:
      - { name: "MongoDB", slug: "mongodb" }
      - { name: "PostgreSQL", slug: "postgresql" }
    example:
      lang: "bash"
      code: |-
        redis-cli SET session:42 "active" EX 3600
        redis-cli GET session:42
      explain: >
        Store a key with a 3600-second expiry, then read it back — typical
        session/cache usage from the Redis CLI.
    gotchas: >
      It's memory-bound — your dataset must fit in RAM, and eviction policies
      decide what gets dropped when it's full, so it's usually a cache or
      secondary store, not your system of record. The 2024–2025 license churn
      (SSPL/RSALv2, then AGPLv3 re-added in Redis 8) spawned the Valkey fork;
      check which license your distro/cloud ships.
    maintained_by: "Redis Ltd. + OSS community"
    language: "C"
    license: "AGPLv3 / RSALv2 / SSPL"
    docs:
      - { label: "redis.io/docs", url: "https://redis.io/docs/latest/" }

  - name: "Firebase Firestore"
    slug: "firestore"
    tagline: "Google's serverless document database with realtime sync."
    layer: [database]
    maturity: mainstream
    learning_curve: gentle
    first_released: 2017
    description: >
      A fully-managed, serverless <span class="abbr-link"
      data-abbr="NoSQL">NoSQL</span> document database from Google's Firebase
      <span class="abbr-link" data-abbr="PaaS">platform</span>. Clients subscribe
      to documents and queries and receive realtime updates as data changes, with
      offline caching on mobile and web. Access control lives in declarative
      security rules rather than a server, making it popular for client-driven
      apps without a backend.
    use_cases:
      - "Realtime apps — chat, collaboration, live dashboards."
      - "Mobile/web apps wanting offline sync with no server to run."
      - "MVPs that lean on Firebase Auth, Storage, and Functions together."
    prerequisites:
      - { name: "JavaScript", slug: "javascript" }
    key_features:
      - "Realtime listeners push changes to clients instantly."
      - "Offline persistence and automatic sync on reconnect."
      - "Declarative security rules instead of server-side authz."
      - "Tight integration with Firebase Auth, Storage, and Functions."
    pairs_well_with:
      - { name: "React", slug: "react" }
      - { name: "Next.js", slug: "next-js" }
      - { name: "Firebase Hosting", slug: "firebase-hosting" }
    alternatives:
      - { name: "Supabase", slug: "supabase" }
      - { name: "MongoDB", slug: "mongodb" }
    example:
      lang: "ts"
      code: |-
        import { collection, addDoc } from 'firebase/firestore';
        await addDoc(collection(db, 'users'), { email: 'a@b.com' });
      explain: >
        Add a document to the users collection from the client SDK — security
        rules, not a server, decide whether the write is allowed.
    gotchas: >
      It's proprietary lock-in and the data model bends queries — no joins, no
      arbitrary `WHERE`/aggregation, every multi-field query needs a composite
      index, and you denormalize heavily. Billing is per document read/write, so
      naive realtime listeners or fan-out writes can run up a surprising bill.
    maintained_by: "Google (Firebase / Google Cloud)"
    language: "proprietary (Go/C++ internally)"
    license: "proprietary"
    docs:
      - { label: "firebase.google.com/docs/firestore", url: "https://firebase.google.com/docs/firestore" }

  - name: "Supabase"
    slug: "supabase"
    tagline: "The open-source Firebase alternative, built on Postgres."
    layer: [database, backend]
    maturity: rising
    learning_curve: gentle
    first_released: 2020
    description: >
      An open-source backend-as-a-service that bundles a full PostgreSQL database
      with auth, file storage, edge functions, and realtime subscriptions —
      positioned as a Firebase alternative, but on a real relational engine you
      can query with SQL and take with you. It auto-generates a
      <span class="abbr-link" data-abbr="REST">REST</span> and GraphQL
      <span class="abbr-link" data-abbr="API">API</span> from your schema and
      enforces access with Postgres row-level security.
    use_cases:
      - "Full app backends wanting Postgres plus auth, storage, and realtime."
      - "Teams that want a Firebase-like DX without leaving SQL."
      - "Projects that may later self-host the open-source stack."
    prerequisites:
      - { name: "PostgreSQL", slug: "postgresql" }
      - { name: "SQL", slug: "" }
    key_features:
      - "A real Postgres database, queryable in plain SQL."
      - "Built-in auth, storage, edge functions, and realtime."
      - "Auto-generated REST and GraphQL APIs from your schema."
      - "Row-level security policies for client-direct access."
    pairs_well_with:
      - { name: "React", slug: "react" }
      - { name: "Next.js", slug: "next-js" }
      - { name: "Drizzle", slug: "drizzle" }
      - { name: "PostgreSQL", slug: "postgresql" }
    alternatives:
      - { name: "Firebase Firestore", slug: "firestore" }
      - { name: "Neon", slug: "neon" }
      - { name: "PlanetScale", slug: "planetscale" }
    example:
      lang: "ts"
      code: |-
        const { data } = await supabase.from('users').select('email');
      explain: >
        Query the users table from the client SDK — the call hits an
        auto-generated REST API and is gated by row-level security policies.
    gotchas: >
      The client-direct model lives or dies by row-level security — forget to
      enable RLS on a table and it's world-readable/writable. "Open-source" is
      true of the stack, but self-hosting the whole platform is non-trivial; most
      teams use the managed cloud and inherit its pricing.
    maintained_by: "Supabase, Inc. + OSS community"
    language: "TypeScript / Elixir / Go"
    license: "Apache-2.0"
    docs:
      - { label: "supabase.com/docs", url: "https://supabase.com/docs" }

  - name: "PlanetScale"
    slug: "planetscale"
    tagline: "Serverless MySQL on Vitess with database branching."
    layer: [database]
    maturity: mainstream
    learning_curve: moderate
    first_released: 2021
    description: >
      A managed, serverless MySQL-compatible database platform built on Vitess
      (the sharding layer that scaled YouTube). Its signature feature is
      Git-style database branching: spin off a branch, change the schema, and
      merge it back as a non-blocking, online deploy request. PlanetScale
      removed its free tier in April 2024, so it now starts around $39/month.
    use_cases:
      - "MySQL apps that need horizontal scale via Vitess sharding."
      - "Teams wanting schema changes as reviewable, non-blocking deploys."
      - "Production MySQL workloads with serverless connection handling."
    prerequisites:
      - { name: "MySQL", slug: "mysql" }
      - { name: "SQL", slug: "" }
    key_features:
      - "Git-style branching with online, non-blocking schema deploys."
      - "Built on Vitess for transparent horizontal sharding."
      - "Serverless connection pooling friendly to edge/functions."
      - "Insights and query analysis built in."
    pairs_well_with:
      - { name: "Prisma", slug: "prisma" }
      - { name: "Drizzle", slug: "drizzle" }
      - { name: "Next.js", slug: "next-js" }
    alternatives:
      - { name: "Neon", slug: "neon" }
      - { name: "MySQL", slug: "mysql" }
      - { name: "Supabase", slug: "supabase" }
    example:
      lang: "bash"
      code: "pscale branch create my-db add-users-table"
      explain: >
        Create a schema branch off the production database — you change it in
        isolation, then merge via a deploy request.
    gotchas: >
      The free tier is gone (since April 2024), so it's a paid service from the
      start — factor that against free-tier rivals. Because it's Vitess, some
      MySQL features are constrained: foreign-key enforcement is limited and
      cross-shard transactions/joins don't behave like single-node MySQL.
    maintained_by: "PlanetScale, Inc."
    language: "Go (Vitess)"
    license: "proprietary"
    docs:
      - { label: "planetscale.com/docs", url: "https://planetscale.com/docs" }

  - name: "Neon"
    slug: "neon"
    tagline: "Serverless Postgres with instant database branching."
    layer: [database]
    maturity: rising
    learning_curve: gentle
    first_released: 2021
    description: >
      A serverless PostgreSQL platform that separates storage from compute, so
      databases scale to zero when idle and spin up on demand, and you can branch
      the entire database (data and schema) instantly like Git for development or
      preview environments. The core is Apache-2.0 licensed. Neon was acquired by
      Databricks in May 2025 (~$1B), which kept the free tier and lowered prices.
    use_cases:
      - "Serverless and edge apps wanting Postgres that scales to zero."
      - "Per-pull-request preview databases via instant branching."
      - "Cost-sensitive projects with spiky or intermittent traffic."
    prerequisites:
      - { name: "PostgreSQL", slug: "postgresql" }
      - { name: "SQL", slug: "" }
    key_features:
      - "Separated storage/compute — scales to zero when idle."
      - "Instant copy-on-write branching of the whole database."
      - "Serverless driver works over HTTP/WebSocket from the edge."
      - "Apache-2.0 core; standard Postgres wire protocol."
    pairs_well_with:
      - { name: "Drizzle", slug: "drizzle" }
      - { name: "Prisma", slug: "prisma" }
      - { name: "Next.js", slug: "next-js" }
      - { name: "PostgreSQL", slug: "postgresql" }
    alternatives:
      - { name: "Supabase", slug: "supabase" }
      - { name: "PlanetScale", slug: "planetscale" }
      - { name: "PostgreSQL", slug: "postgresql" }
    example:
      lang: "bash"
      code: "neon branches create --name preview/pr-123"
      explain: >
        Create an instant copy-on-write branch of your database for a preview
        environment, sharing storage with the parent until it diverges.
    gotchas: >
      Scale-to-zero means a cold start — the first query after idle pays a
      wake-up latency, which matters for user-facing requests (keep a paid
      compute warm if it does). Long-lived pooled connections and very
      write-heavy steady workloads fit the serverless billing model less well
      than spiky ones.
    maintained_by: "Neon (Databricks) + OSS community"
    language: "Rust"
    license: "Apache-2.0"
    docs:
      - { label: "neon.com/docs", url: "https://neon.com/docs" }

  - name: "MariaDB"
    slug: "mariadb"
    tagline: "The community-driven, drop-in MySQL fork."
    layer: [database]
    maturity: mainstream
    learning_curve: moderate
    first_released: 2009
    description: >
      A relational database forked from MySQL by its original authors after the
      Oracle acquisition, designed as a (mostly) drop-in replacement. It keeps
      wire and SQL compatibility with MySQL while adding its own storage engines
      (Aria, ColumnStore), features, and a community governance model under the
      MariaDB Foundation.
    use_cases:
      - "Drop-in MySQL replacement to stay on a fully open-source license."
      - "General-purpose relational workloads for web apps and CMSes."
      - "Analytics via the ColumnStore engine alongside transactional tables."
    prerequisites:
      - { name: "SQL", slug: "sql" }
    key_features:
      - "High wire/SQL compatibility with MySQL — usually a drop-in swap."
      - "Pluggable storage engines (InnoDB, Aria, ColumnStore)."
      - "Community-governed under the MariaDB Foundation, fully GPL."
    pairs_well_with:
      - { name: "PHP", slug: "php" }
      - { name: "WordPress", slug: "wordpress" }
      - { name: "Sequelize", slug: "sequelize" }
    alternatives:
      - { name: "MySQL", slug: "mysql" }
      - { name: "PostgreSQL", slug: "postgresql" }
    example:
      lang: "sql"
      code: "CREATE TABLE users (id INT PRIMARY KEY AUTO_INCREMENT, name VARCHAR(255));"
      explain: >
        Standard MySQL-compatible DDL — the same statement runs unchanged on
        MariaDB.
    gotchas: >
      "Drop-in" is no longer 100% — MariaDB and MySQL have diverged on JSON
      handling, replication, and newer SQL features, so migrating a large app
      needs testing. Pin compatibility to the specific versions you target rather
      than assuming parity.
    maintained_by: "MariaDB Foundation"
    language: "C/C++"
    license: "GPL-2.0"
    docs:
      - { label: "mariadb.org/documentation", url: "https://mariadb.org/documentation/" }

  - name: "CockroachDB"
    slug: "cockroachdb"
    tagline: "Distributed SQL — Postgres wire compatibility, horizontal scale."
    layer: [database]
    maturity: mainstream
    learning_curve: steep
    first_released: 2017
    description: >
      A distributed SQL database that speaks the PostgreSQL wire protocol while
      scaling horizontally and surviving node, zone, and region failures. It
      gives you serializable transactions and strong consistency across a cluster
      via the Raft consensus protocol — a relational feel with NoSQL-style
      resilience and geo-distribution.
    use_cases:
      - "Globally distributed apps needing strong consistency across regions."
      - "Workloads that must survive node/region failures with no data loss."
      - "Scaling out a relational schema beyond a single primary."
    prerequisites:
      - { name: "SQL", slug: "sql" }
      - { name: "PostgreSQL", slug: "postgresql" }
    key_features:
      - "Horizontal scale with automatic sharding and rebalancing."
      - "PostgreSQL wire compatibility — reuse Postgres drivers and tools."
      - "Serializable transactions and survivability via Raft consensus."
      - "Geo-partitioning to pin data to regions for latency and compliance."
    pairs_well_with:
      - { name: "Kubernetes", slug: "kubernetes" }
      - { name: "Prisma", slug: "prisma" }
      - { name: "Go", slug: "go" }
    alternatives:
      - { name: "PostgreSQL", slug: "postgresql" }
      - { name: "PlanetScale", slug: "planetscale" }
      - { name: "Neon", slug: "neon" }
    example:
      lang: "sql"
      code: "ALTER TABLE users CONFIGURE ZONE USING num_replicas = 5;"
      explain: >
        A CockroachDB-specific statement raising the replica count for a table's
        data across the cluster.
    gotchas: >
      Distribution has a tax — cross-range transactions and contended hotspots
      add latency, and SQL features differ subtly from real PostgreSQL, so
      Postgres compatibility isn't total. The core moved to the BSL
      source-available license, so check terms before commercial self-hosting.
    maintained_by: "Cockroach Labs"
    language: "Go"
    license: "BSL 1.1"
    docs:
      - { label: "cockroachlabs.com/docs", url: "https://www.cockroachlabs.com/docs/" }

  - name: "DynamoDB"
    slug: "dynamodb"
    tagline: "AWS's fully managed, serverless key-value & document store."
    layer: [database, infrastructure]
    maturity: mainstream
    learning_curve: moderate
    first_released: 2012
    description: >
      A fully managed, serverless NoSQL database from AWS offering single-digit
      millisecond latency at any scale with no servers to manage. You provision
      or auto-scale throughput, and it handles partitioning, replication, and
      durability — but performance hinges on designing your tables and keys around
      access patterns up front.
    use_cases:
      - "High-scale, low-latency key-value and document workloads on AWS."
      - "Serverless backends (Lambda) needing a managed, auto-scaling store."
      - "Event sourcing and session/cart stores with predictable access patterns."
    prerequisites:
      - { name: "AWS", slug: "aws" }
    key_features:
      - "Fully managed and serverless — no capacity planning for nodes."
      - "Single-digit-millisecond latency with on-demand or provisioned capacity."
      - "Global tables for multi-region replication; streams for change capture."
      - "Strong AWS Lambda and IAM integration."
    pairs_well_with:
      - { name: "AWS", slug: "aws" }
      - { name: "AWS Lambda", slug: "" }
    alternatives:
      - { name: "MongoDB", slug: "mongodb" }
      - { name: "Firestore", slug: "firestore" }
      - { name: "Redis", slug: "redis" }
    example:
      lang: "bash"
      code: 'aws dynamodb get-item --table-name Users --key ''{"id":{"S":"42"}}'''
      explain: >
        Fetching one item by its primary key via the AWS CLI — DynamoDB returns it
        in milliseconds.
    gotchas: >
      You model for access patterns, not entities — get the partition-key and
      single-table design wrong and queries become impossible or trigger costly
      full scans, with little room to refactor later. Cross-item transactions and
      ad-hoc queries are far weaker than in a relational engine.
    maintained_by: "AWS"
    language: "—"
    license: "proprietary"
    docs:
      - { label: "docs.aws.amazon.com/dynamodb", url: "https://docs.aws.amazon.com/dynamodb/" }

  - name: "Elasticsearch"
    slug: "elasticsearch"
    tagline: "Distributed full-text search and analytics engine."
    layer: [database]
    maturity: mainstream
    learning_curve: steep
    first_released: 2010
    description: >
      A distributed search and analytics engine built on Apache Lucene, storing
      JSON documents and making them searchable in near real time. It powers
      full-text search, log and metrics analytics, and is the heart of the
      ELK/Elastic stack alongside Kibana and Logstash/Beats.
    use_cases:
      - "Full-text and faceted search over large document sets."
      - "Centralized log and observability analytics (the ELK stack)."
      - "Near-real-time aggregations and dashboards over event data."
    prerequisites:
      - { name: "JSON", slug: "" }
    key_features:
      - "Inverted-index full-text search with relevance scoring (BM25)."
      - "Distributed sharding and replication for scale and resilience."
      - "Powerful aggregations for analytics; vector search for semantic queries."
      - "Kibana, Logstash, and Beats for the broader Elastic stack."
    pairs_well_with:
      - { name: "Kibana", slug: "" }
      - { name: "PostgreSQL", slug: "postgresql" }
    alternatives:
      - { name: "OpenSearch", slug: "" }
      - { name: "Algolia", slug: "" }
      - { name: "PostgreSQL", slug: "postgresql" }
    example:
      lang: "bash"
      code: 'curl -XGET "localhost:9200/products/_search?q=name:laptop"'
      explain: >
        A simple query-string search hitting the products index and returning
        relevance-ranked matches.
    gotchas: >
      It's a search engine, not a system of record — replication has had
      consistency caveats, so keep authoritative data elsewhere and treat
      Elasticsearch as a derived index. Mapping mistakes and unbounded
      aggregations are also notorious memory hogs, and the SSPL/Elastic license
      shift spawned the OpenSearch fork.
    maintained_by: "Elastic"
    language: "Java"
    license: "Elastic/SSPL"
    docs:
      - { label: "elastic.co/docs", url: "https://www.elastic.co/docs" }

  - name: "ClickHouse"
    slug: "clickhouse"
    tagline: "Blazing-fast columnar database for real-time analytics (OLAP)."
    layer: [database]
    maturity: rising
    learning_curve: steep
    first_released: 2016
    description: >
      An open-source columnar database built for online analytical processing,
      capable of scanning billions of rows per second. Its column-oriented
      storage, vectorized execution, and aggressive compression make it
      extraordinarily fast for aggregations over huge datasets — analytics, not
      transactional, workloads.
    use_cases:
      - "Real-time analytics dashboards over billions of events."
      - "Log, metrics, and observability data warehousing."
      - "Ad-hoc aggregations where a row store would be too slow."
    prerequisites:
      - { name: "SQL", slug: "sql" }
    key_features:
      - "Columnar storage with vectorized query execution."
      - "High compression ratios that shrink storage and speed scans."
      - "Sub-second aggregations over billions of rows."
      - "SQL dialect with rich analytical functions and materialized views."
    pairs_well_with:
      - { name: "Grafana", slug: "grafana" }
      - { name: "Kafka", slug: "" }
    alternatives:
      - { name: "Elasticsearch", slug: "elasticsearch" }
      - { name: "PostgreSQL", slug: "postgresql" }
      - { name: "DuckDB", slug: "" }
    example:
      lang: "sql"
      code: "SELECT country, count() FROM events GROUP BY country ORDER BY 2 DESC;"
      explain: >
        A grouped aggregation that ClickHouse runs over a huge events table in a
        fraction of a second thanks to columnar storage.
    gotchas: >
      It's OLAP, not OLTP — single-row updates and deletes are expensive and
      eventually-applied (mutations), and there are no real foreign keys or
      multi-row transactions, so it's a poor fit as a primary transactional store.
      Schema and partitioning choices heavily dictate performance.
    maintained_by: "ClickHouse Inc."
    language: "C++"
    license: "Apache-2.0"
    docs:
      - { label: "clickhouse.com/docs", url: "https://clickhouse.com/docs" }

  - name: "Turso"
    slug: "turso"
    tagline: "libSQL/SQLite at the edge — a database per tenant, anywhere."
    layer: [database]
    maturity: rising
    learning_curve: gentle
    first_released: 2023
    description: >
      An edge-hosted database platform built on libSQL, an open-source fork of
      SQLite. It replicates lightweight SQLite databases close to users for low
      read latency and makes spinning up many databases cheap — ideal for
      multi-tenant apps that want a separate database per customer.
    use_cases:
      - "Low-latency reads from edge locations near users."
      - "Multi-tenant apps with a cheap database-per-tenant model."
      - "SQLite-friendly apps that need hosted, replicated storage."
    prerequisites:
      - { name: "SQL", slug: "sql" }
      - { name: "SQLite", slug: "sqlite" }
    key_features:
      - "Built on libSQL, an open fork of SQLite with extra features."
      - "Edge replicas (embedded + sync) for fast local reads."
      - "Cheap to create thousands of per-tenant databases."
      - "Works with SQLite drivers and ORMs like Drizzle and Prisma."
    pairs_well_with:
      - { name: "Drizzle", slug: "drizzle" }
      - { name: "Cloudflare Workers", slug: "cloudflare-workers" }
      - { name: "Next.js", slug: "next-js" }
    alternatives:
      - { name: "SQLite", slug: "sqlite" }
      - { name: "Neon", slug: "neon" }
      - { name: "PlanetScale", slug: "planetscale" }
    example:
      lang: "bash"
      code: "turso db create my-app && turso db shell my-app"
      explain: >
        Two CLI commands create a hosted libSQL database and open an interactive
        SQL shell against it.
    gotchas: >
      It inherits SQLite's model — a single writer, so write-heavy or high-
      concurrency-write workloads don't scale the way Postgres does, and embedded
      replicas are read-only. It's a young platform, so weigh maturity for
      mission-critical primary storage.
    maintained_by: "Turso/ChiselStrike"
    language: "Rust"
    license: "MIT (libSQL)"
    docs:
      - { label: "docs.turso.tech", url: "https://docs.turso.tech" }

  - name: "Convex"
    slug: "convex"
    tagline: "Reactive backend-as-a-database with TypeScript functions."
    layer: [database, backend, fullstack]
    maturity: rising
    learning_curve: moderate
    first_released: 2023
    description: >
      A reactive backend platform that merges a document database with a
      serverless function layer, all written in TypeScript. Queries are live by
      default — the client re-renders automatically when underlying data changes —
      and transactions, scheduling, file storage, and a typed schema come built
      in, blurring the line between database and backend.
    use_cases:
      - "Realtime apps (collaboration, dashboards, chat) without wiring sockets."
      - "Fullstack TypeScript apps wanting one typed backend abstraction."
      - "Replacing a hand-built API + database + websocket layer."
    prerequisites:
      - { name: "TypeScript", slug: "typescript" }
      - { name: "React", slug: "react" }
    key_features:
      - "Live, reactive queries that push updates to clients automatically."
      - "Backend logic as typed TypeScript query/mutation functions."
      - "ACID transactions, scheduled functions, and file storage built in."
      - "End-to-end types from the schema through to the React hooks."
    pairs_well_with:
      - { name: "React", slug: "react" }
      - { name: "Next.js", slug: "next-js" }
      - { name: "TypeScript", slug: "typescript" }
    alternatives:
      - { name: "Firebase", slug: "firestore" }
      - { name: "Supabase", slug: "supabase" }
    example:
      lang: "ts"
      code: |-
        export const list = query({
          handler: (ctx) => ctx.db.query("messages").collect(),
        });
      explain: >
        A Convex query function — clients subscribe to it and re-render whenever
        the messages table changes.
    gotchas: >
      The reactive, function-centric model is a different mental model from a
      plain SQL/REST stack, and you write data access in Convex's API rather than
      portable SQL — so it's a real platform commitment with vendor lock-in to
      weigh. Self-hosting exists but the managed service is the primary path.
    maintained_by: "Convex Inc."
    language: "Rust/TypeScript"
    license: "FSL/Apache-2.0"
    docs:
      - { label: "docs.convex.dev", url: "https://docs.convex.dev" }

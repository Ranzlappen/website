---
# =============================================================================
# Spectrum Batch 02 — Extremely Low / Super Low / Ultra Low Frequency (3 Hz to 3 kHz)
# =============================================================================

batch:
  id: "elf-slf-ulf"
  order: 2
  name: "Extremely Low Frequency / Super Low Frequency / Ultra Low Frequency (3 Hz to 3 kHz)"
  short_name: "ELF / SLF / ULF"
  description: >
    The lowest officially recognized radio bands. These extremely long wavelengths (100 km to 100 m) are used for global submarine communication, geophysical sensing, and natural phenomena monitoring. Signals penetrate deep into seawater and the Earth’s crust with very low attenuation.
  last_updated: "2026-05-06"

bands:
  - frequency_range: "3 Hz – 30 Hz"
    band_name: "Extremely Low Frequency (ELF)"
    wavelength: "100,000 km – 10,000 km"
    photon_energy: "1.2 × 10^{-14} eV – 1.2 × 10^{-13} eV (12–120 feV)"
    common_names: "ELF, ITU ELF band, submarine communication band"
    applications:
      - "One-way communication with submerged submarines (global reach)"
      - "Deep-Earth geophysical sounding and conductivity mapping"
      - "Monitoring of Schumann resonances (natural Earth-ionosphere cavity modes)"
      - "Research into biological effects of extremely low-frequency fields"
    technologies: "Gigantic ground-based antenna arrays (e.g., U.S. Navy Project Sanguine / ELF transmitter in Michigan/Wisconsin, Russian ZEVS transmitter), SQUID magnetometers, induction-coil sensors"
    propagation: "Ground-wave and waveguide propagation between Earth and ionosphere. Extremely low attenuation in seawater (penetrates hundreds of meters) and the Earth’s crust."
    regulatory: "ITU allocated for fixed and mobile services (mainly military). Very limited bandwidth; only a few nations operate transmitters."
    notes: "Wavelengths longer than the Earth’s radius in parts of the band. Schumann resonances (7.83 Hz fundamental and harmonics) fall inside this band and are continuously excited by global lightning activity."

  - frequency_range: "30 Hz – 300 Hz"
    band_name: "Super Low Frequency (SLF)"
    wavelength: "10,000 km – 1,000 km"
    photon_energy: "1.2 × 10^{-13} eV – 1.2 × 10^{-12} eV (0.12–1.2 peV)"
    common_names: "SLF, power-line frequency band (50/60 Hz harmonics)"
    applications:
      - "Submarine communication (backup to ELF)"
      - "Power-grid harmonic monitoring and geomagnetically induced current (GIC) detection"
      - "Geophysical exploration (magnetotelluric surveys)"
      - "Research into human/animal exposure to power-frequency fields"
    technologies: "Large loop antennas, airborne electromagnetic survey systems, magnetotelluric (MT) stations, medical ELF exposure test equipment"
    propagation: "Still excellent ground-wave and Earth-ionosphere waveguide propagation. Moderate penetration into seawater and soil."
    regulatory: "ITU allocated for fixed, mobile, and broadcasting services. Overlaps with 50/60 Hz power-line frequencies and their harmonics."
    notes: "Contains the 50 Hz and 60 Hz power-line frequencies used worldwide. These harmonics are a major source of man-made SLF noise but are also used for passive geophysical sensing."

  - frequency_range: "300 Hz – 3 kHz"
    band_name: "Ultra Low Frequency (ULF)"
    wavelength: "1,000 km – 100 km"
    photon_energy: "1.2 × 10^{-12} eV – 1.2 × 10^{-11} eV (1.2–12 peV)"
    common_names: "ULF, audio-frequency band (in geophysical context), VLF sub-band edge"
    applications:
      - "Advanced submarine communication"
      - "Magnetotelluric and audio-magnetotelluric (AMT) geophysical surveys"
      - "Monitoring of natural ULF emissions from earthquakes and auroras"
      - "Laboratory studies of biological effects of low-frequency fields"
    technologies: "Air-core loop antennas, grounded dipole antennas, portable magnetotelluric instruments, research aircraft equipped with ULF sensors"
    propagation: "Good ground-wave propagation with increasing attenuation in seawater compared to ELF/SLF. Still propagates globally via Earth-ionosphere waveguide."
    regulatory: "ITU allocated for fixed, mobile, radionavigation, and standard frequency/time signal services. Shared with some industrial and scientific uses."
    notes: "Marks the transition from extremely long waves to the beginning of the VLF band. Natural ULF signals are generated by lightning, solar-wind interactions, and seismic activity. Often studied for possible earthquake precursor signals."

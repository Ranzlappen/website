---
# =============================================================================
# Spectrum Batch 06 — Super High Frequency / Extremely High Frequency / Microwave / mmWave (3 GHz to 300 GHz)
# =============================================================================

batch:
  id: "shf-ehf-microwave"
  order: 6
  name: "Super High Frequency / Extremely High Frequency / Microwave / mmWave (3 GHz to 300 GHz)"
  short_name: "SHF / EHF / Microwave / mmWave"
  description: >
    The microwave and millimeter-wave bands. These frequencies support very high data rates but are mostly line-of-sight with limited range. Heavily used for 5G/6G, satellite communications, radar, Wi-Fi, and high-capacity wireless links.
  last_updated: "2026-05-06"

bands:
  - frequency_range: "3 GHz – 30 GHz"
    band_name: "Super High Frequency (SHF)"
    wavelength: "\~10 cm – 1 cm"
    photon_energy: "\~1.2 × 10^{-5} eV – 1.2 × 10^{-4} eV (12–120 neV)"
    common_names: "SHF, microwave band, C / X / Ku / K / Ka radar bands, 5G mid-band"
    applications:
      - "5G mid-band and early 6G deployments"
      - "Satellite communications (C, Ku, Ka bands)"
      - "Radar (weather, air traffic, military)"
      - "Microwave point-to-point links and Wi-Fi 6 GHz"
    technologies: "5G base stations, satellite ground stations, weather radars, microwave backhaul links"
    propagation: "Line-of-sight with some rain fade at higher end. Limited diffraction around obstacles."
    regulatory: "ITU allocated for fixed, mobile, satellite, and radionavigation. One of the most valuable spectrum ranges today."
    notes: "Includes the popular 5G C-band (3.3–4.2 GHz) and Ku/Ka satellite bands. Excellent balance of bandwidth and range for modern wireless."

  - frequency_range: "30 GHz – 100 GHz"
    band_name: "Extremely High Frequency (EHF) – Lower mmWave"
    wavelength: "\~1 cm – 3 mm"
    photon_energy: "\~1.2 × 10^{-4} eV – 4 × 10^{-4} eV (0.12–0.4 μeV)"
    common_names: "Lower mmWave, V / W radar bands, 5G/6G high-band"
    applications:
      - "5G/6G mmWave deployments"
      - "Automotive radar (77 GHz)"
      - "High-resolution imaging radar"
      - "Short-range high-capacity wireless links"
    technologies: "mmWave 5G small cells, automotive radar modules, airport security scanners, point-to-point mmWave links"
    propagation: "Strictly line-of-sight with high atmospheric absorption (oxygen and water vapor). Very short range."
    regulatory: "ITU allocated for fixed, mobile, satellite, and radionavigation. Heavily licensed for 5G/6G."
    notes: "The 77 GHz automotive radar band sits here. High data rates but requires beamforming and dense small-cell deployments."

  - frequency_range: "100 GHz – 300 GHz"
    band_name: "Extremely High Frequency (EHF) – Upper mmWave / Sub-THz"
    wavelength: "\~3 mm – 1 mm"
    photon_energy: "\~4 × 10^{-4} eV – 1.2 × 10^{-3} eV (0.4–1.2 μeV)"
    common_names: "Upper mmWave, sub-terahertz, W-band extension"
    applications:
      - "Experimental 6G and beyond"
      - "High-resolution radar and imaging"
      - "Scientific research and astronomy"
      - "Terahertz spectroscopy and security scanning"
    technologies: "Terahertz transceivers, mmWave imaging systems, radio astronomy receivers, future 6G testbeds"
    propagation: "Very short range, high atmospheric absorption. Used mostly indoors or in controlled environments."
    regulatory: "ITU allocated for fixed, mobile, and scientific services. Emerging allocations for 6G research."
    notes: "The 'terahertz gap' begins here. Extremely high bandwidth potential but significant technical challenges with propagation and device technology."

---
# Batch 1: Ultra-low frequencies (sub-1 Hz to 3 Hz)
# Extremely detailed table data for Jekyll spectrum reference page
# Last updated: May 2026

spectrum_batch_1:
  - frequency_range: "0 Hz (DC / static fields) to \~0.001 Hz"
    band_name: "DC / Static Geomagnetic Fields"
    wavelength_range: "Effectively infinite (planetary / interplanetary scale)"
    photon_energy: "< 4 × 10^{-18} eV (4 aeV)"
    common_names_sub_bands: "Direct current (DC) geomagnetic field, Earth's core dynamo field, steady magnetospheric field"
    primary_applications_uses:
      - "Global navigation and compass orientation (historical and modern)"
      - "Geomagnetic surveying for mineral/oil exploration"
      - "Satellite attitude control and magnetometer calibration"
      - "Space weather monitoring of quiet-time solar wind interaction"
    example_technologies_systems: "Fluxgate magnetometers (e.g., on Swarm satellites), ground-based observatories (INTERMAGNET network), paleomagnetic core sampling"
    propagation_atmospheric_notes: "Static fields penetrate the entire Earth and atmosphere with negligible attenuation. No wave propagation — purely magnetostatic."
    regulatory_allocation_notes: "No regulatory allocation (natural phenomenon). Used freely in scientific and geophysical research worldwide."
    special_notes_fun_facts: "Generated by convective currents in Earth's molten outer core. Strength \~25–65 μT at surface. Reversals occur every \~200,000–300,000 years. Used to date geological records via paleomagnetism."

  - frequency_range: "0.001 Hz – 0.01 Hz (1–10 mHz)"
    band_name: "Ultra-Low Frequency Micropulsations (Pc5 class)"
    wavelength_range: "\~30,000,000 km – 3,000,000 km (planetary scale)"
    photon_energy: "\~4 × 10^{-18} eV – 4 × 10^{-17} eV (4–40 aeV)"
    common_names_sub_bands: "Pc5 pulsations, global magnetospheric cavity modes, solar-wind-driven ULF waves"
    primary_applications_uses:
      - "Space weather forecasting and geomagnetic storm prediction"
      - "Magnetospheric research (field-line resonances)"
      - "Earthquake precursor studies (some anomalous ULF signals)"
      - "Power-grid harmonic analysis (very low-frequency components)"
    example_technologies_systems: "SuperMAG global magnetometer array, GOES/ACE satellite magnetometers, USGS geomagnetic observatories"
    propagation_atmospheric_notes: "Magnetohydrodynamic (MHD) waves in the magnetosphere. Couple to ground via ionospheric currents. Extremely long wavelengths allow global propagation with minimal loss."
    regulatory_allocation_notes: "Natural signals only — no licensing required. Monitored by international geophysical networks."
    special_notes_fun_facts: "Driven by solar-wind pressure pulses and Kelvin-Helmholtz instability at the magnetopause. Can induce GIC (geomagnetically induced currents) in power lines, causing blackouts (e.g., 1989 Quebec event)."

  - frequency_range: "0.01 Hz – 0.1 Hz (10–100 mHz)"
    band_name: "Ultra-Low Frequency Micropulsations (Pc4 class)"
    wavelength_range: "\~3,000,000 km – 300,000 km"
    photon_energy: "\~4 × 10^{-17} eV – 4 × 10^{-16} eV (40–400 aeV)"
    common_names_sub_bands: "Pc4 pulsations, compressional ULF waves"
    primary_applications_uses:
      - "Magnetospheric diagnostics and solar-wind/magnetosphere coupling studies"
      - "Geophysical exploration (deep-Earth conductivity sounding)"
      - "Monitoring of auroral electrojet activity"
    example_technologies_systems: "CARISMA magnetometer chain (Canada), IMAGE array (Europe), THEMIS spacecraft magnetometers"
    propagation_atmospheric_notes: "Primarily compressional and toroidal MHD waves. Reach ground through ionospheric Hall/Pedersen currents. Highly latitude-dependent."
    regulatory_allocation_notes: "Unregulated natural signals. Studied under international programs (IAGA, INTERMAGNET)."
    special_notes_fun_facts: "Period range 10–100 seconds. Often observed during geomagnetic storms. Can resonate with field lines, transferring energy from solar wind to the magnetosphere."

  - frequency_range: "0.1 Hz – 1 Hz (100 mHz – 1 Hz)"
    band_name: "Ultra-Low Frequency Micropulsations (Pc3 class)"
    wavelength_range: "\~300,000 km – 30,000 km"
    photon_energy: "\~4 × 10^{-16} eV – 4 × 10^{-15} eV (0.4–4 feV)"
    common_names_sub_bands: "Pc3 pulsations, upstream waves, foreshock waves"
    primary_applications_uses:
      - "Solar-wind monitoring and space weather alerts"
      - "Ionospheric and magnetospheric research"
      - "Seismic-electromagnetic precursor detection research"
    example_technologies_systems: "Ground magnetometer arrays (e.g., SAMBA, MACCS), Cluster and MMS spacecraft, Japanese geomagnetic observatories"
    propagation_atmospheric_notes: "Waves generated in the foreshock region travel sunward then couple into the magnetosphere. Reach ground with moderate attenuation."
    regulatory_allocation_notes: "Natural only. No spectrum allocation."
    special_notes_fun_facts: "Often linked to 30-second upstream waves from the bow shock. Strongest during high solar-wind speed periods."

  - frequency_range: "1 Hz – 3 Hz"
    band_name: "Upper Ultra-Low / Lower Extremely-Low Frequency Micropulsations"
    wavelength_range: "\~30,000 km – 10,000 km"
    photon_energy: "\~4 × 10^{-15} eV – 1.2 × 10^{-14} eV (4–12 feV)"
    common_names_sub_bands: "Pc2 pulsations (border), sub-ELF geomagnetic variations, power-grid sub-harmonics"
    primary_applications_uses:
      - "Advanced geophysical sensing (Earth conductivity profiling)"
      - "Research into earthquake electromagnetic precursors (some studies report anomalies in this range)"
      - "Laboratory simulation of natural ULF fields"
      - "Biological research (weak field interaction studies)"
    example_technologies_systems: "High-sensitivity SQUID magnetometers, induction coils at remote observatories, Schumann-resonance-adjacent monitoring stations"
    propagation_atmospheric_notes: "Still dominated by magnetospheric/ionospheric coupling. Wavelengths comparable to Earth radius — global-scale standing waves possible."
    regulatory_allocation_notes: "No allocation. Overlaps with the very bottom edge of the ITU ELF band (3–3000 Hz) but remains natural-signal dominated."
    special_notes_fun_facts: "This range marks the transition into the official ELF band (ITU defines ELF starting at 3 Hz). Some studies link ultra-low geomagnetic fluctuations to subtle effects on human brain alpha waves or animal navigation, though evidence remains debated."

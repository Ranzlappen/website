---
# =============================================================================
# Spectrum Batch 01 — Ultra-Low Frequencies (sub-1 Hz to 3 Hz)
# =============================================================================

batch:
  id: "ultra-low"
  order: 1
  name: "Ultra-Low Frequencies (sub-1 Hz to 3 Hz)"
  short_name: "Ultra-Low"
  description: >
    Quasi-DC and geomagnetic-coupled signals below the conventional radio bands —
    static planetary fields, magnetospheric micropulsations (Pc2–Pc5), and the
    transition into the bottom edge of ITU ELF.
  last_updated: "2026-05-06"

bands:
  - frequency_range: "0 Hz (DC / static fields) to ~0.001 Hz"
    band_name: "DC / Static Geomagnetic Fields"
    wavelength: "Effectively infinite (planetary / interplanetary scale)"
    photon_energy: "< 4 × 10^{-18} eV (4 aeV)"
    common_names: "Direct current (DC) geomagnetic field, Earth's core dynamo field, steady magnetospheric field"
    applications:
      - "Global navigation and compass orientation (historical and modern)"
      - "Geomagnetic surveying for mineral/oil exploration"
      - "Satellite attitude control and magnetometer calibration"
      - "Space weather monitoring of quiet-time solar wind interaction"
    technologies: "Fluxgate magnetometers (e.g., on Swarm satellites), ground-based observatories (INTERMAGNET network), paleomagnetic core sampling"
    propagation: "Static fields penetrate the entire Earth and atmosphere with negligible attenuation. No wave propagation — purely magnetostatic."
    regulatory: "No regulatory allocation (natural phenomenon). Used freely in scientific and geophysical research worldwide."
    notes: "Generated by convective currents in Earth's molten outer core. Strength ~25–65 μT at surface. Reversals occur every ~200,000–300,000 years. Used to date geological records via paleomagnetism."

  - frequency_range: "0.001 Hz – 0.01 Hz (1–10 mHz)"
    band_name: "Ultra-Low Frequency Micropulsations (Pc5 class)"
    wavelength: "~30,000,000 km – 3,000,000 km (planetary scale)"
    photon_energy: "~4 × 10^{-18} eV – 4 × 10^{-17} eV (4–40 aeV)"
    common_names: "Pc5 pulsations, global magnetospheric cavity modes, solar-wind-driven ULF waves"
    applications:
      - "Space weather forecasting and geomagnetic storm prediction"
      - "Magnetospheric research (field-line resonances)"
      - "Earthquake precursor studies (some anomalous ULF signals)"
      - "Power-grid harmonic analysis (very low-frequency components)"
    technologies: "SuperMAG global magnetometer array, GOES/ACE satellite magnetometers, USGS geomagnetic observatories"
    propagation: "Magnetohydrodynamic (MHD) waves in the magnetosphere. Couple to ground via ionospheric currents. Extremely long wavelengths allow global propagation with minimal loss."
    regulatory: "Natural signals only — no licensing required. Monitored by international geophysical networks."
    notes: "Driven by solar-wind pressure pulses and Kelvin-Helmholtz instability at the magnetopause. Can induce GIC (geomagnetically induced currents) in power lines, causing blackouts (e.g., 1989 Quebec event)."

  - frequency_range: "0.01 Hz – 0.1 Hz (10–100 mHz)"
    band_name: "Ultra-Low Frequency Micropulsations (Pc4 class)"
    wavelength: "~3,000,000 km – 300,000 km"
    photon_energy: "~4 × 10^{-17} eV – 4 × 10^{-16} eV (40–400 aeV)"
    common_names: "Pc4 pulsations, compressional ULF waves"
    applications:
      - "Magnetospheric diagnostics and solar-wind/magnetosphere coupling studies"
      - "Geophysical exploration (deep-Earth conductivity sounding)"
      - "Monitoring of auroral electrojet activity"
    technologies: "CARISMA magnetometer chain (Canada), IMAGE array (Europe), THEMIS spacecraft magnetometers"
    propagation: "Primarily compressional and toroidal MHD waves. Reach ground through ionospheric Hall/Pedersen currents. Highly latitude-dependent."
    regulatory: "Unregulated natural signals. Studied under international programs (IAGA, INTERMAGNET)."
    notes: "Period range 10–100 seconds. Often observed during geomagnetic storms. Can resonate with field lines, transferring energy from solar wind to the magnetosphere."

  - frequency_range: "0.1 Hz – 1 Hz (100 mHz – 1 Hz)"
    band_name: "Ultra-Low Frequency Micropulsations (Pc3 class)"
    wavelength: "~300,000 km – 30,000 km"
    photon_energy: "~4 × 10^{-16} eV – 4 × 10^{-15} eV (0.4–4 feV)"
    common_names: "Pc3 pulsations, upstream waves, foreshock waves"
    applications:
      - "Solar-wind monitoring and space weather alerts"
      - "Ionospheric and magnetospheric research"
      - "Seismic-electromagnetic precursor detection research"
    technologies: "Ground magnetometer arrays (e.g., SAMBA, MACCS), Cluster and MMS spacecraft, Japanese geomagnetic observatories"
    propagation: "Waves generated in the foreshock region travel sunward then couple into the magnetosphere. Reach ground with moderate attenuation."
    regulatory: "Natural only. No spectrum allocation."
    notes: "Often linked to 30-second upstream waves from the bow shock. Strongest during high solar-wind speed periods."

  - frequency_range: "1 Hz – 3 Hz"
    band_name: "Upper Ultra-Low / Lower Extremely-Low Frequency Micropulsations"
    wavelength: "~30,000 km – 10,000 km"
    photon_energy: "~4 × 10^{-15} eV – 1.2 × 10^{-14} eV (4–12 feV)"
    common_names: "Pc2 pulsations (border), sub-ELF geomagnetic variations, power-grid sub-harmonics"
    applications:
      - "Advanced geophysical sensing (Earth conductivity profiling)"
      - "Research into earthquake electromagnetic precursors (some studies report anomalies in this range)"
      - "Laboratory simulation of natural ULF fields"
      - "Biological research (weak field interaction studies)"
    technologies: "High-sensitivity SQUID magnetometers, induction coils at remote observatories, Schumann-resonance-adjacent monitoring stations"
    propagation: "Still dominated by magnetospheric/ionospheric coupling. Wavelengths comparable to Earth radius — global-scale standing waves possible."
    regulatory: "No allocation. Overlaps with the very bottom edge of the ITU ELF band (3–3000 Hz) but remains natural-signal dominated."
    notes: "This range marks the transition into the official ITU ELF band (which starts at 3 Hz). Note that different scientific fields sometimes use overlapping terminology without causing any practical confusion: in geophysical and space-physics research the term 'ultra-low frequency (ULF)' is often applied broadly to natural geomagnetic signals from 1 mHz up to a few hertz, whereas the official ITU radio-band definition places the ULF band at 300 Hz–3 kHz."

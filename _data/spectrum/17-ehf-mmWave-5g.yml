---
# =============================================================================
# Spectrum Batch 17 — EHF / mmWave (30 – 300 GHz)
# =============================================================================
# Migrated and upgraded from the original 06-shf-ehf-microwave.yml. Covers
# the entire ITU EHF band (30 – 300 GHz, λ 1 cm – 1 mm) including:
#   – Lower mmWave (~24–40 GHz, with the 5G FR2 'sub-30 GHz' bridge):
#     n257 / n258 / n260 / n261 5G NR FR2, Ka-band satellite uplink /
#     downlink, microwave backhaul
#   – Mid mmWave (40–100 GHz): n259 / n260 5G upper, 60 GHz WiGig
#     (802.11ad / ay), 77 GHz automotive radar, E-band 71–86 GHz fixed-
#     service backhaul, 94 GHz airport imaging
#   – Upper mmWave / sub-THz (100–300 GHz): D-band fixed-service,
#     122 / 134 GHz amateur, sub-THz 6G research, ALMA radio astronomy
# THz / IR / visible content remains in the existing IR / THz / visible
# files (07-infrared-terahertz.yml etc.) and will be re-batched in
# the upper boundary of this series. Schema: identical 14-column layout
# + batch wrapper used by all earlier files.
# =============================================================================

batch:
  id: "ehf-mmwave-5g"
  order: 17
  name: "EHF / mmWave (30 – 300 GHz) including 5G FR2"
  short_name: "EHF / mmWave"
  description: >
    The millimeter-wave / sub-THz frontier. Modern 5G FR2 (n257 / n258 /
    n260 / n261) carries multi-Gb/s mobile traffic in dense urban small
    cells; 60 GHz WiGig delivers short-range 802.11ad / ay; 77 GHz
    automotive radar is now the dominant ADAS sensor; E-band 71–86 GHz
    moves cellular backhaul; airport security uses 94 GHz; D-band 130–
    175 GHz is the 6G research playground. Largely receive-only for
    hobbyists due to specialised front-ends, but maker-grade 60 GHz
    radar (TI IWR6843, AWR1843), passive scanning, and ham 122 / 134
    GHz contesting do exist.
  last_updated: "2026-05-07"

bands:
  - frequency_range: "24.25 GHz – 40 GHz (5G FR2 lower: n257 / n258 / n260 / n261 + Ka-band uplink + 28 GHz)"
    key_frequencies_channels: "n258 24.25–27.50 GHz TDD (Europe pioneer band, Japan, China); n257 26.50–29.50 GHz TDD (Verizon US, T-Mobile, Korea, Japan); n261 27.50–28.35 GHz TDD (Verizon US — 'mmWave' 5G launched 2019); n260 37.00–40.00 GHz TDD (T-Mobile / AT&T / Verizon US, Korea); FSS Ka-band uplink 27.5–30.0 GHz (Inmarsat, Viasat, SES, Starlink Gateway); FSS / BSS Ka downlink 17.7–21.2 GHz (just below this row); microwave backhaul 26 GHz / 28 GHz / 38 GHz (telecom carrier-class); ITU 26 GHz pioneer band 24.25–27.5 GHz harmonised in EU"
    band_name_designation: "5G FR2 lower mmWave + Ka-band uplink"
    primary_uses_hobbyist_relevance: "5G FR2 receive-only signal monitoring (rare hobbyist setups), Ka-band satellite-uplink antenna farm observation, 28 GHz urban-canyon coverage analysis, 5G NR PHY-layer learning at FR2 (the canonical mmWave demo band), airport / stadium 5G FWA"
    hardware_modules: "5G mmWave phones (Apple iPhone 15 / 16 Pro Max US, Samsung Galaxy S24 Ultra US, Qualcomm Snapdragon X75 / X80 / X85 modems with QTM575 / QTM577 mmWave antenna modules), mmWave dev kits (Analog Devices ADRV9009-W / ADRF5740, Anokiwave AWMF-0151 / 0156 phased-array, Sivers IMA Wave Quanta evaluation kits, NXP MR3003 ADAS), mmWave SDRs (USRP X410 with mmWave converter cards, Keysight M9415A / M9421A VXG, Rohde & Schwarz SMW200A + frequency converter), Ka-band satellite-uplink dishes (gateway-class), spectrum analyzers up to 50 GHz (R&S FSV3050, Keysight UXA N9042B); cheap entry: TI IWR6843 ISK eval kit covers 60 GHz radar but not 28 GHz"
    antenna_diy_considerations: "Phased-array antenna modules (8x8 / 16x16 patch arrays in QTM-class user equipment, ~24 dBi beam gain with steering); horn antennas (22–28 dBi at 28 GHz); small parabolic dishes (15–30 cm); waveguide WR-28 / WR-34 / WR-22; lens antennas (Luneburg lenses for wide angular coverage); patch arrays printed on RT/duroid 5880 for low-loss"
    legal_licensing_notes: "ITU allocated to fixed, mobile, fixed-satellite (uplink), inter-satellite. National 5G FR2 auctions: FCC (US Auctions 101 / 102 / 103 / 110 — 24 / 28 / 37 / 39 GHz); EU 26 GHz pioneer band (CEPT); UK 26 GHz auction (Ofcom 2024); Japan 28 GHz; Korea 28 GHz. Cellular bands operator-licensed; UE license-by-rule. FCC Part 30 (mmWave services). Setting up your own gNB requires experimental license"
    max_power_restrictions_eirp: "5G mmWave UE: 23 dBm conducted, 43 dBm EIRP (effective) per ITU recommendation; phased-array gives ~20 dBi → 200 mW conducted into 24 dBi steered beam → ~20 W EIRP. Macrocell base / small cell: 65–75 dBm EIRP per beam (ultra-narrow steered beams). FSS Ka-band uplink: 50–80 dBW EIRP (very-high-gain dish, 1+ kW TX). Hobbyists are receive-only here unless individually licensed"
    propagation_interference_notes: "Strict line-of-sight; building penetration is poor (10–30 dB through external walls — 5G mmWave uses outdoor → outdoor coverage with 'line-of-sight to the car / window' as the model); rain fade severe (15–30 dB/km in heavy rain at 28 GHz); foliage attenuation high; oxygen absorption negligible at 28 GHz (rises sharply at 60 GHz). Beamforming compensates with very narrow steered beams; user equipment performs ~64-direction codebook search to lock on"
    safety_exposure_limits: "Follow ICNIRP 2020 / FCC OET-65 RF-exposure guidelines updated for mmWave (skin-incident power-density limits in W/m², much stricter near-surface than lower frequencies). Smartphone mmWave SAR-substitute is power density 10 W/m² (ICNIRP 2020) at the device surface. Public-exposure debates around mmWave health effects are well-studied — current consensus remains sub-thermal at compliant power levels"
    technologies_example_devices: "5G NR FR2 (n257 / n258 / n260 / n261), Verizon Ultra Wideband / 5G+, T-Mobile 5G UC mmWave (in some markets), AT&T 5G+, Inmarsat / Viasat / Starlink Ka-band gateway uplinks, microwave backhaul (Ericsson MINI-LINK, Nokia UBT, Huawei OptiX RTN)"
    hobbyist_project_ideas: "Buy a US-spec mmWave-capable 5G phone (iPhone 15 Pro Max US, Galaxy S24 Ultra US) and use NetMonster / Cellular-Z to map FR2 coverage in a stadium or downtown grid (it's spotty, mostly dead, occasionally 2 Gb/s); observe Ka-band uplink dishes at a satellite gateway from public road (visual only); experiment with TI IWR6843 (60 GHz, see next row) since 28 GHz hobby gear is hard to source"
    sources_citations: "3GPP TS 38.101-2 (FR2 bands), ITU-R Radio Regulations RR Article 5, FCC Part 30, FCC Auction 101 / 102 / 103 / 110 docs, CEPT 26 GHz pioneer band coordination, ETSI / 3GPP Release 15 – 18, GSMA mmWave Spectrum Tracker, Qualcomm Snapdragon X75 / X80 / X85 datasheets (2026)"
    usability_badge: "🟡 Licensed / Mobile (receive-only for hobbyists)"

  - frequency_range: "40 GHz – 100 GHz (n259 + 60 GHz WiGig + 77 GHz automotive radar + E-band)"
    key_frequencies_channels: "n259 39.5–43.5 GHz TDD (US AT&T / T-Mobile, Korea, Japan); n260 37–40 GHz extension; 57–66 GHz / 60 GHz WiGig ISM (worldwide unlicensed, IEEE 802.11ad / ay, 4 channels of 2.16 GHz); 76–81 GHz automotive radar (76–77 GHz long-range ACC + 77–81 GHz short-range FMCW, the new SRR after 24 GHz phase-out); 71–76 / 81–86 GHz E-band fixed-service backhaul (paired duplex, license-free in US 'light-licensed', heavy in EU); 94 GHz airport / military mmWave imaging radar; 81–86 GHz amateur primary in some R1 segments; ALMA radio astronomy bands 31–950 GHz (protected globally)"
    band_name_designation: "Mid mmWave — 5G n259 + 60 GHz WiGig + 77 GHz auto radar + E-band"
    primary_uses_hobbyist_relevance: "60 GHz WiGig hobbyist links (802.11ad routers like the TP-Link Talon AD7200 — discontinued but findable secondhand, Netgear Nighthawk X10 R9000); 77 GHz automotive radar experimentation (TI IWR1642 / AWR1843 / IWR6843 dev kits); E-band point-to-point backhaul (BridgeWave, Siklu, Aviat for licensed pros); airport mmWave body-scanner observation (visual only); receive-only n259 5G FR2"
    hardware_modules: "60 GHz: TP-Link Talon AD7200, Netgear Nighthawk X10, Mikrotik wAP 60G AP / wAP 60Gx3, Cambium Networks 60 GHz cnWave V3000 / V5000 (license-free P2MP), Sivers IMA Bifrost EVK; 77 GHz radar: TI IWR1443 / IWR1642 / IWR1843 / IWR6843 / AWR1843 / AWR2243 / AWR2944 + DCA1000EVM data capture board, Infineon BGT60 / BGT24 / Distance2GO eval kits, NXP TEF810x / TEF82xx; SDR-based: USRP X410 + mmWave daughterboards (rare hobbyist), Anokiwave AWMF eval kits; spectrum analyzers up to 110 GHz (R&S FSV3110, Keysight UXA N9042B + extender)"
    antenna_diy_considerations: "60 GHz: integrated patch arrays in commercial APs (40+ dBi steered beams), simple horn (24–30 dBi); 77 GHz: PCB patch arrays on RT/duroid (TI / Infineon kits ship with built-in arrays); E-band 71–86 GHz: 60–90 cm Cassegrain or parabolic dish (gain ~50 dBi); 94 GHz: lens antenna or small reflector; waveguide WR-12 (E-band), WR-15 (V-band), WR-10 (W-band)"
    legal_licensing_notes: "60 GHz: worldwide ISM (FCC Part 15.255, ETSI EN 302 567), license-free for compliant equipment. 71–76 / 81–86 GHz E-band: US 'light-licensed' via FCC 70 / 80 / 90 GHz registration (free, online, ~10 minutes); EU per-link licensed. 77–81 GHz automotive radar: ITU footnote 5.559 (radio-determination), license-free for compliant vehicle modules. 94 GHz: licensed (military imaging, airport security). n259 / n260 5G: operator-licensed"
    max_power_restrictions_eirp: "60 GHz Part 15.255: 40 dBm (10 W) avg conducted, 43 dBm EIRP; 60 GHz EU EN 302 567: 40 dBm EIRP indoor / 55 dBm outdoor (license-free P2P). 77 GHz auto: 55 dBm EIRP per ETSI EN 301 091 / FCC Part 95.4002 (long-range), 50 dBm EIRP (short-range). E-band: 55 dBm EIRP typical with 50+ dBi dish gain. 94 GHz: per-licensee. 5G FR2 mmWave UE: 23 dBm conducted, 43 dBm EIRP"
    propagation_interference_notes: "Strict line-of-sight; oxygen absorption peak at 60 GHz (~15 dB/km extra at sea level — the 'oxygen-absorption band' is part of WiGig's frequency-reuse advantage); rain fade severe (20–40 dB/km at 60–80 GHz heavy rain); foliage / window glass attenuation 5–20 dB; multipath minimal due to narrow beams. 77 GHz auto-radar interference between vehicles is a known issue at high traffic densities — solved by FMCW chirp randomisation and multi-input multi-output (MIMO)"
    safety_exposure_limits: "Follow ICNIRP 2020 / FCC OET-65 RF-exposure guidelines updated for mmWave; surface-incident power-density limits stricter (10 W/m² general public above 30 GHz). 60 GHz 10 W EIRP into a steered narrow beam needs main-lobe standoff (typically 1–3 m). Auto-radar 55 dBm EIRP measured at the bumper is well below MPE at any reasonable standoff"
    technologies_example_devices: "Wi-Fi 802.11ad / ay (WiGig), 802.11ay 60 GHz EHT-like, 5G NR FR2 n259, 77 GHz ACC radar (Bosch LRR4, Continental ARS540, Aptiv ESR), E-band backhaul (Siklu EH-2200, BridgeWave NLOS, Aviat WTM 4500), mmWave airport body scanners (L3Harris ProVision, Smiths eqo)"
    hobbyist_project_ideas: "Build a TI IWR6843 60 GHz radar with the open-source mmwave-radar toolbox to detect heart rate / breathing through a wall; deploy a 60 GHz P2P link with Mikrotik wAP 60G across a 200 m line-of-sight gap (free in US light-license, license-free in EU); experiment with 77 GHz radar SDK (TI mmWave Studio); reverse-engineer auto-radar pulses with a spectrum analyzer + downconverter (advanced)"
    sources_citations: "FCC Part 15.255 / Part 95.4002 / Part 101 (E-band light-licensed), ETSI EN 302 567 / EN 301 091, IEEE 802.11ad / 802.11ay, 3GPP TS 38.101-2 (n259), ITU-R Radio Regulations RR 5.559, TI mmWave Radar SDK docs, IEEE Trans. Microwave Theory & Techniques (2026)"
    usability_badge: "🟡 Licensed / Mobile (receive-only for hobbyists)"

  - frequency_range: "100 GHz – 300 GHz (Upper mmWave / Sub-THz: D-band / G-band + 122 / 134 GHz amateur + 6G research)"
    key_frequencies_channels: "D-band fixed-service 130–174.8 GHz (telecom backhaul + 6G research); 122.250–123.000 GHz amateur (1.25 mm band, Region 1 secondary, Region 2 secondary at 122.25–123 GHz); 134.000–141.000 GHz amateur (2 mm band, secondary, IARU narrow-band call 134 GHz); 241.000–250.000 GHz amateur (1.25 mm band, secondary); 245 GHz industrial / scientific ISM (RR 5.150 footnote — ITU 244–246 GHz with footnote 5.138 ISM); ALMA radio astronomy 31.3–950 GHz protected; 220–325 GHz weather radar (atmospheric water-vapour spectroscopy at 183 GHz + 325 GHz); sub-THz / G-band 6G research at 130–300 GHz"
    band_name_designation: "Upper mmWave / Sub-THz — D-band, G-band, 122 / 134 / 241 GHz amateur, ALMA"
    primary_uses_hobbyist_relevance: "Almost exclusively scientific or carrier-grade; hobbyist activity is limited to a tiny global community of 122 / 134 GHz microwave hams with custom multipliers, the receive side of D-band 6G research test-beds, and observation of ALMA / millimeter-wave radio-astronomy data products (publicly archived); 245 GHz ISM has near-zero practical hobbyist gear"
    hardware_modules: "Custom multiplier chains from 12 GHz / 24 GHz commercial sources (×6 / ×8 multipliers using GaAs Schottky diodes), Virginia Diodes Inc. (VDI) WR-6 / WR-5 / WR-3 multipliers and harmonic mixers, Spacek Labs frequency multipliers, GaN MMIC PAs (rare, e.g., Norsat / United Microwave / OMMIC), Schottky-diode detectors / mixers, sub-THz SDR research platforms (no commercial-off-the-shelf hobbyist option); for 6G: Keysight N5293A / N5295A spectrum analyzers (lab-grade, $200K+), Anritsu MS46524B 145 GHz VNA"
    antenna_diy_considerations: "Cassegrain dishes with sub-mm pointing accuracy; corrugated horn antennas (24–30 dBi); lens antennas (silicon, polyethylene, PTFE); waveguide WR-6 (110–170 GHz), WR-5 (140–220 GHz), WR-3 (220–325 GHz); aperture diameters down to 5–10 cm typical at 122–245 GHz"
    legal_licensing_notes: "ITU amateur service: 122.25–123 GHz secondary, 134–141 GHz secondary, 241–250 GHz secondary in most regions. ITU 5.138 / 5.150 ISM footnotes designate 245 GHz industrial. D-band 130–174.8 GHz: fixed service primary, recently opened to license-free / light-license 6G research in some countries (FCC Spectrum Horizons program 95–275 GHz, US NPRM ongoing). FCC Part 95 mmWave research up to 275 GHz. License required for amateur even at sub-THz"
    max_power_restrictions_eirp: "Amateur 122 / 134 / 241 GHz: per national rules, but practical TX power is <1 W due to multiplier-chain efficiency. ISM 245 GHz: very low practical EIRP. D-band fixed-service: 60+ dBm EIRP into Cassegrain dishes. Hobbyists are TX-limited by hardware availability, not regulation"
    propagation_interference_notes: "Atmospheric absorption dominates: water-vapour line at 183 GHz (>20 dB/km), 325 GHz (>50 dB/km); oxygen line at 119 GHz / 60 GHz; rain fade catastrophic. D-band 130–174.8 GHz has windows of low-ish attenuation suitable for short-range 6G research links. ALMA radio-astronomy receivers operate in protected windows; amateurs 122 / 134 / 241 GHz exploit similar windows for their narrow-band CW QSOs (longest reported 122 GHz QSO ~100 km from a hilltop)"
    safety_exposure_limits: "Follow ICNIRP 2020 / FCC OET-65 RF-exposure guidelines updated for sub-THz. Surface absorption is total at these frequencies — energy is deposited in the outer-most skin / cornea layer. Practical hobbyist powers are far below limits, but never look down a fed waveguide or horn"
    technologies_example_devices: "Amateur 122 GHz / 134 GHz / 241 GHz contesting (handful of QSOs per year worldwide), VDI WR-6 / WR-5 / WR-3 sources / detectors, ALMA (Atacama Large Millimeter Array) radio astronomy, 6G D-band research test-beds (NTT DoCoMo, Nokia Bell Labs, Ericsson, Samsung), THz security imaging (Tera-Imaging, TeraView), industrial 245 GHz dielectric heating"
    hobbyist_project_ideas: "Read ALMA / IRAM / SMA millimeter-wave astronomy data archives and learn signal-processing techniques; build a passive 122 GHz quiet receiver using VDI hardware and chase ham QSOs at hilltop microwave events (this is a tiny community — coordinate with DARC / RSGB microwave sections); follow 6G D-band research papers (3GPP TR 38.820 / IEEE 802.15.3d) and run sub-THz channel-modeling simulations"
    sources_citations: "ITU-R Radio Regulations RR 5.138 / 5.150 / 5.564A / 5.565, IARU R1 / R2 / R3 microwave band plans, FCC Part 95 + Spectrum Horizons NPRM (95–275 GHz), 3GPP TR 38.820 (6G THz channel models), IEEE 802.15.3d (THz), ALMA / IRAM science publications, Virginia Diodes Inc. application notes (2026)"
    usability_badge: "🟡 Licensed / Mobile (receive-only for hobbyists)"

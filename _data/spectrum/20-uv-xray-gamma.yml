---
# =============================================================================
# Spectrum Batch 20 — Ultraviolet / X-ray / Gamma (750 THz – 300 EHz)
# =============================================================================
# Migrated and upgraded from the original 08-visible-uv-xray-gamma.yml.
# Covers the high-energy / ionising end of the EM spectrum below the
# 'beyond gamma' upper boundary (which lives in 21-beyond-gamma.yml):
#   – UV (400–10 nm / 750 THz – 30 PHz / 3.1 eV – 124 eV): UV-A, UV-B,
#     UV-C, EUV (semiconductor lithography)
#   – X-ray (10–0.01 nm / 30 PHz – 30 EHz / 124 eV – 124 keV): soft +
#     hard X-rays, medical / dental, industrial radiography, astronomy
#   – Gamma (~0.01 nm and shorter / 30 EHz – 300 EHz / 124 keV –
#     1.24 MeV): radioisotope gamma, medical radiotherapy, gamma-ray
#     astronomy in the standard energy range
# Schema: identical 14-column layout + batch wrapper used by all
# earlier files. Hobbyist relevance drops sharply above UV — most
# work here is receive-only / passive observation, except for
# carefully-shielded amateur cloud-chamber / Geiger-counter projects.
# =============================================================================

batch:
  id: "uv-xray-gamma"
  order: 20
  name: "Ultraviolet / X-ray / Gamma (750 THz – 300 EHz)"
  short_name: "UV / X-ray / Gamma"
  description: >
    The ionising / short-wavelength end of the spectrum. UV-A drives
    fluorescence and tanning; UV-B sunburn and vitamin-D synthesis;
    UV-C germicidal / sterilisation; EUV semiconductor lithography
    (13.5 nm ASML scanners). X-rays (soft + hard) underpin medical
    imaging, dental, security, industrial radiography, and X-ray
    astronomy. Gamma rays span medical radiotherapy, nuclear-decay
    spectroscopy, and gamma-ray astronomy. Outside ITU radio
    regulation; governed by ICNIRP optical / non-ionising guidelines
    (UV) and IAEA / ICRP / national radiation-protection bodies
    (X-ray, gamma).
  last_updated: "2026-05-07"

bands:
  - frequency_range: "750 THz – 30 PHz (400 – 10 nm; UV-A / UV-B / UV-C / EUV)"
    key_frequencies_channels: "UV-A 315–400 nm (the 'long-wavelength', skin-tanning, fluorescence-excitation band; closest to visible). UV-B 280–315 nm (sunburn-causing, vitamin-D-synthesis, ozone-absorbing). UV-C 100–280 nm (germicidal, fully blocked by Earth's atmosphere). EUV 10–100 nm. Notable lines: 365 nm 'black-light' Hg line, 254 nm Hg low-pressure germicidal, 222 nm KrCl excimer ('far-UVC' eye-safe germicidal), 193 nm ArF excimer (deep-UV lithography), 157 nm F₂ excimer, 13.5 nm EUV (ASML lithography). Astronomy: Hubble UV imaging, CHANDRA-equivalent UV"
    band_name_designation: "Ultraviolet (UV-A / UV-B / UV-C / EUV)"
    primary_uses_hobbyist_relevance: "UV-A 'black light' fluorescence inspection (counterfeit detection, mineralogy, forensic), UV-resin SLA 3D printing (385 / 405 nm masking LCD), tanning-bed monitoring, Hα-adjacent solar photography, EUV semiconductor lithography (ASML, only fab insiders), 222 nm 'far-UVC' germicidal (eye-safer), UV-C sterilisation lamps (mercury 254 nm), forensic 'CSI' alternate-light sources, fluorescence microscopy (with UV-A / UV-B excitation), DSLR/mirrorless full-spectrum modifications for UV photography"
    hardware_modules: "UV LEDs (Nichia NCSU275 / NCSU276 365 nm 1 W, Bolb 222 nm KrCl far-UVC, Stanley UM330 / UM390 disco / counterfeit detectors, Lumileds Luxeon UV); fluorescent UV-A 'black-light' lamps (Sylvania F8T5BL); mercury-vapour low-pressure germicidal lamps (Philips TUV 25 W, 254 nm); UVB phototherapy lamps (medical grade); excimer lasers (Coherent COMPex, GAM Laser — research / lithography); UV cameras: SONS / Gardasoft UV machine vision, Andor iXon EM-CCD, full-spectrum-modified DSLRs (Lifepixel, Kolarivision conversions); UV photodiodes (Hamamatsu G6262, S1226-5BQ); spectrometers (Ocean Insight USB2000+UV-VIS, Avantes); UV-resin SLA printers (Anycubic Photon Mono X 6Ks, Elegoo Saturn 3, Phrozen Sonic Mighty 8K — all use 385 / 405 nm)"
    antenna_diy_considerations: "Optical only — fused-silica or quartz lenses (regular crown glass blocks UV below ~330 nm); CaF₂ for deep-UV; sapphire windows for UV-C / VUV; aluminum-coated mirrors (better than gold for UV); dichroic UV reflectors; bandpass filters (Thorlabs FB360-10, Schott UG-1 / UG-11 black-glass UV-pass); for fluorescence: longpass filters > 400 nm to block UV excitation while passing visible emission"
    legal_licensing_notes: "No ITU radio allocation (optical / ionising boundary at vacuum-UV). UV-LED / lamp products covered by IEC 62471 photobiological safety standard (Risk Group 0–3); UV-C germicidal devices in occupied spaces increasingly covered by national regulations (EU ECHA / German BfS / US FDA recommendations on far-UVC at 222 nm). Tanning beds / phototherapy lamps regulated medically. EUV lithography hardware is ITAR / EAR-controlled. Eye / skin protection mandatory above ~380 nm"
    max_power_restrictions_eirp: "UV-A 'black-light' lamps: 4–40 W typical, photobiological risk-group 1–2. UV-C germicidal 254 nm: 8–55 W per lamp, must operate in unoccupied spaces or shielded enclosures. Far-UVC 222 nm: 5–80 mW/cm² occupational allowed (ACGIH 2024). EUV ASML lithography: ~250 W tin-plasma source. Tanning bed: 100–1500 W lamps. Eye / skin safety dominates"
    propagation_interference_notes: "Atmospheric absorption increases sharply through UV: UV-A largely passes; UV-B largely absorbed by stratospheric ozone (good — protects life); UV-C completely absorbed; EUV completely absorbed (only operable in vacuum). Most window glass blocks below 330 nm — UV-A passes, UV-B blocked. Quartz / fused silica passes to 180 nm; CaF₂ to 130 nm. Skin / eye absorb shorter wavelengths superficially → photochemical damage"
    safety_exposure_limits: "ICNIRP 2004 UV exposure limits: 30 J/m² (3 mJ/cm²) UV-C / UV-B / UV-A 8-hour maximum. UV-C 254 nm at 1 mW/cm² → 30-second exposure exceeds limit. UV protection: UV-blocking safety glasses (polycarbonate blocks UV-A/B/C below ~380 nm), face shields, lab coats. Far-UVC 222 nm has reduced skin / eye penetration (KrCl excimer absorbed in dead skin layer + tear film) — basis of 'eye-safer' germicidal disinfection in occupied spaces"
    technologies_example_devices: "EUV ASML scanners (TWINSCAN NXE:3600D / EXE:5000 — every advanced-node chip on Earth), UV-resin SLA printers (Anycubic, Elegoo, Phrozen), UV-C germicidal lamps and HVAC sterilisation, far-UVC 222 nm KrCl 'occupied-space' germicidal (Ushio Care222, Bolb fixtures), forensic UV photography, fluorescence microscopy, semiconductor lithography (i-line 365 nm, KrF 248 nm, ArF 193 nm + immersion), tanning beds, phototherapy (PUVA UV-A, narrowband UV-B 311 nm)"
    hobbyist_project_ideas: "Build a 365 nm UV-A counterfeit-detection / mineral-fluorescence rig with high-power UV LEDs + UV-passing filter; SLA-print resin models on an Anycubic Photon (385 / 405 nm masking LCD); modify a DSLR for full-spectrum + UV photography (Lifepixel / Kolari conversion + Baader U-filter); build a UV-C sterilisation cabinet for tools (with proper interlocks); experiment with UV-induced fluorescence of common materials (tonic water quinine, banana skins, scorpion exoskeletons, white paper optical brighteners)"
    sources_citations: "ICNIRP 2004 UV guidelines, IEC 62471 photobiological safety, ACGIH TLV 2024 (far-UVC update), ISO 21348 solar irradiance bands, EAR Cat. 6A002 / ITAR Cat. XII (UV / EUV controls), ASML / Cymer EUV publications, Optica / SPIE photonics publications (2026)"
    usability_badge: "🟡 Licensed / Mobile (receive-only for hobbyists)"

  - frequency_range: "30 PHz – 30 EHz (10 nm – 0.01 nm; X-ray: soft + hard / 124 eV – 124 keV)"
    key_frequencies_channels: "Soft X-rays 0.1–10 nm / 124 eV – 12 keV (water-window 2.3–4.4 nm for biological imaging, 'L-edge' XAS); Hard X-rays 0.01–0.1 nm / 12–124 keV (medical / dental / industrial radiography, security CT). Common diagnostic / industrial energies: 30–80 keV chest / dental, 80–120 keV CT, 60–250 kV industrial NDT. Notable lines: Cu Kα 8.04 keV (XRD), Mo Kα 17.5 keV (early mammography), W Kα 59.3 keV. Astronomy: Chandra X-ray Observatory 0.1–10 keV, NuSTAR 3–79 keV (hard X-ray), eXTP, XRISM. Synchrotron: ESRF, APS, NSLS-II, SPring-8, MAX-IV (0.1–100 keV)"
    band_name_designation: "X-ray (Soft + Hard)"
    primary_uses_hobbyist_relevance: "Medical / dental imaging, industrial NDT (welding, casting inspection), security baggage / cargo screening, X-ray astronomy (passive observation of public archives — Chandra / XMM-Newton), X-ray crystallography (university / industrial), X-ray fluorescence (XRF) elemental analysis (pXRF guns are accessible to hobbyists at $$$). Hobbyist active X-ray work (Crookes tubes, surplus dental tubes) is technically feasible but requires shielding, dosimetry, and licensing in most jurisdictions"
    hardware_modules: "X-ray tubes (medical: rotating-anode 30–150 kV, dental: 60–70 kV portable, industrial: 100–450 kV); X-ray detectors: silicon PIN photodiodes (Amptek X-123 / X-Spect 0.1–100 keV with multi-channel analyser), CdTe / CZT detectors (Amptek XR-100T, X-123CdTe), scintillators + PMT (NaI(Tl), CsI, LYSO crystals + Hamamatsu / ADIT PMT); CCD / CMOS X-ray sensors (medical flat-panel detectors, Andor iKon-L for soft X-ray); pXRF guns (Bruker Tracer, Olympus Vanta — $25K+); hobbyist XRF: SDD (silicon drift detectors) like Amptek X-123SDD; scintillator + PMT + multi-channel analyser DIY systems (Theremino MCA, GS-USB); home cloud chambers (passive RX of cosmic ray + radon decay tracks); commercial Geiger-Müller counters with X-ray sensitivity (Mazur PRM-9000, GQ GMC-600+)"
    antenna_diy_considerations: "Optical only — X-rays mostly absorbed; lenses use grazing-incidence (Wolter optics for X-ray telescopes), Fresnel zone plates (synchrotron), polycapillary optics, monochromator crystals (Si, Ge, LiF — Bragg diffraction). For hobbyists, mostly direct detection without focusing optics; collimators (lead pinholes) for imaging"
    legal_licensing_notes: "No ITU radio allocation (ionising). X-ray devices regulated by national radiation-protection authorities: USA (FDA CDRH 21 CFR 1020, EPA, state radiation programs), EU (EURATOM Directive 2013/59, national bodies like German BfS / French ASN / UK HSE), Japan (NRA). Manufacturing / sale / use of >5 kV X-ray sources typically requires a license. Imported pXRF guns require manufacturer registration. Industrial NDT operators are individually licensed. Hobbyist X-ray work is legal but heavily regulated — Crookes-tube experimentation has dose limits"
    max_power_restrictions_eirp: "Medical X-ray tubes: 0.1–100 mA at 30–150 kV. Industrial NDT: 1–10 mA at 100–450 kV. pXRF guns: 5–50 µA at 5–50 kV (low-power, beam directed away from operator). EUV ASML 250 W tin plasma. Synchrotron beamlines: 10⁹–10¹³ photons/s/mm². ICRP 103 / 60: occupational dose limit 20 mSv/year averaged; public 1 mSv/year. Hobbyists usually operate Geiger / scintillator counters passively"
    propagation_interference_notes: "Highly penetrating; absorption ∝ Z⁴ / E³ (heavier elements + lower energy = more absorption — basis of bone/tissue contrast). Air absorbs soft X-rays (<5 keV) significantly; vacuum needed for soft work. Lead shielding common (1 mm Pb attenuates 100 keV X-rays by ~98 %). Background radiation: cosmic + radon + medical = ~3 mSv/year typical natural exposure"
    safety_exposure_limits: "ICRP 103 (2007 + ongoing updates), IAEA Basic Safety Standards (GSR Part 3), national equivalents (10 CFR 20 USA, EURATOM 2013/59 EU, IRR17 UK). Effective dose limits: 20 mSv/year occupational averaged (50 mSv/year max), 1 mSv/year public. Always use TLD / OSL / electronic dosimeters for active work; shielding, distance, time as fundamental controls (ALARA principle)"
    technologies_example_devices: "Medical / dental X-ray (Siemens / GE / Philips / Canon), CT scanners, mammography, fluoroscopy, X-ray crystallography (Rigaku, Bruker D8), pXRF guns (Bruker, Olympus, Hitachi), industrial radiography (NDT for pipelines, weld inspection), security CT (Smiths, L3Harris airport baggage), X-ray astronomy (Chandra, XMM-Newton, NuSTAR, eXTP, XRISM), synchrotron light sources (ESRF-EBS, APS-U, NSLS-II)"
    hobbyist_project_ideas: "Build a passive X-ray / gamma spectroscopy rig with Theremino MCA + NaI(Tl) scintillator + PMT and identify radioisotopes (Cs-137 662 keV, Co-60 1.17 / 1.33 MeV, K-40 1.46 MeV in bananas, Th-232 chain in old camera lenses, Am-241 60 keV in smoke detectors); build a cloud chamber to visualise cosmic-ray + radon-decay tracks; analyse archival Chandra X-ray observatory data (public archive at CXC / CIAO software) for galactic-source-finding; use a pXRF gun rental for thrift-store metal-art-deco lead-paint analysis; Geiger-counter monitoring of background + medical X-ray dosing in everyday environments"
    sources_citations: "ICRP 103 (2007), IAEA GSR Part 3 (2014), 10 CFR 20 (USA), EURATOM Directive 2013/59, NIST X-ray attenuation tables, Amptek detector datasheets, Chandra Source Catalog 2.1, ESRF / APS publications, Bruker / Olympus pXRF docs (2026)"
    usability_badge: "🟡 Licensed / Mobile (receive-only for hobbyists)"

  - frequency_range: "30 EHz – 300 EHz (~0.01 nm and shorter; Gamma-ray / 124 keV – 1.24 MeV)"
    key_frequencies_channels: "Standard radioisotope gamma lines: Cs-137 661.7 keV, Co-60 1173 + 1332 keV, K-40 1460 keV, Tl-208 (Th-232 chain) 2614 keV (above this row → next file's territory), Am-241 59.5 keV (overlaps soft X-ray upper edge), Ra-226 chain multiple lines, U-235 / U-238 chains. Medical: Tc-99m 140 keV (gamma camera / SPECT), F-18 511 keV (PET annihilation), Ga-68 511 keV PET. Industrial / sterilisation: Co-60 (industrial irradiator, food sterilisation), Ir-192 (NDT 380–605 keV). Astronomy: Fermi-LAT 0.02–300 GeV (above this row), INTEGRAL 15 keV – 10 MeV (overlaps), Swift-BAT 15–150 keV"
    band_name_designation: "Gamma-ray (standard energy range, 124 keV – 1.24 MeV)"
    primary_uses_hobbyist_relevance: "Passive gamma spectroscopy (the most accessible high-energy hobbyist activity — identifying radioisotopes from natural and surplus sources is well within reach), nuclear medicine awareness (PET, SPECT scans), industrial irradiator / NDT awareness, gamma-ray astronomy (public Fermi-LAT and Swift archives), background-radiation monitoring (radon, cosmic, lithified granite), historic radium-dial / vintage uranium-glass collecting (with proper handling)"
    hardware_modules: "Geiger-Müller counters: SBM-20 / LND 712 / Pancake-LND-7317 tubes + DIY counter board (Theremino, Mightyohm), commercial counters (Mazur PRM-9000, GQ GMC-300E+ / GMC-500+ / GMC-600+, RadEye PRD, Polimaster PM1208M); Scintillators + PMT for spectroscopy: NaI(Tl) + Hamamatsu R1924 / R6231 PMT + Theremino MCA / GS-USB; CsI(Tl) + photodiode (compact, lower energy resolution); LYSO + SiPM (modern, compact PET-grade); Cadmium Zinc Telluride (CZT) room-temperature semiconductor detectors (Kromek GR1 / GR1A / RM3R, Mirion SPIR-Ident — commercial, $$$); high-purity germanium HPGe detectors (cooled, lab grade — Mirion / ORTEC); cloud chambers for visualisation; surplus radioisotope check sources (Cs-137 / Co-60 sealed buttons from educational suppliers, microcurie levels — legal in most US states with general license)"
    antenna_diy_considerations: "Optical only — lead / tungsten collimators for direction-finding; coded-aperture masks for low-resolution imaging (Swift-BAT principle); Compton telescopes for higher-energy gamma; for hobbyist gamma-spectroscopy: scintillator crystal + PMT optical coupling with optical grease, MgO white reflective wrapping, light-tight aluminum housing"
    legal_licensing_notes: "No ITU radio allocation (ionising). National radiation regulators control source possession (NRC + Agreement States in USA, BfS in Germany, ARN in France, ARPANSA in Australia); 'general license' or 'exempt quantity' source allowances vary widely. Microcurie sealed sources (Cs-137 0.5 µCi, Co-60 1 µCi) often legal under general license for educational use in US; <74 kBq / source typical exempt limit in EU. Industrial / medical sources require facility licenses + radiation-protection officers + dosimetry. Hobbyist gamma-spectroscopy of natural materials (granite, banana K-40, KCl salt, americium smoke detectors, antique radium-dial watches, uranium glass) is unrestricted"
    max_power_restrictions_eirp: "N/A in radio-style EIRP. Source activity measured in Bq / Ci: hobbyist sealed sources typically 0.1–10 µCi (3.7–370 kBq), exempt; industrial Co-60 irradiators 1–10 MCi (37–370 PBq, behind concrete shielding); medical Cs-137 brachytherapy 100 Ci (3.7 TBq); food irradiators 1–5 MCi"
    propagation_interference_notes: "Highly penetrating: 1 cm Pb attenuates 1 MeV gamma by ~50 %, 10 cm reduces ~99 %; concrete and lead-glass equivalent shielding common in medical / industrial. Atmospheric attenuation negligible in air over short distances; cosmic gamma-rays make it through many g/cm² of atmosphere. Background dose mostly from radon decay (~1.5 mSv/year), cosmic (~0.4 mSv/year), terrestrial K-40 / Th / U (~0.5 mSv/year), medical (~0.5 mSv/year) — total ~3 mSv/year typical"
    safety_exposure_limits: "ICRP 103 (2007), IAEA GSR Part 3, national equivalents. Effective dose limits as in X-ray row (20 mSv/year occupational averaged, 1 mSv/year public). ALARA principle: shielding (Pb / concrete), distance (inverse-square law), time (limit exposure). Always use a calibrated dosimeter and survey meter for any source work; hobbyist sealed-source work at exempt-quantity levels poses no measurable risk if stored correctly"
    technologies_example_devices: "Cs-137 / Co-60 industrial irradiators (Sterigenics, Nordion), Tc-99m gamma cameras / SPECT (Siemens Symbia, GE Discovery), F-18 PET scanners (Siemens Biograph, GE PET/CT), industrial gamma radiography (Ir-192, Co-60 NDT for welds and pressure vessels), gamma-knife radiosurgery (Co-60), gamma-ray astronomy missions (INTEGRAL, Swift, Fermi LAT in next file), border / port radiation portal monitors (RPMs)"
    hobbyist_project_ideas: "Build a NaI(Tl) + PMT gamma-spectrometer with Theremino MCA software and identify Cs-137 / Co-60 / K-40 / Th-232-chain isotopes from common samples (banana, salt-substitute KCl, Brazil-nut Ra, granite countertops, antique uranium glass, Cold-War-era radium watches with proper handling); contribute background-radiation maps to citizen-science platforms (SafeCast); analyse archival Fermi-LAT / Swift-BAT public data (Fermi Science Tools); experiment with a cloud-chamber demo for educational outreach; build a Geiger-counter with Mightyohm / Theremino kits and learn basic statistics (Poisson counting, dead-time correction)"
    sources_citations: "ICRP 103 (2007), IAEA GSR Part 3 (2014), 10 CFR 20 (USA), EURATOM Directive 2013/59, NIST gamma attenuation tables, Theremino MCA documentation, Kromek / Mirion / ORTEC detector datasheets, NUDAT / Brookhaven nuclear-data tables, Fermi-LAT / Swift-BAT public archives (2026)"
    usability_badge: "🔴 Restricted / Scientific only"

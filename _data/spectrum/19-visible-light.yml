---
# =============================================================================
# Spectrum Batch 19 — Visible Light (400 – 750 THz / 750 – 380 nm)
# =============================================================================
# Migrated and upgraded from the original 08-visible-uv-xray-gamma.yml.
# Covers ONLY the visible spectrum (the narrow octave the human eye
# responds to). UV / X-ray / gamma content lives in subsequent files.
# Granular three-row layout — violet / blue / cyan (short-wavelength),
# green / yellow (middle, peak human-eye sensitivity), and orange / red
# (long-wavelength) — so hobbyists can find specific laser lines, LED
# wavelengths, and astronomical / photography references quickly.
# Schema: identical 14-column layout + batch wrapper used by all
# earlier files.
# =============================================================================

batch:
  id: "visible-light"
  order: 19
  name: "Visible Light (400 – 750 THz / 750 – 380 nm)"
  short_name: "Visible"
  description: >
    The narrow octave (~380 – 750 nm / 400 – 750 THz) the human eye
    responds to — basis of vision, photography, displays, lighting,
    microscopy, astronomy, fiber-optic short-reach (650 nm POF), and
    most consumer / hobbyist laser work. Outside ITU radio regulation;
    governed by laser-safety standards (IEC 60825 / ANSI Z136), display
    standards (sRGB / Rec. 709 / Rec. 2020 / DCI-P3), and photometric
    units (lumens, candela, nits) instead of RF power densities.
  last_updated: "2026-05-08"

bands:
  - frequency_range: "600 THz – 750 THz (500 – 380 nm; Violet / Blue / Cyan)"
    key_frequencies_channels: "Violet 380–450 nm (665–789 THz), Blue 450–485 nm (619–667 THz), Cyan 485–500 nm (600–619 THz). Notable lasers / sources: 405 nm violet diode (Blu-ray, lithography exposure, fluorescence), 445 nm blue diode (high-power laser pointers, projectors), 450 nm InGaN LED (the 'Nakamura LED' that won the 2014 Nobel — basis of white-LED downconversion), 473 nm DPSS blue, 488 nm Argon-ion / OPSL (cyan, fluorescence flow cytometry), 405 nm UV / 'black-light' adjacent. Atomic lines: hydrogen Hβ 486.1 nm, mercury 435.8 nm, argon 488.0 nm. Astronomy: O III 500.7 nm doublet, Hβ"
    band_name_designation: "Violet / Blue / Cyan visible (short-wavelength)"
    primary_uses_hobbyist_relevance: "Blue / violet laser pointers, Blu-ray pickups (405 nm), DLP / LCoS / laser projectors, blue LED illumination and aquarium lighting, fluorescence microscopy / mineral identification, photolithography, UV-A 'black-light' boundary, deep-sky astrophotography (O III filters), curing UV-resin printers (385 / 405 nm)"
    hardware_modules: "405 nm violet laser diodes (Sony / Sharp Blu-ray pickups, Osram PLT5 series, $5–50); 445 nm blue diodes (Nichia NUBM44 in salvaged projectors, Osram PLPT9 — caution, 1–7 W, hazardous); blue LEDs (Cree XLamp XP-E2 royal blue 450 nm, Luxeon Rebel 470 nm); 488 nm OPSL / DPSS modules (Coherent, Cobolt — pro lab); UV-resin printers (Anycubic Photon, Elegoo Mars, Phrozen Sonic — all use 385 / 405 nm masking LCD); fluorescence microscopes (Nikon Eclipse, Zeiss Axio with 405 / 470 / 488 nm excitation filters); photodiodes Hamamatsu S1226 / S1336 (silicon sees down to ~300 nm); spectrometers (Ocean Insight Flame, Thorlabs CCS200)"
    antenna_diy_considerations: "Optical only — design in collimating lenses (aspheric, 4–8 mm focal length for laser-diode collimation), beam-shaping prisms / cylindrical lenses (for laser-diode astigmatism), dichroic mirrors / beamsplitters, bandpass filters (Thorlabs FBH450-10, Semrock BrightLine), laser-line clean-up filters; for LEDs: TIR optics, total-internal-reflection collimators, Fresnel lenses; for fluorescence: long-pass / bandpass emission filters paired with excitation filter and dichroic"
    legal_licensing_notes: "No ITU radio allocation. Laser products covered by IEC 60825-1 / ANSI Z136.1 — Class 1 (≤0.39 mW visible, eye-safe), Class 2 (≤1 mW visible, blink-reflex safe), Class 3R (≤5 mW, hazardous with optics), Class 3B (≤500 mW, hazardous direct), Class 4 (>500 mW, fire / skin / scatter hazard). Selling Class 3B / 4 to consumers is illegal in many jurisdictions; manufacturers must register with FDA CDRH (US) / regulatory bodies (EU/UK/AU). High-power blue laser pointers (>5 mW) common in grey market — illegal in EU / UK / AU"
    max_power_restrictions_eirp: "Consumer laser pointers limited to Class 2 (≤1 mW) in EU / UK / AU; FDA Class IIIa (≤5 mW) in US. Industrial blue / violet lasers up to multi-kW (engraving, cutting). UV-resin printer LEDs: 50–200 mW per pixel column. White-light LEDs: 1–100 W (room lighting); high-end stadium 500 W. Eye-safety dominates"
    propagation_interference_notes: "Atmospheric scattering — Rayleigh scattering ∝ 1/λ<sup>4</sup> → blue scatters strongly, hence blue sky / blue 'twilight'. Visible light is absorbed by most pigments, dyes, and biological tissue (chlorophyll absorbs blue + red, reflects green); transparent through clean air, water (visible window 400–700 nm, with peak transmission at 480 nm in pure water), and most glass. Eye sees blue weakly (cone S-type peak ~440 nm at relative photopic V(λ) ~0.04)"
    safety_exposure_limits: "IEC 60825 + ANSI Z136 laser MPE; ICNIRP 2013 broadband-light exposure guidelines. Blue-light retinal photochemical hazard (440–500 nm) — basis of 'blue-light filter' marketing for screens; actual photochemical injury thresholds are well above any consumer-display output. UV-A boundary at 380 nm has additional skin / lens-of-eye concerns"
    technologies_example_devices: "Blu-ray drives (405 nm AlInGaN), white LEDs (blue InGaN + YAG:Ce phosphor downconversion → broadband white), 4K / 8K projectors with blue laser engines (Hisense L9G, BenQ V7050i), UV-resin printers (Anycubic, Elegoo, Phrozen), fluorescence microscopy, semiconductor photolithography (i-line 365 nm UV-A boundary, KrF 248 nm), forensic 'CSI' alternate-light sources, cyanotype photography 365–420 nm"
    hobbyist_project_ideas: "Build an Arduino + LED PWM mood-light cube with RGB 5050 / WS2812 (Neopixel) strips; safely experiment with a Class 3R 405 nm violet laser pointer for fluorescence demos (UV-resin gloss, tonic-water quinine, lab-grade fluorescent dyes); print SLA models on an Anycubic Photon (365–405 nm); image deep-sky O III with a CMOS astrocamera + 5 nm narrowband filter; modify a webcam to remove the IR-cut filter and capture near-UV with a 365 nm illuminator (Wood-effect / forensics)"
    wavelength: "λ ≈ 380 – 500 nm (Blu-ray 405 nm, 'Nakamura' blue InGaN 450 nm, OPSL 488 nm, O III 500.7 nm)"
    photon_energy: "E = hc/λ ≈ 2.48 – 3.26 eV (405 nm ≈ 3.06 eV, 450 nm ≈ 2.76 eV; sufficient to break some C–H / C–C bonds → photochemistry, UV-resin polymerisation, blue-light retinal photochemical hazard)"
    sources_citations: "IEC 60825-1 / ANSI Z136.1 (laser safety), CIE 1931 standard observer / photopic V(λ), FDA CDRH 21 CFR 1040 (laser products), ICNIRP 2013 broadband, Optica / SPIE publications, Nichia / Osram / Cree datasheets, sRGB / Rec. 2020 color-space standards (2026)"
    usability_badge: "🟢 Public / Natural"

  - frequency_range: "510 THz – 600 THz (590 – 500 nm; Green / Yellow)"
    key_frequencies_channels: "Cyan-Green 500–520 nm (575–600 THz), Green 520–565 nm (530–575 THz), Yellow-Green 565–580 nm (517–530 THz), Yellow 580–590 nm (508–517 THz). Notable lasers / sources: 532 nm DPSS green (the canonical 'green laser pointer', Nd:YAG 1064 nm doubled), 520 nm direct-diode green (modern green pointers since 2014), 543.5 nm green He-Ne, 568 nm Kr-ion, 589 nm sodium 'D-line' (street lamps, sodium-guide-star adaptive optics, atomic-clock laser cooling), 555 nm CIE photopic peak human-eye sensitivity. Atomic lines: mercury 546.1 nm, sodium 589.0 / 589.6 nm doublet, helium 587.6 nm. Astronomy: H I (Hα 656.3 nm in next row), continuum"
    band_name_designation: "Green / Yellow visible (peak human-eye sensitivity)"
    primary_uses_hobbyist_relevance: "Green laser pointers (the most popular hobbyist laser), laser-projector green channels, sodium street lamps and high-pressure sodium horticulture lighting, traffic signals (green at 506 nm), telescope finder lasers, sodium-guide-star adaptive optics in astronomy, Lasers used in entertainment and astronomy outreach"
    hardware_modules: "532 nm DPSS green pointers (5–500 mW grey-market, $20–500 — note: many cheap '5 mW' modules actually output 50–200 mW); 520 nm direct-diode green (Osram PL 520, NDG7475 — eye-safer because no IR leakage from doubling); green LEDs (Cree XLamp XP-E2 green 525 nm, Lumileds Luxeon 530 nm); high-pressure sodium 'HPS' grow lights (1000 W, 589 nm + continuum); sodium-vapor reference lamps for spectroscopy; helium-neon 543.5 nm green He-Ne lasers (rare hobbyist); CCD / CMOS cameras (peak quantum efficiency 530–570 nm — basis for green-channel photography); pulse oximeters use 660 / 940 nm not green; the V(λ) photopic curve peaks at 555 nm — luminance meters calibrated here"
    antenna_diy_considerations: "Optical only — collimating lenses, beam-shaping prisms, dichroic mirrors (long-pass at 550 nm for separating blue from green-red), bandpass filters (Thorlabs FBH532-10, Semrock 532 nm laser-line filter — essential to remove IR leakage from cheap DPSS pointers), green LED TIR optics, Fresnel lenses for stage-lighting collimators"
    legal_licensing_notes: "Same IEC 60825 / ANSI Z136 framework. Green is the most-aviation-incident-laser color: pointing a >5 mW green laser at aircraft is a federal crime in US (FAA fines + jail time, 18 USC §39A); EU Directive 2007/59/EC criminalises laser strikes on aircraft / vehicles. Some grey-market 'green pointers' have weak IR-blocking filters (output 808 / 1064 nm IR — invisible but eye-hazardous). FDA Class IIIa (5 mW) consumer limit in US"
    max_power_restrictions_eirp: "Consumer laser pointers: Class 2 (≤1 mW EU/UK/AU), Class IIIa (≤5 mW US). Industrial / projector green lasers: 1 W – 100 W (RGB laser projectors run 5–25 W per color). Sodium guide stars: 4–20 W CW (research-grade). HPS lights: 1000 W electrical, ~150 W radiated. Eye-safety dominates"
    propagation_interference_notes: "Atmospheric scattering moderate — green is in the middle of Rayleigh scattering ∝ 1/λ<sup>4</sup>; visible window 400–700 nm in clear air. Water absorption minimal (peak transmission in pure water at 480 nm; chlorophyll absorbs blue + red and reflects green → vegetation appears green). Eye photopic sensitivity peaks at 555 nm — green laser pointers appear ~6× brighter than equivalent-power red"
    safety_exposure_limits: "IEC 60825 + ANSI Z136 laser MPE. Photopic-weighted hazard analyses use V(λ) curve. ICNIRP 2013 broadband. Sodium 'D-line' frequency-doubling can cause unexpected UV emission in some setups — verify with a UV card. Avoid all eye-contact with Class 3B / 4"
    technologies_example_devices: "DPSS / direct-diode green laser pointers, RGB laser projectors, sodium-vapor lamps (street lighting, decommissioning in favor of LEDs), sodium guide-star adaptive optics (Keck, VLT, ELT), traffic signals, telescope finder lasers, green astronomy filters (UHC narrowband for nebulae)"
    hobbyist_project_ideas: "Build a 532 nm telescope finder/pointer with proper IR-blocking filter and Class 2 power for safe outreach; experiment with the V(λ) photopic curve using a luxmeter and color-tunable RGB LED (the same lumens / luminance feels brightest at 555 nm); set up sodium-vapor lamp + spectroscope for a free physics demo; image green / Hα / O III narrowband nebulae with a CMOS astrocam; build a cheap DIY laser show with a Galvanometer Pair (closed-loop) + RGB module + ILDA software"
    wavelength: "λ ≈ 500 – 590 nm (532 nm DPSS green, 555 nm CIE V(λ) peak, 589 nm Na D-line)"
    photon_energy: "E = hc/λ ≈ 2.10 – 2.48 eV (532 nm ≈ 2.33 eV, 589 nm ≈ 2.10 eV; matches Nd:YAG 2nd-harmonic and Na 3p→3s transition)"
    sources_citations: "IEC 60825-1 / ANSI Z136.1 (laser safety), CIE 1931 photopic V(λ), 18 USC §39A (US laser-aircraft strikes), FAA Laser Strike Reporting, FDA CDRH 21 CFR 1040, Nichia / Osram NDG7475 datasheets, ESO sodium-guide-star papers, Optica / SPIE publications (2026)"
    usability_badge: "🟢 Public / Natural"

  - frequency_range: "400 THz – 510 THz (750 – 590 nm; Orange / Red / Far-Red)"
    key_frequencies_channels: "Yellow-Orange 590–620 nm (484–510 THz), Orange 620–640 nm (470–484 THz), Red 640–700 nm (430–470 THz), Far-Red 700–750 nm (400–430 THz). Notable lasers / sources: 632.8 nm helium-neon (the original 'red HeNe' laser, lab standard), 635 nm InGaAlP red diode (most consumer red pointers), 650 nm CD pickup / red LEDs, 660 nm photosynthesis-action-spectrum red, 670 nm solid-state lasers, 694.3 nm ruby laser (the first laser, 1960), 750 nm IR-A boundary. Atomic lines: hydrogen Hα 656.281 nm (the deep-red signature of star-forming nebulae), helium 706.5 nm, lithium 670.8 nm. Astronomy: Hα is the most-imaged narrowband line in amateur astrophotography. CD audio uses 780 nm IR (just above)"
    band_name_designation: "Orange / Red / Far-Red visible"
    primary_uses_hobbyist_relevance: "Red laser pointers (the cheapest and oldest hobbyist laser), CD pickups (780 nm just above this row), red LED indicators / 7-segment displays, traffic / brake / tail lights (red at 625 nm typical), photosynthesis-action-spectrum lighting (660 nm grow-light red), Hα solar / nebula astrophotography (656.3 nm — the most popular narrowband line for amateurs), barcode scanners (650 nm), supermarket scanners, biological pulse oximetry (660 / 940 nm)"
    hardware_modules: "635 / 650 nm red diodes (Vishay TLDR5400, Osram PL 638 / PLT5 — pennies in bulk); 632.8 nm HeNe lasers (Thorlabs HNL050L, Melles Griot — older lab gear, 0.5–35 mW, ~$200–2000); 660 nm photosynthesis grow lights (Mars Hydro, Spider Farmer); 685 / 705 / 715 nm far-red horticulture LEDs; ruby lasers (rare, mostly historical); pulse-oximeter modules (MAX30102, MAX30105 with 660 nm + 940 nm IR LEDs); barcode scanners (Honeywell Voyager, Symbol/Zebra); Hα-filter astrocameras (ZWO ASI 533 / 2600 / 6200 + 3-7 nm Hα narrowband filter); HID / sodium / sulfur lighting (continuum spectrum)"
    antenna_diy_considerations: "Optical only — same lens / mirror toolbox; bandpass filters at Hα 656.3 nm (Astronomik 6 nm, Optolong L-Ultimate 3 nm dual-band, Baader 3.5 nm); long-pass red filters (Wratten 25 / 29 for B&W photography); near-IR-cut filters in cameras typically pass to ~700 nm (so all photography is implicitly 'red-cut'); collimators for red diodes are slightly easier than blue / violet (less chromatic aberration in cheap aspherics)"
    legal_licensing_notes: "IEC 60825 / ANSI Z136 laser-safety classes. Red lasers historically the only consumer laser allowed (Class 2 ≤1 mW EU/UK, Class IIIa ≤5 mW US). High-power red diodes (>1 W) sold as 'modules' for industrial use — same legal restrictions on consumer pointers as green. FAA aircraft-laser-strike laws apply equally to red"
    max_power_restrictions_eirp: "Consumer red laser pointers: Class 2 (≤1 mW EU/UK), Class IIIa (≤5 mW US). Industrial red lasers: 1 W – 100 W (engraving, cutting, alignment). Red horticulture LEDs: 1–10 W per emitter, panels 100–1000 W total. CD pickup laser ~3 mW peak (eye-hazardous if focused onto retina without optics — Class 1 by enclosure). Eye-safety dominates"
    propagation_interference_notes: "Atmospheric scattering minimal at red (Rayleigh ∝ 1/λ<sup>4</sup> → red scatters ~20 % as much as blue); hence red sunsets and red Moon during eclipse (atmospheric absorption + scattering of blue → only red survives a long path through atmosphere). Red transmits through some plant tissues (basis of plant chlorophyll absorption — blue + red absorbed, green reflected, far-red 730 nm reflected — 'NDVI' vegetation index). Pure water absorbs red noticeably (~0.3 %/cm at 650 nm) — basis of underwater color loss"
    safety_exposure_limits: "IEC 60825 + ANSI Z136 laser MPE. Red lasers feel less bright than equivalent-power green (V(λ) sensitivity drops to 10 % at 650 nm) — same eye-hazard, less subjective brightness, hence dangerous false sense of safety with high-power red modules"
    technologies_example_devices: "Consumer red laser pointers, HeNe 632.8 nm laboratory lasers, CD audio (780 nm IR), red LED indicators / displays / traffic signals / brake lights, photosynthesis grow lights (660 / 730 nm), pulse oximetry (660 + 940 nm), barcode scanners, supermarket scanners, Hα solar telescopes (Coronado SolarMax, Lunt LS50/60/100 with sub-Å filters), narrowband nebula photography (Hα the most-imaged line in amateur astro)"
    hobbyist_project_ideas: "Build a Hα solar telescope using a Coronado / Lunt narrowband module + DSLR / planetary camera and image solar prominences daily; image the Heart / Soul / Cocoon / NGC 6960 nebulae with a CMOS astrocam + Hα 3 nm filter; build a DIY pulse oximeter with MAX30102 + ESP32 and stream to MQTT; image the 'NDVI' (Normalized Difference Vegetation Index) using a modified IR-cut webcam + red filter; build a basic supermarket-style barcode reader with a 650 nm laser + photodiode + microcontroller"
    wavelength: "λ ≈ 590 – 750 nm (HeNe 632.8 nm, red diode 635 / 650 nm, Hα 656.3 nm, ruby 694.3 nm)"
    photon_energy: "E = hc/λ ≈ 1.65 – 2.10 eV (656 nm Hα ≈ 1.89 eV, 632.8 nm HeNe ≈ 1.96 eV; matches H I n=3→2 Balmer-α atomic transition)"
    sources_citations: "IEC 60825-1 / ANSI Z136.1 (laser safety), CIE 1931 photopic V(λ), FAA Laser Strike Reporting, FDA CDRH 21 CFR 1040, Coronado / Lunt solar telescope docs, Hamamatsu / Sony / Vishay datasheets, Stark Hα-line atomic data, NDVI / vegetation-index ESA Sentinel-2 docs (2026)"
    usability_badge: "🟢 Public / Natural"

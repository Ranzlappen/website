---
# =============================================================================
# Spectrum Batch 05 — Very Low Frequency (VLF, 3 kHz – 30 kHz)
# =============================================================================
# Migrated and upgraded from the original 03-vlf-lf-mf.yml. Covers ONLY
# the ITU VLF band (3 – 30 kHz). LF (30 – 300 kHz) and MF (300 kHz –
# 3 MHz) rows are deferred to later batch files. Schema: identical
# 14-column layout + batch wrapper used by all earlier files.
# VLF is the first band where receive-only hobbyist work becomes really
# productive — the entire band fits inside a 48 kHz sound-card capture
# and is stuffed with time signals, military comms, and natural sferics.
# =============================================================================

batch:
  id: "vlf"
  order: 5
  name: "Very Low Frequency (VLF, 3 kHz – 30 kHz)"
  short_name: "VLF"
  description: >
    The classic long-wave navigation, time, and submarine-comms band.
    Wavelengths of 10 – 100 km support extremely stable global ground-wave
    propagation and Earth-ionosphere waveguide transmission. Hosts WWVB
    (60 kHz, edge), DCF77 (77.5 kHz, edge), MSF (60 kHz), JJY, and active
    naval VLF transmitters. The whole band fits in an audio bandwidth, so
    a sound-card-based SDR plus a loop antenna is enough to start decoding
    time signals and recording natural whistlers and sferics.
  last_updated: "2026-05-07"

bands:
  - frequency_range: "3 kHz – 30 kHz"
    key_frequencies_channels: "Naval VLF: NAA Cutler 24.0 kHz, NLK Jim Creek 24.8 kHz, NPM Lualualei 21.4 kHz, GBZ Anthorn 19.6 kHz, ZEVS ~82 Hz (out of band but related); ALPHA/RSDN-20 navigation 11.9 / 12.6 / 14.9 kHz; Omega legacy 10.2–13.6 kHz (decommissioned); natural sferics and whistlers across the band"
    band_name_designation: "Very Low Frequency (VLF) — ITU band 4"
    primary_uses_hobbyist_relevance: "Long-range maritime and aeronautical navigation (Omega/LORAN-C legacy), one-way submarine comms, time and frequency standards, lightning detection networks (WWLLN), natural-radio listening (whistlers, tweeks, dawn chorus)"
    hardware_modules: "Dedicated VLF receivers (LF Engineering H-800, BBB-4, Whistler-style), RTL-SDR with VLF/HF upconverter (Ham-It-Up, SpyVerter), Airspy HF+ Discovery (direct VLF coverage), USB sound-card ADC frontends, Arduino / Raspberry Pi loggers"
    antenna_diy_considerations: "Large air-core loops (1–2 m, multi-turn) tuned to 10–25 kHz, ferrite-rod antennas for portable use, long-wire E-field probes with high-impedance buffer; site away from mains wiring, switch-mode supplies, and Ethernet PoE injectors"
    legal_licensing_notes: "ITU allocated to fixed, mobile, maritime mobile, radionavigation, and standard frequency/time-signal services in Regions 1, 2, and 3 (heavily military/government). No general amateur allocation in most countries; the U.S. 2200 m amateur band sits just above at 135.7–137.8 kHz. Receive-only requires no license"
    max_power_restrictions_eirp: "Naval VLF transmitters run megawatts of input for low-MW EIRP; antennas span square-kilometer arrays. Hobbyists are receive-only — TX is impractical at λ ≈ 10–100 km"
    propagation_interference_notes: "Excellent global ground-wave with very stable phase; strong Earth-ionosphere waveguide propagation that improves at night for true global DX. Dominant interference is mains harmonics, switch-mode supply noise, and PLC (power-line comms)"
    safety_exposure_limits: "Follow ICNIRP low-frequency RF guidelines. Ambient power density at hobbyist receive sites is many orders of magnitude below limits"
    technologies_example_devices: "U.S. Navy Cutler (Maine), Jim Creek (Washington), NPM Lualualei (Hawaii), Anthorn (UK), ALPHA/RSDN-20 (Russia), historical Omega navigation, WWVB (60 kHz, edge), DCF77 (77.5 kHz, edge), WWLLN lightning network"
    hobbyist_project_ideas: "Build a VLF loop + sound-card SDR and decode WWVB / DCF77 / MSF time signals; record whistlers and dawn chorus during quiet rural nights; log naval MSK transmitters for ionospheric sounding; correlate sferic rate with thunderstorm activity"
    sources_citations: "ITU Radio Regulations (RR Article 5), ITU-R V.431, NIST time-service publications (WWVB), PTB DCF77 docs, NPL MSF, ARRL VLF resources, IEEE Trans. Antennas & Propagation (2026)"
    usability_badge: "🟢 Public / Receive-only (time signals) + 🔵 Military"

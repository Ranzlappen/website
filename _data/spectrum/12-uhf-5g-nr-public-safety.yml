---
# =============================================================================
# Spectrum Batch 12 — UHF Cellular / 5G NR Mid-Band / Public Safety
# =============================================================================
# Migrated and upgraded from the original 05-vhf-uhf.yml and 06-shf-ehf-
# microwave.yml. Covers UHF licensed mobile services that hobbyists are
# most likely to encounter: TETRA / TETRAPOL / DMR Tier III / P25 public
# safety, the canonical 600 MHz – 2.7 GHz cellular bands (LTE / 5G NR
# FR1 low- and mid-band), and the 5G NR C-band (3.3–4.2 GHz, n77 / n78
# / n79). The 5G C-band technically lives in SHF (3 – 30 GHz) but is
# included here per project plan because the n-numbers, deployments,
# and hobbyist tooling cluster with the rest of UHF cellular. mmWave
# 5G (n257 / n258 / n260 / n261 etc.) and SHF satellite / radar / Wi-Fi
# 5/6/7 are deferred to later batch files. Schema: identical 14-column
# layout + batch wrapper used by all earlier files.
# =============================================================================

batch:
  id: "uhf-5g-nr-public-safety"
  order: 12
  name: "UHF Cellular / 5G NR Mid-Band / Public Safety"
  short_name: "UHF Cellular + 5G NR + PS"
  description: >
    Licensed UHF mobile services. Public-safety PMR (TETRA, P25, DMR
    Tier III) at 380–470 / 700 / 800 MHz; cellular LTE / 5G NR low-band
    600–1000 MHz (n5 / n8 / n12 / n14 / n20 / n28 / n71); cellular mid-
    band 1.4–2.7 GHz (n1 / n2 / n3 / n7 / n40 / n41 / n66); and 5G NR
    C-band 3.3–4.2 GHz (n77 / n78 / n79). Also hosts the L-band GNSS
    allocations (GPS L1 / L2 / L5, Galileo, GLONASS, BeiDou) and the
    1.4 GHz HI-line radio-astronomy primary allocation. Hobbyists are
    receive-only — use an SDR or modem to map coverage, decode
    signalling (where legal and unencrypted), and learn the PHY-layer
    behaviour of modern cellular, GNSS, and radio-astronomy spectrum.
  last_updated: "2026-05-08"

bands:
  - frequency_range: "380 MHz – 470 MHz (Public-Safety / PMR / TETRA / DMR)"
    key_frequencies_channels: "TETRA 380–400 MHz (government / public-safety, Europe/Germany — ITU Region 1, ETSI EN 300 392); TETRA 410–430 MHz (private / industry, R1); TETRAPOL 380–400 MHz (legacy, France / Spain / Germany BOS); DMR Tier I / II / III 446–470 MHz consumer / 410–470 MHz business; P25 Phase 1 / 2 segments 380–470 MHz (and primarily 700 / 800 MHz, see next row); UHF business / land-mobile 450–470 MHz; PMR446 446.0–446.2 MHz license-free FM / digital; UHF airband adjunct 400.15–406 MHz satcom / Argos / SARSAT (search-and-rescue) 406.025–406.100 MHz"
    band_name_designation: "UHF Public-Safety / PMR / TETRA / DMR"
    primary_uses_hobbyist_relevance: "Listening to non-encrypted public-safety dispatch (where legal), monitoring TETRA control channels, decoding DMR / NXDN / dPMR, mapping local PMR usage, license-free PMR446 walkie-talkies, COSPAS-SARSAT 406 MHz beacon monitoring (RX-only — TX is illegal except in genuine emergencies)"
    hardware_modules: "RTL-SDR / Airspy R2 / SDRplay RSPdx + SDRTrunk / DSDPlus / Tetra-RX / TETRA-Decoder / TETRA-Kit (open-source); scanners (Uniden BCD536HP, BCD436HP, Whistler TRX-1/2 with DMR / NXDN / P25 keys); PMR446 handhelds (Motorola TLKR T82, Retevis RT24, Baofeng UV-5R EU PMR variant — note FM-only PMR446 strict in EU); MOTOTRBO / Hytera radios (licensed); Airbus Sepura / TPH900 TETRA terminals (for licensed users). Limitation: even the best hobbyist SDR cannot decrypt encrypted public-safety traffic (TETRA TEA, P25 AES, DMR ARC4) — it just shows the encrypted bitstream"
    antenna_diy_considerations: "1/4-wave whip ≈ 16 cm at 460 MHz, J-pole / Slim-Jim, magnetic-mount whip on a vehicle for war-driving, broadband discone for scanning, log-periodic 100–800 MHz, base-station collinear (Comet GP-3, Diamond X-30) for stationary monitoring"
    legal_licensing_notes: "ITU allocated to fixed, mobile, and amateur (in some countries — note 70 cm ham overlap at 430–440 MHz EU). National licensing required for TX (TETRA, P25, DMR business). PMR446 (Europe/Germany — ITU Region 1) and FRS (United States — ITU Region 2 — see 462/467 MHz separately) are license-free at low power. Decrypting encrypted public-safety traffic is illegal in most jurisdictions; receiving non-encrypted traffic is generally legal in United States (ITU Region 2) / UK / NL / SE but restricted in DE / FR — check local rules"
    max_power_restrictions_eirp: "TETRA terminals 1–3 W (handheld) / 10–30 W (mobile) / 25 W (base); DMR Tier II / III similar; P25 5 W HT / 100 W mobile / 100+ W base. PMR446 capped at 0.5 W ERP in EU (FM) or 0.5 W (digital). Hobbyists are receive-only unless individually licensed (or using PMR446)"
    propagation_interference_notes: "Line-of-sight with good building penetration (better than 800 MHz for diffraction); tropo enhancement adds 100–300 km. Local QRM from 70 cm ham, 433 MHz ISM, and switch-mode supplies"
    safety_exposure_limits: "Follow ICNIRP / FCC OET-65 RF-exposure guidelines"
    technologies_example_devices: "TETRA / TETRAPOL (BOS / public-safety in DE / FR / UK ESN transition / NL C2000), P25 Phase 1 / 2, DMR Tier II / III, NXDN, dPMR, Project 25 trunked systems, PMR446 consumer FM / digital, COSPAS-SARSAT 406 MHz beacons"
    hobbyist_project_ideas: "Build an SDRTrunk receiver to follow your local trunked public-safety system (legally and unencrypted only); decode DMR voice with DSDPlus and an RTL-SDR; map TETRA coverage in your city; build a 406 MHz beacon-monitoring station feeding the SARNET community"
    wavelength: "λ = c/ν ≈ 64 – 79 cm (1/4-wave whip ≈ 16 cm at 460 MHz)"
    photon_energy: "N/A (RF)"
    sources_citations: "ETSI EN 300 392 (TETRA), ETSI TS 102 361 (DMR), TIA-102 (P25), ITU-R Radio Regulations, FCC Part 90, BNetzA / Ofcom national tables, COSPAS-SARSAT documentation (2026)"
    usability_badge: "🟡 Licensed / Mobile (receive-only for hobbyists)"

  - frequency_range: "600 MHz – 1000 MHz (Cellular LTE / 5G NR low-band, FRS / GMRS, public-safety 700/800 MHz)"
    key_frequencies_channels: "n71 / B71 600 MHz (UL 663–698 MHz / DL 617–652 MHz, USA T-Mobile); n29 / B29 700 MHz SDL DL-only (717–728 MHz, USA); n12 / B12 700 MHz lower (UL 699–716 MHz / DL 729–746 MHz); n13 / B13 700 MHz upper-c (UL 777–787 / DL 746–756 MHz, USA Verizon); n14 / B14 FirstNet 700 MHz upper (UL 788–798 / DL 758–768 MHz, US public-safety LTE/5G HPUE 1.25 W); n28 / B28 700 MHz APAC (UL 703–748 / DL 758–803 MHz, EU + Asia + LATAM); n8 / B8 GSM-900 / E-GSM 900 MHz EU (UL 880–915 / DL 925–960 MHz); n5 / B5 850 MHz CDMA-legacy (UL 824–849 / DL 869–894 MHz); n26 / B26 850 MHz extended (UL 814–849 / DL 859–894 MHz, USA Sprint legacy → T-Mobile); n20 / B20 800 MHz EU + UK ESN (UL 832–862 / DL 791–821 MHz); n6 / B6 850 MHz Japan KDDI (UL 830–840 / DL 875–885 MHz); n18 / B18 850 MHz Japan KDDI (UL 815–830 / DL 860–875 MHz); n83 SDL 700 MHz; P25 Phase 1 / 2 700 MHz (763–775 / 793–805 MHz public-safety US); P25 800 MHz NPSPAC (806–824 / 851–869 MHz); FRS / GMRS 462.5500–467.7250 MHz (United States — ITU Region 2; FRS license-free, GMRS individual license)"
    band_name_designation: "UHF Cellular Low-Band + 700 / 800 MHz Public-Safety + FRS / GMRS"
    primary_uses_hobbyist_relevance: "Mapping LTE / 5G NR low-band coverage, monitoring 700 / 800 MHz public-safety trunked systems (P25 / DMR), running FRS / GMRS handhelds (United States — ITU Region 2), decoding cellular control-plane signalling for PHY-layer education (RX-only)"
    hardware_modules: "RTL-SDR / Airspy / SDRplay + Falcon / srsRAN / OAI for LTE PHY decoding; 5G NR modems (Quectel RM500Q, RM502Q-AE, Sierra Wireless EM9191, Telit FN980); Android engineering modes (NetMonster, G-NetTrack Pro, NSG Pro on Samsung); FRS / GMRS HTs (Midland GXT1000VP4, Motorola T800, BTECH GMRS-V1 with license); P25 / DMR scanners (Uniden BCD536HP, Whistler TRX-2). Limitation: SDRs cannot decrypt encrypted cellular calls (LTE / NR PDCP-level encryption) — they only see PHY-layer signalling and the encrypted PDCP frames"
    antenna_diy_considerations: "1/4-wave whip ≈ 8 cm at 900 MHz, half-wave dipole ≈ 16 cm, log-periodic 700–2700 MHz for cellular surveys, 5G NR-friendly 4×4 MIMO panel for site-survey work, mag-mount whip on a vehicle"
    legal_licensing_notes: "ITU allocated to mobile, fixed, broadcasting (legacy TV in 614–698 MHz post-incentive auction), and aeronautical mobile in some sub-bands. Cellular bands operator-licensed worldwide (national auctions); user equipment license-by-rule. Public-safety 700 / 800 MHz operator-licensed. FRS license-free in United States (ITU Region 2); GMRS requires individual license in the US ($35 for 10 years, no exam)"
    max_power_restrictions_eirp: "Cellular UE: 23 dBm (200 mW) typical, 26 dBm (400 mW) for some Cat-A power-class-2 5G devices on n41 / n78 (mid-band). Cellular base: 40–60 W per sector EIRP, often 80+ W with active antennas. FRS: 2 W ERP (US), GMRS: 5 W (HT) / 50 W (mobile / repeater). Public-safety LTE Band 14 high-power user equipment up to 1.25 W (HPUE)"
    propagation_interference_notes: "Excellent building penetration vs. mid- and high-band; 600 / 700 MHz reaches indoor coverage where 3.5 GHz cannot. Tropo enhancement modest. Local QRM from cellular boosters / repeaters and DTV adjacent channels"
    safety_exposure_limits: "Follow ICNIRP / FCC OET-65 RF-exposure guidelines; modern smartphones SAR-tested per IEC 62209; macrocell base-stations have published exclusion zones (typically 1–10 m in main lobe at 60 W EIRP)"
    technologies_example_devices: "LTE Cat-1 / Cat-4 / Cat-M / NB-IoT, 5G NR FR1 SA / NSA, FirstNet (US) on Band 14, ESN (UK) on Band 20 / 28, P25 Phase 2 trunked, DMR Tier III, FRS / GMRS handhelds"
    hobbyist_project_ideas: "Use an Android phone in engineering mode (NetMonster) to map your local n71 / n28 cell IDs and signal strength; decode LTE PCI / TAC with srsRAN + RTL-SDR; build a small directional antenna and locate a weak 700 MHz repeater; run a GMRS repeater (US license required)"
    wavelength: "λ = c/ν ≈ 30 – 50 cm (n71 600 MHz ≈ 50 cm; 900 MHz ≈ 33 cm; 1/4-wave whip ≈ 8 cm at 900 MHz)"
    photon_energy: "N/A (RF)"
    sources_citations: "3GPP TS 38.101-1 / 36.101 (NR / LTE bands), ITU-R Radio Regulations, FCC Part 27 / Part 90 / Part 95, ETSI / 3GPP Release 15 – 18, BNetzA national table, Ofcom UK ESN docs (2026)"
    usability_badge: "🟡 Licensed / Mobile (receive-only for hobbyists)"

  - frequency_range: "1.4 GHz – 2.7 GHz (Cellular LTE / 5G NR low- and mid-band)"
    key_frequencies_channels: "n45 / B45 1500 MHz APT (~1432–1517 MHz); n66 / B66 / B4 AWS-1 / AWS-3 (1710–1780 / 2110–2200 MHz); n3 / B3 DCS 1800 (1710–1785 / 1805–1880 MHz); n2 / B2 PCS 1900 (1850–1910 / 1930–1990 MHz); n1 / B1 IMT-2100 (1920–1980 / 2110–2170 MHz); n30 / B30 WCS 2300 (2305–2315 / 2350–2360 MHz); n40 / B40 TDD 2300 (2300–2400 MHz); n41 / B41 TDD 2500 (2496–2690 MHz); n7 / B7 IMT-E 2600 (2500–2570 / 2620–2690 MHz); n38 / B38 TDD 2600 (2570–2620 MHz); n75 / n76 SDL 1500 / 1500 (downlink-only supplemental)"
    band_name_designation: "UHF Cellular Low-Mid / Mid-Band — n1 / n2 / n3 / n7 / n40 / n41 / n66"
    primary_uses_hobbyist_relevance: "The bread-and-butter of 4G LTE and 5G NR FR1 mid-band capacity. Useful for cellular site surveys, drive-tests, indoor-coverage analysis, and PHY-layer learning"
    hardware_modules: "5G modems (Quectel RM500Q-GL / RM520N-GL, Sierra Wireless EM9191, Telit FN980m), Waveshare RM502Q-AE M.2 boards, Android engineering tools (NetMonster, NSG Pro, G-NetTrack Pro), drive-test kits (Rohde & Schwarz TSME6, R&S Romes for pros), HackRF One / LimeSDR Mini / USRP B210 + srsRAN / OAI for educational testbeds, RTL-SDR for downlink-only PHY observation. Limitation: SDRs cannot decrypt encrypted cellular calls — only PHY-layer signalling visible"
    antenna_diy_considerations: "1/4-wave whip ≈ 4 cm at 1900 MHz, MIMO panel antennas for site survey, 4×4 MIMO sleeve dipoles for n41 / n78 mid-band, log-periodic 700–6000 MHz for cellular drive-test, hilltop dish with feed converter (rare for hobbyists)"
    legal_licensing_notes: "ITU allocated to mobile, fixed, satellite, and radiolocation in some sub-bands. Cellular bands auctioned to operators per country. UE license-by-rule. Setting up your own LTE / 5G eNB / gNB requires either a research / experimental license or use of small isolated test cells (Faraday cage)"
    max_power_restrictions_eirp: "UE 23 dBm typical; 26 dBm power-class 2 on n41 / n78 / n79 (HPUE). Macrocell base 40–80 W EIRP per sector, active antennas push to 100+ W with massive MIMO. Hobbyists are receive-only outside experimental licenses"
    propagation_interference_notes: "Mid-band — sweet spot of capacity vs. coverage. Building penetration weaker than low-band but better than 3.5 GHz. Sensitive to vegetation. Local QRM from microwave ovens (n7 / n41 sit just above 2.45 GHz ISM)"
    safety_exposure_limits: "Follow ICNIRP / FCC OET-65 / IEC 62209 RF-exposure guidelines; modern smartphones SAR-tested for body / head"
    technologies_example_devices: "LTE Cat-1 through Cat-20, LTE-A carrier aggregation, LAA / LTE-U (in 5 GHz), 5G NR FR1 SA / NSA, NB-IoT (in-band on existing LTE carriers), private 5G on n40 / n41 (industrial)"
    hobbyist_project_ideas: "Run srsRAN on a USRP B210 inside a Faraday cage to learn LTE / 5G NR PHY end-to-end; build a 5G NR site-survey rig with a Quectel RM520N-GL on a Raspberry Pi CM4; profile your home cellular coverage with NetMonster across all bands"
    wavelength: "λ = c/ν ≈ 11 – 21 cm (1/4-wave whip ≈ 4 cm at 1.9 GHz; n41 2.5 GHz ≈ 12 cm)"
    photon_energy: "N/A (RF)"
    sources_citations: "3GPP TS 38.101-1 / 36.101 (NR / LTE bands), ITU-R Radio Regulations, FCC Part 22 / Part 24 / Part 27, ETSI / 3GPP Release 15 – 18, BNetzA / Ofcom / FCC band tables, GSMA Spectrum Tracker (2026)"
    usability_badge: "🟡 Licensed / Mobile (receive-only for hobbyists)"

  - frequency_range: "3.3 GHz – 4.2 GHz (5G NR C-Band: n77 / n78 / n79)"
    key_frequencies_channels: "n78 3300–3800 MHz TDD (Europe DE / FR / UK / NL deployments, India n78, Japan portions); n77 3300–4200 MHz TDD (USA C-band 3.7–3.98 GHz auction segment, China expanded n77 3300–4200, Brazil); n79 4400–5000 MHz TDD (Japan / China private); US C-band 3.7–3.98 GHz CBRS-adjacent; CBRS / PAL / GAA 3.55–3.70 GHz (USA Part 96, GAA-tier license-free for compliant SAS-managed devices); EU pioneer band 3.4–3.8 GHz; UK 3.4–3.8 GHz (EE / Vodafone / O2 / Three); German 3.7–3.8 GHz industrial / private 5G campus license"
    band_name_designation: "5G NR C-Band (Mid-Band / 'sub-6') — n77 / n78 / n79 + CBRS"
    primary_uses_hobbyist_relevance: "Public 5G NR mid-band capacity worldwide, US Citizens Broadband Radio Service (CBRS) at 3.55–3.70 GHz, German / French / UK / Japanese industrial private 5G campus networks, fixed wireless access (FWA), passive 5G PHY observation with SDR"
    hardware_modules: "5G NR modems with n77 / n78 / n79 support (Quectel RM500Q-GL, RM520N-GL, Sierra EM9191, Telit FN980m); CBRS-capable APs (Baicells Nova 233, Cradlepoint W1855, Celona, Ruckus Q710 / Q910); SDR for RX with up-converted front-end (Airspy / SDRplay top out at ~6 GHz natively, USRP B210 / X310 covers natively, LimeSDR XTRX, BladeRF 2.0 micro covers up to 6 GHz); spectrum analyzers (R&S FSV3000, Anritsu MS2090A); for hobbyists: Quectel modem on a Raspberry Pi gives PHY-layer telemetry. Limitation: SDRs cannot decrypt encrypted cellular calls — only PHY-layer signalling visible"
    antenna_diy_considerations: "Patch / panel antennas (4×4 or 8×8 MIMO) for site survey, parabolic dish + feed for FWA point-to-point, sectorised 65° / 90° panel for fixed CBRS sites, 1/4-wave whip ≈ 2 cm (impractical alone — use directional gain), log-periodic 1–6 GHz for general scanning"
    legal_licensing_notes: "ITU allocated to fixed, mobile, satellite (legacy C-band downlink), and radiolocation (military radar in some sub-bands — coordination required, esp. US C-band 3.7–3.98 GHz cleared from FSS). CBRS (USA Part 96) is a tiered shared-access band: incumbents (Navy radar) > PAL (priority access licenses) > GAA (general authorised access, license-free for compliant SAS-managed devices). Private 5G campus licenses widely available in Germany (3.7–3.8 GHz), France, Netherlands, UK, Japan"
    max_power_restrictions_eirp: "n78 macrocell base ~52 dBm / 80 W EIRP per sector, active antennas (massive MIMO 64T64R) up to 65–78 dBm beam EIRP. UE 26 dBm power-class 2 (HPUE). CBRS Category A AP: 30 dBm / 1 W per 10 MHz (indoor); Category B: 47 dBm / 50 W EIRP (outdoor); CBRS UE 23 dBm typical. Industrial / private 5G campus: 23 dBm UE, base limited per national rules (DE 75 dBm/MHz EIRP)"
    propagation_interference_notes: "Line-of-sight dominant; weaker building penetration than low- and mid-band — operators rely on outdoor-indoor signal at 3.5 GHz with limited success. Heavy beamforming (massive MIMO) compensates. Some incumbents (US C-band radar altimeters at 4.2–4.4 GHz) caused 5G coordination issues — adjacent channel"
    safety_exposure_limits: "Follow ICNIRP 2020 / FCC OET-65 RF-exposure guidelines; small-cell EIRP and sector EIRP have published exclusion zones. Higher public scrutiny in densely populated areas — operators routinely publish coverage / exposure maps"
    technologies_example_devices: "5G NR FR1 SA / NSA on n77 / n78 / n79, FWA (T-Mobile Home Internet, Vodafone GigaCube), CBRS PAL / GAA on n48, German Industrie-4.0 5G campus networks, Japan private 5G NR on n79"
    hobbyist_project_ideas: "Run a Quectel RM520N-GL on a Pi CM4 with QMI / MBIM and log per-cell metrics across n77 / n78 / n79; build a passive 5G monitor with USRP B210 + srsRAN to learn the PHY frame structure; deploy a CBRS LTE/NR small cell in your home (US, Cat-A AP + SAS account)"
    wavelength: "λ = c/ν ≈ 7.1 – 9.1 cm (n78 3.5 GHz ≈ 8.6 cm; 1/4-wave whip ≈ 2 cm — directional gain dominates)"
    photon_energy: "N/A (RF)"
    sources_citations: "3GPP TS 38.101-1 (NR FR1 bands), ITU-R Radio Regulations, FCC Part 96 (CBRS) and Auction 107 (US C-band) docs, BNetzA 3.7–3.8 GHz industrial license rules, Ofcom 5G C-band auctions, ETSI / 3GPP Release 15 – 18, GSMA 5G Spectrum Tracker (2026)"
    usability_badge: "🟡 Licensed / Mobile (receive-only for hobbyists)"

  - frequency_range: "1176.45 MHz – 1575.42 MHz (GNSS L-band: GPS L5 / L2 / L1, Galileo E5 / E6 / E1, GLONASS, BeiDou)"
    key_frequencies_channels: "GPS L1 1575.42 MHz (C/A + P(Y) + M-code), L2 1227.60 MHz (P(Y) + L2C + M-code), L5 1176.45 MHz (safety-of-life, modernised); Galileo E1 1575.42 MHz (interoperable with GPS L1), E5a 1176.45 MHz (= L5), E5b 1207.14 MHz, E6 1278.75 MHz; GLONASS L1 1598.0625–1605.375 MHz (FDMA legacy) + L1OC 1600.995 MHz (CDMA), L2 1242.9375–1248.625 MHz; BeiDou B1I 1561.098, B1C 1575.42, B2a 1176.45, B2b 1207.14, B3I 1268.52 MHz; SBAS / WAAS / EGNOS / MSAS / GAGAN co-channel with L1; QZSS L1 / L2 / L5 / L6 (Japan); IRNSS / NavIC L5 + S-band 2492.028 MHz"
    band_name_designation: "GNSS L-band — GPS / Galileo / GLONASS / BeiDou navigation"
    primary_uses_hobbyist_relevance: "Position, velocity, and time (PVT) for billions of devices. Hobbyist applications: HAB / drone / robot navigation, RTK survey-grade positioning (cm-level), GPSDO frequency references for ham / lab use, NTP stratum-1 time servers, ionospheric TEC mapping, GNSS jamming / spoofing detection, satellite spectrum observation"
    hardware_modules: "u-blox NEO-6 / 7 / 8 / 9 / M10 (single- and multi-band consumer modules); u-blox ZED-F9P / F9R multi-constellation multi-band L1+L2+L5 RTK receivers (~$200, cm accuracy with base station); Trimble / Leica survey receivers; Septentrio mosaic-X5 / Mosaic-H multi-band; SimpleRTK2B (ArduSimple); Quectel LC79H / LC76G; SDR-based: RTL-SDR + GNSS-SDR / GPS-SDR-SIM / gnss-sdrlib for software-defined GPS L1 reception; GPSDO modules (Leo Bodnar, Trimble Thunderbolt-E for 10 MHz / 1 PPS reference); chipscale-atomic-clock (CSAC SA.45s) holdover. Limitation: civilian receivers do not decode P(Y) / M-code (encrypted military signals)"
    antenna_diy_considerations: "Active patch antenna (right-hand circular polarisation, RHCP) is the canonical GNSS antenna — built into virtually every consumer device. Survey-grade choke-ring antennas (Trimble Zephyr, NovAtel GNSS-750, Topcon CR-G5) reject ground multipath. Helical / quadrifilar helix for handheld. 1/4-wave whip ≈ 4.7 cm at L1 (rarely used due to polarisation mismatch). Patch dimensions ~30 mm at L1; multi-band patches stack L1+L2+L5 layers. Skyview matters: keep a clear hemisphere above 10° elevation"
    legal_licensing_notes: "ITU radio-navigation-satellite service (RNSS) primary in 1164–1300 MHz and 1559–1610 MHz, protected internationally. Receive-only is unlicensed everywhere. GNSS jamming and spoofing are illegal in nearly all jurisdictions (US: Communications Act, FCC enforcement; EU: national radio acts; criminal penalties). Personal-privacy GPS jammers sold online are illegal to import / operate in most countries"
    max_power_restrictions_eirp: "Satellite EIRP toward Earth: GPS L1 C/A ≈ 27 dBW (500 W) into space-vehicle hemispherical antenna → received signal at Earth's surface ≈ −130 dBm (weaker than thermal noise — recovered via spread-spectrum processing gain ~43 dB). Galileo / GLONASS / BeiDou similar order. RTK base stations: typically 1–10 W on 410–470 MHz UHF backhaul or NTRIP over IP. Hobbyists are RX-only — TX on these frequencies is illegal (jamming offence)"
    propagation_interference_notes: "Line-of-sight to GNSS satellites; signal is below the noise floor and recovered by despreading. Multipath (urban canyons, water surfaces) is the dominant accuracy degrader for consumer receivers; RTK + SBAS + dual-/triple-frequency reduce errors to cm. Ionospheric delay scales as 1/ν<sup>2</sup> — multi-band receivers cancel it directly. Local interference: in-band jamming, intentional spoofing (a real and growing threat near conflict zones), LightSquared / Ligado L-band terrestrial proposals (US, controversial)"
    safety_exposure_limits: "Follow ICNIRP / FCC OET-65 RF-exposure guidelines. GNSS receive-only setups have zero exposure issue; the satellite signal arrives at ~−130 dBm, far below detection without a low-noise antenna"
    technologies_example_devices: "Every smartphone, car nav, fitness watch, and drone uses GNSS. Survey: Trimble R12i, Leica GS18, Topcon HiPer VR; ag/auto: John Deere StarFire, Trimble TMX-2050; aviation: ADS-B / WAAS / SBAS-augmented; maritime: ECDIS chart plotters; time: NTP stratum-1 servers (Meinberg, Microsemi); autonomous vehicles use multi-frequency RTK + IMU + LiDAR fusion"
    hobbyist_project_ideas: "Build a u-blox ZED-F9P RTK rover + base station for cm-level positioning (under $500); set up a Raspberry Pi NTP stratum-1 server with a u-blox + PPS GPIO; log raw RINEX observations and post-process with RTKLIB; correlate ionospheric TEC with solar activity using dual-frequency carrier-phase; build a GPSDO 10 MHz reference for your shack with a Leo Bodnar mini-precision; experiment with software-defined GPS reception (GNSS-SDR + RTL-SDR + active patch); drive-test for cellular-network spoofing detection along motorway corridors"
    wavelength: "λ = c/ν ≈ 19.04 cm (L1 1575.42 MHz), 24.42 cm (L2 1227.60 MHz), 25.48 cm (L5 1176.45 MHz)"
    photon_energy: "N/A (RF — E = hν ≈ 6.5 μeV at L1)"
    sources_citations: "ITU-R Radio Regulations RR Article 5 (RNSS allocations), GPS Interface Specification IS-GPS-200N (L1/L2) / IS-GPS-705 (L5), Galileo OS SIS ICD, GLONASS ICD, BeiDou ICD-OS, RTCM-104 SSR + RTK standards, u-blox ZED-F9P integration manual, RTKLIB documentation, IGS (International GNSS Service) data archives (2026)"
    usability_badge: "🟡 Licensed / Public receive-only"

  - frequency_range: "1.420 GHz (HI line) + 22.235 GHz (H₂O maser) + protected radio-astronomy / VLBI windows"
    key_frequencies_channels: "Neutral-hydrogen 21 cm line at 1420.4057517667 MHz (the 'HI line', cornerstone of galactic radio astronomy and SETI's 'water hole' between HI and OH at 1612–1720 MHz); H₂O maser at 22.23508 GHz (star-forming regions, AGN); OH lines 1612 / 1665 / 1667 / 1720 MHz; methanol maser CH₃OH 6.668 / 12.178 GHz; CO J=1→0 at 115.271 GHz, J=2→1 at 230.538 GHz (mm-wave CO surveys); ammonia NH₃ at 23.694 / 23.722 / 23.870 GHz; CMB observation band ~30–300 GHz (Planck, LiteBIRD); VLBI standard frequencies 1.4 / 2.3 / 5 / 8.4 / 22 / 43 / 86 GHz (S/X/K/Q-band) coordinated globally via IVS"
    band_name_designation: "Radio-astronomy / VLBI key allocations — HI line, H₂O maser, OH/CH₃OH masers, mm-wave molecular lines"
    primary_uses_hobbyist_relevance: "Galactic structure mapping via 21 cm line (THE accessible amateur radio-astronomy target — measure galactic rotation curves with a 1 m dish), pulsar timing, SETI, VLBI Earth-orientation / geodesy (IVS), CMB cosmology, molecular-cloud spectroscopy of star-forming regions; the 21 cm line is the canonical 'first radio-astronomy project' for serious hobbyists"
    hardware_modules: "21 cm: 1.0–1.5 m parabolic dish (offset Ku-band TV dish works with retuned feed) or 2-element helix array, 1420 MHz LNA (Mini-Circuits ZX60-P162LN+, custom GaAs HEMT, ~0.3 dB NF), bandpass filter (1390–1450 MHz cavity), RTL-SDR / Airspy / SDRplay / HackRF + virtinst gnuradio H-line scripts, JPL / GBT 'Open Source Radio Telescope' designs; 22 GHz H₂O maser: Kuhne MKU 24 G LNA + 60 cm dish + transverter (much harder — typically university-level); VLBI: hydrogen-maser frequency reference + GNSS time-tag (very advanced); SETI tools (SETI@home archive, Breakthrough Listen public data)"
    antenna_diy_considerations: "21 cm: 1.0–1.5 m offset / prime-focus parabolic dish (gain ~22–26 dBi, beamwidth ~10°), helical antenna (10–14 turn, RHCP), Yagi-Uda 8–12 element, horn antenna. 22 GHz H₂O maser: 60 cm – 1.2 m parabolic with Cassegrain feed (gain ~38–42 dBi). VLBI: needs precise pointing + time + position metrology (cm-class GNSS, hydrogen maser). Side note: backyard 1 m dish + cooled LNA is enough to detect H I in ~30 minutes integration"
    legal_licensing_notes: "ITU radio-astronomy service (RAS) primary allocation at 1400–1427 MHz (HI line) and 22.21–22.5 GHz (H₂O), with footnotes RR 5.149 / 5.340 / 5.341 protecting passive observation. Adjacent allocations are under-pressure (Iridium / SpaceX out-of-band emissions into 1610.6–1613.8 MHz OH band have caused real interference incidents). Receive-only by hobbyists is unrestricted everywhere. Active TX into RAS bands is heavily coordinated via national bodies (NSF / FCC, BNetzA, Ofcom)"
    max_power_restrictions_eirp: "Receive-only — astronomical sources are typically −180 to −250 dBW per Hz, requiring large dishes + cryogenic LNAs for professional work. RAS protection thresholds: ITU-R RA.769 sets harmful-interference levels at −255 dBW/m<sup>2</sup>/Hz at 1.4 GHz (extraordinarily strict). Hobbyists are RX-only — observation power is N/A"
    propagation_interference_notes: "21 cm: clear-air propagation, sky background 5–10 K, galactic plane 30–100 K above the cold sky; major terrestrial QRM from cellular L-band (Iridium 1610–1626 MHz adjacent), SatCom, FAA radar harmonics. 22 GHz H₂O: significant atmospheric water-vapour absorption + emission — the line is broadened by terrestrial water vapour, requiring high dry sites for clean spectra. Both bands have dedicated 'radio-quiet zones' (Green Bank WV USA, Pickles WA AU, Effelsberg DE)"
    safety_exposure_limits: "Receive-only — no TX exposure. Cryogenic LNA handling: standard cryogenic safety (LN₂ / He, oxygen-deficient atmosphere awareness)"
    technologies_example_devices: "Professional: Arecibo (decommissioned), FAST (China 500 m), Effelsberg (100 m), Green Bank Telescope (100 m), Parkes 64 m, ALMA (mm/sub-mm), VLBA / EVN / VLBI Global Observing System, Square Kilometre Array (SKAO under construction). Amateur: SARA (Society of Amateur Radio Astronomers) members run 1–4 m dishes for 21 cm; Open Source Radio Telescope (OSRT) and ESA / NRAO educational kits"
    hobbyist_project_ideas: "Build a 1.2 m offset dish + 1420 MHz LNA + RTL-SDR and detect the galactic HI line in your backyard (~30 min integration time, 2–3 km/s velocity resolution); map the galactic rotation curve along the Milky Way (Doppler shift across the galactic plane); contribute observations to the SARA database; analyse public Breakthrough Listen + Green Bank data for SETI candidates; correlate H I emission with hydrogen-deficient regions of the galactic disk; observe the radio sun at 1.4 GHz during a coronal mass ejection"
    wavelength: "λ ≈ 21.106 cm (HI line, 1420.4 MHz), λ ≈ 1.348 cm (H₂O maser, 22.235 GHz)"
    photon_energy: "N/A (RF — E = hν ≈ 5.87 μeV at HI line, 92 μeV at 22 GHz; hyperfine spin-flip transitions, not electronic)"
    sources_citations: "ITU-R Radio Regulations RR 5.149 / 5.340 / 5.341 / 5.563A (RAS protection), ITU-R RA.769 (RAS interference levels), IVS (International VLBI Service) frequency standards, NRAO / ALMA / SKAO publications, SARA Journal of Amateur Radio Astronomy, Open Source Radio Telescope project, Breakthrough Listen archive (2026)"
    usability_badge: "🔴 Restricted / Scientific (receive-only for hobbyists)"

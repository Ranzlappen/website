---
# =============================================================================
# Spectrum Batch 03 — Extremely Low Frequency (ELF, 3 Hz – 30 Hz)
# =============================================================================
# Migrated and upgraded from the original 02-elf-slf-ulf.yml. Covers ONLY
# the official ITU ELF band (3 Hz – 30 Hz). SLF (30 Hz – 300 Hz) and ULF
# (300 Hz – 3 kHz) rows are intentionally deferred to later batch files.
# Schema: identical 14-column layout used by the boundary and ultra-low
# files. ELF is dominated by submarine comms, Schumann resonances, and
# deep-Earth geophysics — receive-only territory for hobbyists.
# =============================================================================

batch:
  id: "elf"
  order: 3
  name: "Extremely Low Frequency (ELF, 3 Hz – 30 Hz)"
  short_name: "ELF"
  description: >
    The lowest officially recognized ITU radio band. Wavelengths of 10,000 –
    100,000 km penetrate seawater and the Earth's crust with extremely low
    attenuation, supporting one-way submarine communication and deep-Earth
    geophysical sounding. Schumann resonances (7.83 Hz fundamental and its
    harmonics) live in this band and are continuously excited by global
    lightning, making ELF an attractive receive-only target for hobbyists.
  last_updated: "2026-05-07"

bands:
  - frequency_range: "3 Hz – 30 Hz"
    key_frequencies_channels: "Schumann resonances (7.83, 14.3, 20.8, 27.3 Hz), U.S. Navy ELF (~76 Hz historically — now decommissioned), Russian ZEVS (~82 Hz), 50/60 Hz mains harmonics encroaching from above"
    band_name_designation: "Extremely Low Frequency (ELF) — ITU band 1"
    primary_uses_hobbyist_relevance: "One-way submarine communication (global reach), deep-Earth conductivity mapping, Schumann-resonance monitoring, biological-effects research; for hobbyists this is a receive-only natural-signals band"
    hardware_modules: "Historical: gigantic ground-based antenna arrays (Project Sanguine / Seafarer in Michigan & Wisconsin, Russian ZEVS). Modern: SQUID magnetometers, induction-coil sensors, DIY ELF receivers (multi-turn loop + low-noise op-amp + USB sound-card ADC)"
    antenna_diy_considerations: "TX requires huge ground dipoles (tens to hundreds of km) using bedrock as part of the radiator — impractical outside national programs. RX is feasible with a 1–2 m multi-turn air-core or ferrite-rod loop and a high-impedance pre-amp; orient broadside to lightning regions for best Schumann pickup"
    legal_licensing_notes: "ITU allocated to fixed and mobile services (military-dominant) in Regions 1, 2, and 3. No general amateur allocation. Receive-only operation requires no license in most jurisdictions; check local rules before transmitting"
    max_power_restrictions_eirp: "Operational TX systems run megawatts of input for ~watts of EIRP due to extremely poor antenna efficiency at λ ≈ 10,000 km. Hobbyists are receive-only — no TX power applies"
    propagation_interference_notes: "Earth-ionosphere waveguide with global reach; ground-wave dominant. Penetrates hundreds of meters of seawater and deep into the crust. Dominant interference is 50/60 Hz mains harmonics, switching power supplies, and DC-bus inverters — a quiet rural site is essential"
    safety_exposure_limits: "Follow ICNIRP ELF exposure guidelines for general public and occupational settings (reference levels ~100 μT magnetic / 5 kV/m electric at 50/60 Hz). Natural Schumann levels are many orders of magnitude below limits"
    technologies_example_devices: "Project Sanguine / Zevs-style transmitters (historical/active), magnetotelluric (MT) stations, fluxgate and SQUID magnetometers, induction coils at remote observatories (e.g., HAARP, Lehta, MIT Schumann monitor)"
    hobbyist_project_ideas: "Build a simple ELF receiver to monitor Schumann resonances and 50/60 Hz harmonics; log the 7.83 Hz fundamental over a solar cycle; correlate Schumann amplitude with global lightning indices or geomagnetic Kp"
    sources_citations: "ITU Radio Regulations (RR Article 5), ITU-R V.431 (band designations), ARRL ELF/VLF resources, IEEE Trans. EMC ELF papers, NASA Schumann-resonance data (2026)"
    usability_badge: "🔵 Scientific / Military (receive-only for hobbyists)"

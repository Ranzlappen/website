# =============================================================================
# Spectrum Batch 18 — Infrared (300 GHz – 400 THz / 1 mm – 750 nm)
# =============================================================================
# Migrated and upgraded from the original 07-infrared-terahertz.yml. Covers
# the full infrared range — the optical part of the spectrum between
# microwaves and visible light:
#   – 0.3 – 3 THz: Far-infrared / THz gap / sub-millimeter
#   – 3 – 100 THz: Mid-infrared / Long-wave infrared (thermal imaging band)
#   – 100 – 400 THz: Near-infrared / IR-A / fiber-optic comms band
# Visible / UV / X-ray / gamma content remains in the existing file
# (08-visible-uv-xray-gamma.yml) and will be re-batched in subsequent
# files. Schema: identical 14-column layout + batch wrapper used by
# all earlier files.
# =============================================================================

batch:
  id: "infrared"
  order: 18
  name: "Infrared (300 GHz – 400 THz / 1 mm – 750 nm)"
  short_name: "Infrared"
  description: >
    The optical part of the spectrum between microwaves and visible
    light. Sub-mm / THz at the bottom edge feeds 6G research, airport
    security, and pharmaceutical spectroscopy; mid-IR (3–100 THz) is
    where every warm object on Earth emits its blackbody radiation
    and where thermal cameras, gas sensors, and CO₂ lasers operate;
    near-IR (100–400 THz) carries every fiber-optic backbone in the
    world (850 / 1310 / 1550 nm windows) plus consumer IR remotes,
    proximity sensors, and night-vision goggles. Mostly outside ITU
    radio regulation — governed by optical standards and product-
    safety directives instead.
  last_updated: "2026-05-07"

bands:
  - frequency_range: "300 GHz – 3 THz (1 mm – 100 μm; Far-Infrared / THz gap / sub-mm)"
    key_frequencies_channels: "Far-IR / THz gap. ALMA radio-astronomy bands at 84–950 GHz; airport mmWave / THz body scanners (L3Harris ProVision at ~28 GHz, but THz-style imaging at 300 GHz – 1 THz, e.g., Tera-Imaging T-Wave); 0.5–1.5 THz pharmaceutical / industrial spectroscopy (TeraView, Toptica TeraScan); 6G research test-beds (NTT DoCoMo, Nokia Bell Labs, Samsung 140 GHz – 1 THz); IEEE 802.15.3d 252–325 GHz; 183 / 325 / 380 / 448 GHz atmospheric water-vapour absorption lines"
    band_name_designation: "Far-Infrared / Sub-mm / THz gap (FIR)"
    primary_uses_hobbyist_relevance: "Almost exclusively scientific: terahertz time-domain spectroscopy (TDS), pharmaceutical quality control, security screening, sub-mm radio astronomy, 6G channel modeling research; hobbyist activity is limited to reading public ALMA / IRAM data archives and following 6G research papers — no consumer-priced TX hardware exists in 2026"
    hardware_modules: "Photoconductive antennas (THz-TDS systems: Toptica TeraFlash Smart, Menlo Systems TERA K15, TeraView TPS Spectra 3000); quantum cascade lasers (QCL) 1–5 THz (Daylight Solutions, IRsweep); bolometer detectors (cryogenic, NbTiN / TiN superconducting); Schottky-diode harmonic mixers (Virginia Diodes WR-3 / WR-2.2); sub-mm radio-telescope receivers (ALMA, IRAM, SMA); for hobbyists: VDI WR-3 / WR-2.2 multipliers + bolometer kit; sub-THz SDR R&D platforms (Keysight, R&S — lab-grade only)"
    antenna_diy_considerations: "Lens antennas (silicon, polyethylene, PTFE — silicon hyper-hemispheres on photoconductive antennas); corrugated horns (Cassegrain feeds for large-aperture telescopes); Winston / parabolic concentrators; quasi-optical beam guides instead of waveguides at higher THz; ALMA-style cryogenic horn-loaded SIS mixers; aperture diameters 5–50 mm typical"
    legal_licensing_notes: "ITU allocated to fixed, mobile, radio-astronomy, space research, Earth exploration-satellite, and ISM (245 GHz). Above ~275 GHz: less specific allocation, FCC Spectrum Horizons (95–275 GHz US, 2019) opened experimental + licensed access. EU: emerging 6G allocations under CEPT. Optical / non-ionising radiation safety (IEC 60825 not applicable above visible — ICNIRP general public limits in W/m<sup>2</sup>). License usually required for high-power TX; passive RX (radio astronomy) is unrestricted"
    max_power_restrictions_eirp: "QCL output 1–100 mW typical; photoconductive emitters in TDS systems ~1 μW average; Schottky multiplier sources <10 mW; commercial scanners 10 mW – 1 W EIRP. Hobbyists are practically RX-limited by hardware availability — no consumer TX option"
    propagation_interference_notes: "Catastrophic atmospheric absorption: water-vapour lines at 183 / 325 / 380 / 448 / 557 / 752 GHz, oxygen lines at 119 / 425 / 487 GHz; clear-air windows at 220–330 / 380–450 / 500–550 / 660–700 GHz allow short-range work and astronomy from high dry sites (Atacama, South Pole). Rain absorbs heavily; metal walls reflect; many plastics (PE, PTFE) and dry paper/cardboard are partially transparent — basis for THz imaging / security scanning"
    safety_exposure_limits: "ICNIRP 2020 and IEEE C95.1-2019 general-public power-density limit 10 W/m<sup>2</sup> (1 mW/cm<sup>2</sup>) above 30 GHz, with stricter local-incident-power-density (LIPD) limit at the surface. Energy is deposited in outer skin / cornea (μm-mm depth) — never look down a fed waveguide or active QCL aperture"
    technologies_example_devices: "THz time-domain spectrometers (Toptica TeraFlash, Menlo TERA K15, TeraView TPS), quantum cascade lasers (Daylight Solutions, IRsweep), airport mmWave / THz body scanners (L3Harris ProVision), ALMA / IRAM / SMA / SOFIA radio astronomy, 6G research links (140 / 220 / 300 GHz)"
    hobbyist_project_ideas: "Read and analyse public ALMA / IRAM / SOFIA archive data (millimeter-wave spectroscopy of star-forming regions); follow 6G D-band / sub-THz research papers (3GPP TR 38.820, IEEE 802.15.3d, ETSI ISG mWT); experiment with VDI WR-3 sources and Schottky-diode detectors at the high-end-hobbyist level (single-digit-thousand-USD budget for entry-level); read THz-TDS pharmaceutical case studies for material-science context"
    sources_citations: "ITU-R Radio Regulations RR 5.149 / 5.340 / 5.564A / 5.565, FCC Spectrum Horizons NPRM (95–275 GHz), 3GPP TR 38.820 (6G), IEEE 802.15.3d (THz), ALMA / IRAM publications, ICNIRP 2020 guidelines, Virginia Diodes Inc. application notes (2026)"
    usability_badge: "🟡 Licensed / Mobile (receive-only for hobbyists)"

  - frequency_range: "3 THz – 100 THz (100 μm – 3 μm; Mid-Infrared / Long-Wave Infrared / Thermal)"
    key_frequencies_channels: "LWIR thermal imaging window 8–14 μm (21–37 THz, peak room-temperature blackbody); MWIR 3–8 μm (37–100 THz, hot-object / missile-seeker / gas-sensing window); CO₂ laser 10.6 μm (28.3 THz, industrial cutting / medical); CO laser 5 μm; HF / DF lasers; gas-spectroscopy lines (CO₂ 4.3 μm, CH₄ 3.3 μm, H₂O multiple, N₂O 4.5 μm, NO 5.3 μm, O₃ 9.6 μm); ATR-FTIR fingerprint region 2.5–25 μm; Sentinel-3 SLSTR thermal-IR Earth observation channels 8.7 / 10.85 / 12 μm"
    band_name_designation: "Mid-Infrared / Long-Wave Infrared (MIR / LWIR / 'thermal IR')"
    primary_uses_hobbyist_relevance: "Thermal imaging (the canonical MIR application — every warm object emits Planck blackbody radiation peaking at 8–14 μm), gas sensing (CO₂, CH₄, CO, NO, O₃), medical thermography, industrial process control, IR spectroscopy (FTIR fingerprint region), CO₂ laser cutting / engraving, missile / fire-detection sensors"
    hardware_modules: "Uncooled microbolometer thermal cameras: FLIR ONE Pro / Edge Pro (smartphone-attached, 19 200 px), Seek Thermal CompactPRO (320×240), Hti-Xintai HT-19 / HT-A2 (256×192), Topdon TC001 / TC002 (USB-C 256×192), InfiRay P2 Pro (256×192), Teledyne FLIR E54 / E96 (640×480, lab-grade); thermal cameras for drones (DJI Mavic 3T, Autel EVO II Dual 640T); MWIR cooled InSb / MCT cameras (FLIR X6900sc, Teledyne FLIR Tau 2 + cooler); FTIR spectrometers (Bruker INVENIO, Thermo Nicolet iS50, Agilent Cary 630); CO₂ lasers (10.6 μm, 30–150 W) for laser cutters (Glowforge, Thunder Laser, K40 hobbyist); NDIR CO₂ sensors (Sensirion SCD30 / SCD41, MH-Z19, Senseair S8); IR LEDs / lasers in MWIR (3.3 / 4.3 μm) for gas sensing"
    antenna_diy_considerations: "No 'antenna' in the radio sense — at MIR / LWIR everything is optical. Lenses (germanium, ZnSe, BaF₂, Si — Ge is the workhorse for 8–14 μm thermal lenses; ZnSe transmits 0.6–18 μm and is used in CO₂ laser optics); microbolometer arrays (vanadium-oxide VOx or amorphous silicon a-Si on MEMS suspended membrane); Cassegrain telescope optics for long-range thermal; gold-coated mirrors for >95 % reflectance in MIR; PE windows for low-cost LWIR sensor enclosures (transparent in 8–14 μm)"
    legal_licensing_notes: "No ITU radio allocation (optical / non-ionising). EAR / ITAR controls on high-resolution / cooled-MWIR thermal imagers (>30 Hz frame rate, >640×480 pixels, certain f-stops) — affects export of pro-grade gear. CO₂ lasers covered by IEC 60825 laser-safety classification (Class 4 for cutting machines = full enclosure required). Industrial / medical use governed by IEC / ISO product standards"
    max_power_restrictions_eirp: "Thermal imagers: passive only, no TX. CO₂ lasers: 30–150 W typical hobbyist, 1–10 kW industrial; ICNIRP MPE for 10.6 μm laser is 100 W/m<sup>2</sup> for skin / 1000 W/m<sup>2</sup> for eye (averaged); always Class-4 enclosed. NDIR / IR LED gas sensors: <1 W. Hobbyists are usually passive (thermography) or Class-4-enclosed (laser cutters)"
    propagation_interference_notes: "Atmospheric windows: 3–5 μm (MWIR, used by missile seekers and Earth observation), 8–14 μm (LWIR, used by thermal cameras); strong absorption between (CO₂ 4.3 μm, H₂O 6.3 μm, O₃ 9.6 μm). Range limited to 100s of meters for high-resolution imaging in clear air; blocked by water vapor, fog, smoke, and most plastics. Glass blocks LWIR (windows are opaque to thermal cameras — except Ge / ZnSe lenses)"
    safety_exposure_limits: "ICNIRP 2020 / IEC 60825 laser-safety standards; CO₂ laser cutters mandate full enclosure interlocks. Thermal imaging itself is passive and safe. Eye safety: MPE depends on wavelength and exposure time — corneal absorption dominates above 1.4 μm"
    technologies_example_devices: "Microbolometer thermal cameras (FLIR, Seek, Hti, InfiRay, Topdon), cooled MWIR / LWIR cameras (Teledyne FLIR Tau 2, ThermoVision Sentry), FTIR spectrometers, CO₂ laser cutters (40 W K40 hobbyist → 150 W Glowforge → 4 kW industrial), NDIR CO₂ / CO / CH₄ gas sensors (Sensirion SCD41, MH-Z19, Senseair S8), thermal-imaging satellites (Landsat-9 TIRS, Sentinel-3 SLSTR), pyroelectric motion sensors (PIR 'passive infrared'), security PIR alarms"
    hobbyist_project_ideas: "Build an Arduino + AMG8833 (8×8 thermal sensor) or Seek Thermal SDK app for live thermography; use a Topdon TC001 + smartphone to inspect home insulation and find heat leaks; build a CO₂ NDIR meter with Sensirion SCD41 + ESP32 + InfluxDB / Grafana; experiment with CO₂ laser engraving on the K40 hobbyist platform (with proper Class-4 enclosure and ventilation); decode Sentinel-3 SLSTR thermal-IR data with Python + xarray for an Earth-observation project"
    sources_citations: "ICNIRP 2020 + IEC 60825 (laser safety), EAR Cat. 6A003 / ITAR Cat. XII (thermal imaging export controls), FLIR / Teledyne datasheets, Sensirion / MH-Z19 / Senseair NDIR app notes, ESA Sentinel-3 SLSTR docs, NIST FTIR reference data, Optica / SPIE publications (2026)"
    usability_badge: "🟢 Public / Natural"

  - frequency_range: "100 THz – 400 THz (3 μm – 750 nm; Near-Infrared / IR-A / SWIR / Fiber-optic comms)"
    key_frequencies_channels: "SWIR 1.4–3 μm (100–214 THz, water-feature / agriculture); IR-A (CIE) 0.7–1.4 μm (214–430 THz, near-IR human-eye-invisible). Fiber-optic O-band 1260–1360 nm (1310 nm zero-dispersion), E-band 1360–1460 nm, S-band 1460–1530 nm, C-band 1530–1565 nm (1550 nm long-haul DWDM, EDFA gain peak), L-band 1565–1625 nm, U-band 1625–1675 nm; 850 nm multimode fiber (10G / 25G / 100G short-reach); consumer IR remotes 940 / 950 / 980 nm; IR proximity sensors 940 nm; LiDAR 905 / 1550 nm (autonomous vehicles); night-vision IR illuminators 850 / 940 nm; medical pulse oximetry 660 / 940 nm"
    band_name_designation: "Near-Infrared / IR-A / SWIR / Fiber-optic communications band"
    primary_uses_hobbyist_relevance: "Fiber-optic networking (literally every backbone, datacenter, and FTTH link), TV / AC / set-top remotes (940 nm IR), smartphone proximity sensors (940 nm), face-ID dot projectors (Apple TrueDepth at 940 nm), night-vision and security cameras (850 / 940 nm illumination), LiDAR for self-driving cars (905 nm InGaAs SPAD or 1550 nm fiber laser), pulse oximeters, hyperspectral agriculture / mineral imaging (SWIR)"
    hardware_modules: "Fiber transceivers (SFP+ 10G-LR 1310 nm, SFP-100G-LR4 1300-band CWDM, QSFP-DD 400G FR4 / LR4); 850 nm VCSEL multimode (SFP-10G-SR / 25G-SR); BiDi / WDM PON modules (10G-EPON, XGS-PON 1577 nm down / 1270 nm up); fiber test gear (OTDR, optical power meter, visual fault locator); IR LEDs (Vishay TSAL6200 940 nm, Osram SFH 4715 850 nm); IR sensors / phototransistors (Vishay TSOP4838 38 kHz IR receiver); ESP32 + IR diode for universal remote; smartphone night-vision filter mods; LiDAR modules (Velodyne, Ouster, Innoviz, Garmin LIDAR-Lite); SWIR cameras (Sony IMX990 / IMX991 InGaAs sensor at $$$, low-cost OV2640 CMOS sees up to ~1.0 μm); NIR spectrometers (Hamamatsu micro-spectrometer modules C13554MA)"
    antenna_diy_considerations: "Optical not radio — design is in lenses, fibers, and detectors. Single-mode fiber (9 μm core, ITU-T G.652D); multimode OM3 / OM4 / OM5 (50 μm core); ribbon fiber for parallel transceivers; lens systems (achromatic doublets, aspherics in plastic for IR remotes); collimators (1 / 4-pitch GRIN lens for fiber); reflectors / TIR optics on commodity IR LEDs"
    legal_licensing_notes: "No ITU radio allocation (optical). Fiber-optic standards: ITU-T G.652–G.657 single-mode, IEC 60793 / 60794. Free-space optics (FSO) > Class-1 / 1M usually subject to IEC 60825 laser-safety classification. Eye-safety classes: Class 1 (safe under all conditions), Class 1M (safe except with optics), Class 2 / 3R / 3B / 4. LiDAR 905 nm typically Class 1 (eye-safe) with averaging; 1550 nm fiber lasers benefit from corneal absorption → higher allowed power for similar eye-safety class. EAR / ITAR controls on high-end SWIR cameras (Sony IMX990 InGaAs 0.4–1.7 μm)"
    max_power_restrictions_eirp: "Fiber-optic transceivers: 0.1–10 mW typical (-10 to +10 dBm). DWDM transponders: up to 23 dBm (200 mW) per channel. Free-space optical comms 10 mW – 1 W (Class 1M / 3R). LiDAR 905 nm: 100 W peak / 1–10 mW avg (Class 1 by averaging). IR remote LEDs: 50–500 mW peak. CO₂ laser cutters covered in previous row. Eye-safety dominates over RF-style EIRP limits"
    propagation_interference_notes: "Excellent atmospheric windows around 1.0 / 1.3 / 1.55 μm (telecom windows); some absorption at 1.39 μm (water 'OH peak' in fiber, suppressed by modern G.652D 'low-water-peak'). Free-space short-haul (campus FSO, building-to-building) limited by fog (worse than rain), atmospheric scintillation, and pointing stability. IR remotes line-of-sight or single-bounce off white walls; smartphone cameras can see IR remote LEDs (selfie cam often has weaker IR filter)"
    safety_exposure_limits: "IEC 60825 laser-safety + ICNIRP 2013 NIR exposure limits. Most commercial fiber transceivers are Class 1 / 1M (eye-safe under normal use). LiDAR is engineered for Class 1 by pulse / averaging. Never look directly into a powered SFP+ or DWDM transponder — even Class 1 sources can damage the retina if focused by an objective lens (Class 1M)"
    technologies_example_devices: "Fiber-optic Internet (FTTH GPON / XGS-PON, datacenter 10G/25G/100G/400G, terrestrial DWDM long-haul, transatlantic submarine cables), TV remotes (NEC, RC-5, RC-6 IR protocols), smartphone proximity / face-ID, IR night-vision (illuminator + CCD/CMOS without IR-cut filter), LiDAR (Waymo, Cruise, Tesla 'HW4' camera-only is the exception, Velodyne Alpha Prime), pulse oximetry, hyperspectral imaging (PRISMA, EnMAP)"
    hobbyist_project_ideas: "Decode IR remote codes with a 38 kHz TSOP4838 + Arduino + IRremote library; build a learning IR remote with an ESP32 + IR LED + smartphone web UI; attempt building-to-building FSO with a 1550 nm collimated laser + photodiode (5–50 m hobbyist range); set up an SFP fiber loopback test rig for OTDR practice; mod a webcam to remove the IR-cut filter for cheap NIR photography; build a pulse oximeter with a MAX30102 + ESP32; survey reflectance at 940 nm to map biological 'visible to IR' anomalies (Wood-effect photography)"
    sources_citations: "ITU-T G.652 / G.654 / G.657 (single-mode fiber), IEC 60825 (laser safety), ICNIRP 2013 NIR exposure guidelines, IEEE 802.3 (Ethernet over fiber), ANSI Z136 laser safety, Hamamatsu / Sony / Vishay datasheets, Optica / SPIE publications, ITU-T G.989 (NG-PON2) (2026)"
    usability_badge: "🟢 Public / Natural"

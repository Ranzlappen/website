---
# =============================================================================
# Spectrum Batch 08 — Visible / Ultraviolet / X-ray / Gamma (400 THz to thousands of THz / PHz–EHz range)
# =============================================================================

batch:
  id: "visible-uv-xray-gamma"
  order: 8
  name: "Visible / Ultraviolet / X-ray / Gamma (400 THz to thousands of THz / PHz–EHz range)"
  short_name: "Visible / UV / X-ray / Gamma"
  description: >
    The optical and high-energy part of the electromagnetic spectrum. These short wavelengths interact strongly with matter and are used for vision, medical imaging, sterilization, astronomy, and particle physics. Propagation is line-of-sight with significant absorption in air and materials.
  last_updated: "2026-05-06"

bands:
  - frequency_range: "400 THz – 750 THz"
    band_name: "Visible Light"
    wavelength: "\~750 nm – 400 nm"
    photon_energy: "\~1.65 eV – 3.1 eV"
    common_names: "Visible spectrum, optical light, ROYGBIV"
    applications:
      - "Human vision and photography"
      - "Lighting and displays"
      - "Optical microscopy and telescopes"
      - "Laser-based communications and holography"
    technologies: "LEDs, lasers, cameras, telescopes, optical fibers"
    propagation: "Line-of-sight through transparent media. Strong absorption by pigments and materials."
    regulatory: "No radio allocation. Governed by optical standards."
    notes: "The only part of the electromagnetic spectrum detectable by the human eye. The basis of all color vision and most everyday optical technology."

  - frequency_range: "750 THz – 30 PHz"
    band_name: "Ultraviolet (UV)"
    wavelength: "\~400 nm – 10 nm"
    photon_energy: "\~3.1 eV – 124 eV"
    common_names: "UV-A, UV-B, UV-C, extreme UV (EUV)"
    applications:
      - "Sterilization and germicidal lamps"
      - "Fluorescence and black-light effects"
      - "Lithography in semiconductor manufacturing"
      - "Astronomy and space observation"
    technologies: "UV lamps, excimer lasers, UV LEDs, EUV lithography machines"
    propagation: "Strongly absorbed by the atmosphere (ozone layer) and most materials. Line-of-sight only."
    regulatory: "No radio allocation. Regulated for safety (eye/skin damage) and industrial use."
    notes: "UV-B causes sunburn; UV-C is germicidal. EUV is critical for modern chip manufacturing."

  - frequency_range: "30 PHz – thousands of THz (PHz–EHz)"
    band_name: "X-ray / Gamma Ray"
    wavelength: "\~10 nm – picometers and smaller"
    photon_energy: "\~124 eV – MeV and higher"
    common_names: "Soft/hard X-rays, gamma rays"
    applications:
      - "Medical and dental X-ray imaging"
      - "Airport security scanners and industrial radiography"
      - "Astronomy (X-ray and gamma-ray telescopes)"
      - "Cancer radiotherapy and nuclear medicine (PET scans)"
    technologies: "X-ray tubes, CT scanners, synchrotron light sources, gamma cameras, space-based X-ray/gamma telescopes"
    propagation: "Highly penetrating; absorbed by dense materials. Requires vacuum or special windows in air."
    regulatory: "Strict safety regulations (radiation protection). No radio allocation."
    notes: "Gamma rays are the highest-energy photons. Used in astrophysics to study black holes, supernovae, and the early universe."

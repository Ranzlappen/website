# Deploy Firebase resources (Firestore rules/indexes, Realtime Database rules,
# and the castBlogVote Cloud Function) on pushes to main that touch the
# relevant files.
name: Deploy Firebase

on:
  push:
    branches: ["main"]
    paths:
      - 'polyvote/database.rules.json'
      - 'polyvote/firestore.rules'
      - 'polyvote/firestore.indexes.json'
      - 'polyvote/storage.rules'
      - 'polyvote/firebase.json'
      - 'polyvote/.firebaserc'
      - 'polyvote/functions/src/**'
      - 'polyvote/functions/package.json'
      - 'polyvote/functions/package-lock.json'
      - 'polyvote/functions/tsconfig.json'
      - '.github/workflows/firebase-deploy.yml'
  workflow_dispatch:

concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: polyvote/functions/package-lock.json

      - name: Cloud Functions – Install dependencies
        working-directory: polyvote/functions
        run: npm ci

      - name: Cloud Functions – Build
        working-directory: polyvote/functions
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is not set"
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Deploy Firestore + Realtime Database + Storage rules + Cloud Functions
        working-directory: polyvote
        run: |
          TARGETS="database,firestore,storage"
          TARGETS="$TARGETS,functions:castBlogVote"
          TARGETS="$TARGETS,functions:blogSaveDraft,functions:blogListDrafts,functions:blogGetDraft,functions:blogDeleteDraft"
          TARGETS="$TARGETS,functions:blogListExistingPosts,functions:blogFetchExistingPost,functions:blogImportPostForEdit"
          TARGETS="$TARGETS,functions:blogPublishToGitHub,functions:blogUploadImage"
          TARGETS="$TARGETS,functions:blogListSeriesUsage"
          TARGETS="$TARGETS,functions:setUserRole,functions:adminListUsers,functions:adminBanUser,functions:adminUnbanUser"
          TARGETS="$TARGETS,functions:inventoryListFolders,functions:inventoryCreateFolder,functions:inventoryUpdateFolder,functions:inventoryDeleteFolder,functions:inventoryDuplicateFolder"
          TARGETS="$TARGETS,functions:inventoryListItems,functions:inventoryGetItem,functions:inventoryCreateItem,functions:inventoryUpdateItem,functions:inventoryDeleteItem,functions:inventoryToggleEbaySync,functions:inventoryDuplicateItem,functions:inventoryBulkUpdate"
          # inventoryListDriveFolder is NOT auto-deployed because it declares
          # GOOGLE_DRIVE_API_KEY via defineSecret(). Firebase refuses to deploy
          # a function whose secret isn't set yet when running non-interactively.
          # One-time setup in inventory-manager/README.md, then deploy it via:
          #   firebase deploy --only functions:inventoryListDriveFolder
          # …or trigger firebase-deploy-manual.yml with that target string.
          TARGETS="$TARGETS,functions:inventoryUploadPhoto,functions:inventoryDeletePhoto,functions:inventoryReorderPhotos,functions:inventoryImportPhotoFromUrl"
          TARGETS="$TARGETS,functions:inventoryImport,functions:inventoryExport,functions:inventoryExportEbayCsv"
          TARGETS="$TARGETS,functions:inventoryFindByEan,functions:inventorySearchItems"
          TARGETS="$TARGETS,functions:inventoryListDeleted,functions:inventoryRestoreItem,functions:inventoryRestoreFolder,functions:inventoryPurgeDeleted"
          firebase deploy --only "$TARGETS" --non-interactive --force

# Enables GitHub native auto-merge on every Dependabot PR. The PR sits in
# "Auto-merge enabled" state and lands once all required status checks on
# `main` go green. `gh pr merge --auto` is a no-op unless branch
# protection requires checks — see CLAUDE.md "Auto-merge" notes.
name: Dependabot auto-merge

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

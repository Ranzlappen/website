# Enables GitHub native auto-merge on every Dependabot PR. The PR sits in
# "Auto-merge enabled" state and lands once all required status checks on
# `main` go green. `gh pr merge --auto` is a no-op unless branch
# protection requires checks — see CLAUDE.md "Auto-merge" notes.
name: Dependabot auto-merge

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Filter on the PR author (immutable, set at PR creation), not
    # `github.actor` — the latter is whoever triggered the *current*
    # event, so it becomes the human's login the moment someone clicks
    # "Update branch" or "Re-run jobs", and the job silently skips.
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2.5.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

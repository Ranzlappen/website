# Lint, test, and build checks for pull requests.
# Jobs are split by app and gated on path filters so a PR only runs the
# checks for the app(s) it actually touches. The `ci-required`
# aggregator at the bottom is the single status check branch protection
# should require — it correctly handles skipped jobs from the path
# filters.
name: CI

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      polyvote: ${{ steps.filter.outputs.polyvote }}
      functions: ${{ steps.filter.outputs.functions }}
      blog-admin: ${{ steps.filter.outputs.blog-admin }}
      inventory-manager: ${{ steps.filter.outputs.inventory-manager }}
      search-crawler: ${{ steps.filter.outputs.search-crawler }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            polyvote:
              - 'polyvote/**'
              - '!polyvote/functions/**'
              - '!polyvote/README.md'
              - '!polyvote/.gitignore'
              - '!polyvote/.firebaserc'
              - '!polyvote/firebase.json'
              - '!polyvote/database.rules.json'
              - '!polyvote/firestore.rules'
              - '!polyvote/firestore.indexes.json'
              - '!polyvote/storage.rules'
              - '.github/workflows/ci.yml'
            functions:
              - 'polyvote/functions/**'
              - '!polyvote/functions/README.md'
              - '.github/workflows/ci.yml'
            blog-admin:
              - 'blog-admin/**'
              - '!blog-admin/.gitignore'
              - '!blog-admin/README.md'
              - '.github/workflows/ci.yml'
            inventory-manager:
              - 'inventory-manager/**'
              - '!inventory-manager/.gitignore'
              - '!inventory-manager/README.md'
              - '.github/workflows/ci.yml'
            search-crawler:
              - 'search-crawler/**'
              - '!search-crawler/.gitignore'
              - '!search-crawler/README.md'
              - '.github/workflows/ci.yml'

  polyvote:
    needs: changes
    if: needs.changes.outputs.polyvote == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: polyvote/package-lock.json

      - name: Install dependencies
        working-directory: polyvote
        run: npm ci

      - name: Lint
        working-directory: polyvote
        run: npm run lint

      - name: Test
        working-directory: polyvote
        run: npm test

      - name: Build
        working-directory: polyvote
        run: npm run build

  functions:
    needs: changes
    if: needs.changes.outputs.functions == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: polyvote/functions/package-lock.json

      - name: Install dependencies
        working-directory: polyvote/functions
        run: npm ci

      - name: Lint
        working-directory: polyvote/functions
        run: npm run lint

      - name: Test
        working-directory: polyvote/functions
        run: npm test

  blog-admin:
    needs: changes
    if: needs.changes.outputs.blog-admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: blog-admin/package-lock.json

      - name: Install dependencies
        working-directory: blog-admin
        run: npm ci

      - name: Lint
        working-directory: blog-admin
        run: npm run lint

      - name: Build
        working-directory: blog-admin
        run: npm run build

  inventory-manager:
    needs: changes
    if: needs.changes.outputs.inventory-manager == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: inventory-manager/package-lock.json

      - name: Install dependencies
        working-directory: inventory-manager
        run: npm ci

      - name: Lint
        working-directory: inventory-manager
        run: npm run lint

      - name: Build
        working-directory: inventory-manager
        run: npm run build

  search-crawler:
    needs: changes
    if: needs.changes.outputs.search-crawler == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Lint (syntax check)
        working-directory: search-crawler
        run: npm run lint

  # Aggregator: single required-check candidate for branch protection.
  # Runs after every app job and fails if any failed. Treats `skipped`
  # as a pass so PRs that don't touch a given app aren't blocked. Mark
  # this job (`ci-required`) as the required status check on `main`.
  ci-required:
    needs: [changes, polyvote, functions, blog-admin, inventory-manager, search-crawler]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all CI jobs passed (or skipped cleanly)
        run: |
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "changes job did not succeed: ${{ needs.changes.result }}"
            exit 1
          fi
          for r in "${{ needs.polyvote.result }}" "${{ needs.functions.result }}" "${{ needs.blog-admin.result }}" "${{ needs.inventory-manager.result }}" "${{ needs.search-crawler.result }}"; do
            case "$r" in
              success|skipped) ;;
              *) echo "App job did not succeed: $r"; exit 1 ;;
            esac
          done
          echo "All CI checks passed."

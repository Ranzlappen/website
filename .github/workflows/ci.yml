# Lint, test, and build checks for pull requests
name: CI

on:
  pull_request:
    branches: ["main"]
    paths-ignore:
      - 'README.md'
      - 'CLAUDE.md'
      - 'LICENSE'
      - '.gitignore'
      - 'polyvote/README.md'
      - 'polyvote/.gitignore'
      - 'polyvote/.firebaserc'
      - 'polyvote/firebase.json'
      - 'polyvote/firestore.rules'
      - 'polyvote/firestore.indexes.json'
      - 'blog-admin/.gitignore'

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            polyvote/package-lock.json
            polyvote/functions/package-lock.json
            blog-admin/package-lock.json

      # ── PolyVote ──
      - name: PolyVote – Install dependencies
        working-directory: polyvote
        run: npm ci

      - name: PolyVote – Lint
        working-directory: polyvote
        run: npm run lint

      - name: PolyVote – Test
        working-directory: polyvote
        run: npm test

      - name: PolyVote – Build
        working-directory: polyvote
        run: npm run build

      # ── Cloud Functions ──
      - name: Cloud Functions – Install dependencies
        working-directory: polyvote/functions
        run: npm ci

      - name: Cloud Functions – Lint
        working-directory: polyvote/functions
        run: npm run lint

      - name: Cloud Functions – Test
        working-directory: polyvote/functions
        run: npm test

      # ── Blog Admin ──
      - name: Blog Admin – Install dependencies
        working-directory: blog-admin
        run: npm ci

      - name: Blog Admin – Lint
        working-directory: blog-admin
        run: npm run lint

      - name: Blog Admin – Build
        working-directory: blog-admin
        run: npm run build

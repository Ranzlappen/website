# Lint, test, and build checks for pull requests.
# Jobs are split by app and gated on path filters so a PR only runs the
# checks for the app(s) it actually touches.
name: CI

on:
  pull_request:
    branches: ["main"]
    # Positive filter: CI only exists for the app modules. Anything outside
    # polyvote/ and blog-admin/ (blog content, Jekyll config, other workflows,
    # root docs) cannot affect these jobs, so it's excluded by omission.
    # The `!` entries below carve out files inside the app dirs that also
    # shouldn't trigger (docs, Firebase config, lint/format settings).
    paths:
      - 'polyvote/**'
      - 'blog-admin/**'
      - '.github/workflows/ci.yml'
      - '!**/README.md'
      - '!**/.gitignore'
      - '!polyvote/.firebaserc'
      - '!polyvote/firebase.json'
      - '!polyvote/firestore.rules'
      - '!polyvote/firestore.indexes.json'
      - '!polyvote/database.rules.json'
      - '!polyvote/.prettierrc'

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      polyvote: ${{ steps.filter.outputs.polyvote }}
      functions: ${{ steps.filter.outputs.functions }}
      blog-admin: ${{ steps.filter.outputs.blog-admin }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            polyvote:
              - 'polyvote/**'
              - '!polyvote/functions/**'
              - '!polyvote/README.md'
              - '!polyvote/.gitignore'
              - '!polyvote/.firebaserc'
              - '!polyvote/firebase.json'
              - '!polyvote/database.rules.json'
              - '!polyvote/firestore.rules'
              - '!polyvote/firestore.indexes.json'
              - '.github/workflows/ci.yml'
            functions:
              - 'polyvote/functions/**'
              - '!polyvote/functions/README.md'
              - '.github/workflows/ci.yml'
            blog-admin:
              - 'blog-admin/**'
              - '!blog-admin/.gitignore'
              - '!blog-admin/README.md'
              - '.github/workflows/ci.yml'

  polyvote:
    needs: changes
    if: needs.changes.outputs.polyvote == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: polyvote/package-lock.json

      - name: Install dependencies
        working-directory: polyvote
        run: npm ci

      - name: Lint
        working-directory: polyvote
        run: npm run lint

      - name: Test
        working-directory: polyvote
        run: npm test

      - name: Build
        working-directory: polyvote
        run: npm run build

  functions:
    needs: changes
    if: needs.changes.outputs.functions == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: polyvote/functions/package-lock.json

      - name: Install dependencies
        working-directory: polyvote/functions
        run: npm ci

      - name: Lint
        working-directory: polyvote/functions
        run: npm run lint

      - name: Test
        working-directory: polyvote/functions
        run: npm test

  blog-admin:
    needs: changes
    if: needs.changes.outputs.blog-admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: blog-admin/package-lock.json

      - name: Install dependencies
        working-directory: blog-admin
        run: npm ci

      - name: Lint
        working-directory: blog-admin
        run: npm run lint

      - name: Build
        working-directory: blog-admin
        run: npm run build

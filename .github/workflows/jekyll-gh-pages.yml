# Build Jekyll blog, PolyVote, and Blog Admin, then deploy to GitHub Pages.
# Lint/test validation is handled by ci.yml on PRs; this workflow only
# produces and deploys the site artifact.
name: Build and Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
    paths-ignore:
      # Docs / meta (never affect the built site)
      - 'README.md'
      - 'CLAUDE.md'
      - 'LICENSE'
      - '.gitignore'
      - 'polyvote/README.md'
      - 'polyvote/.gitignore'
      - 'polyvote/.prettierrc'
      - 'blog-admin/README.md'
      - 'blog-admin/.gitignore'
      - 'inventory-manager/README.md'
      - 'inventory-manager/.gitignore'
      - 'games/README.md'
      - 'games/.gitignore'
      - 'games/docs/**'
      # Firebase resources (deployed by firebase-deploy.yml, not bundled into the site)
      - 'polyvote/.firebaserc'
      - 'polyvote/firebase.json'
      - 'polyvote/firestore.rules'
      - 'polyvote/firestore.indexes.json'
      - 'polyvote/storage.rules'
      - 'polyvote/database.rules.json'
      - 'polyvote/functions/**'
      # Sibling workflows + Dependabot config (don't affect Pages)
      - '.github/dependabot.yml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/firebase-deploy.yml'
      - '.github/workflows/search-crawl.yml'
      # Search crawler source (build tooling; its output search-external.json
      # lives at repo root and is NOT ignored, so a re-crawl still deploys)
      - 'search-crawler/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            polyvote/package-lock.json
            blog-admin/package-lock.json
            inventory-manager/package-lock.json
            games/package-lock.json

      - name: PolyVote – Install dependencies
        working-directory: polyvote
        run: npm ci

      - name: PolyVote – Build
        working-directory: polyvote
        run: npm run build

      - name: Blog Admin – Install dependencies
        working-directory: blog-admin
        run: npm ci

      - name: Blog Admin – Build
        working-directory: blog-admin
        run: npm run build

      - name: Inventory Manager – Install dependencies
        working-directory: inventory-manager
        run: npm ci

      - name: Inventory Manager – Build
        working-directory: inventory-manager
        run: npm run build

      - name: Games – Install dependencies
        working-directory: games
        run: npm ci

      - name: Games – Build
        working-directory: games
        run: npm run build

      - name: Copy PolyVote into _site
        run: |
          sudo chown -R $(whoami) _site
          cp -r polyvote/dist _site/polyvote

      - name: Copy Blog Admin into _site
        run: cp -r blog-admin/dist _site/blog-admin

      - name: Copy Inventory Manager into _site
        run: cp -r inventory-manager/dist _site/inventory

      - name: Copy Games into _site
        run: cp -r games/dist _site/games

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - 'polyvote/README.md'
      - 'polyvote/.gitignore'
      - 'polyvote/.firebaserc'
      - 'polyvote/firebase.json'
      - 'polyvote/firestore.rules'
      - 'polyvote/firestore.indexes.json'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: polyvote/package-lock.json
      - name: PolyVote – Install dependencies
        run: |
          cd polyvote
          npm ci
      - name: PolyVote – Audit dependencies
        run: |
          cd polyvote
          npm audit --audit-level=high || true
      - name: PolyVote – Lint
        run: |
          cd polyvote
          npm run lint
      - name: PolyVote – Test
        run: |
          cd polyvote
          npm test
      - name: PolyVote – Build
        run: |
          cd polyvote
          npm run build
      - name: Copy PolyVote into _site
        run: |
          cp -r polyvote/dist _site/polyvote
          cp _site/polyvote/index.html _site/polyvote/404.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

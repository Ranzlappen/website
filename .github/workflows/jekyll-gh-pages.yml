# Build Jekyll blog, PolyVote, and Blog Admin, then deploy to GitHub Pages.
# Lint/test validation is handled by ci.yml on PRs; this workflow only
# produces and deploys the site artifact.
name: Build and Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'README.md'
      - 'CLAUDE.md'
      - 'LICENSE'
      - '.gitignore'
      - 'polyvote/README.md'
      - 'polyvote/.gitignore'
      - 'polyvote/.firebaserc'
      - 'polyvote/firebase.json'
      - 'polyvote/firestore.rules'
      - 'polyvote/firestore.indexes.json'
      - 'polyvote/database.rules.json'
      - 'polyvote/functions/**'
      - 'blog-admin/README.md'
      - 'blog-admin/.gitignore'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            polyvote/package-lock.json
            blog-admin/package-lock.json

      - name: PolyVote – Install dependencies
        working-directory: polyvote
        run: npm ci

      - name: PolyVote – Build
        working-directory: polyvote
        run: npm run build

      - name: Blog Admin – Install dependencies
        working-directory: blog-admin
        run: npm ci

      - name: Blog Admin – Build
        working-directory: blog-admin
        run: npm run build

      - name: Copy PolyVote into _site
        run: |
          sudo chown -R $(whoami) _site
          cp -r polyvote/dist _site/polyvote

      - name: Copy Blog Admin into _site
        run: cp -r blog-admin/dist _site/blog-admin

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

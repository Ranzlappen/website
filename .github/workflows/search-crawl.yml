# Manual re-crawl of the external search index (search-external.json).
# Runs the dependency-free search-crawler module, then opens a pull request
# with the refreshed index (main is a protected branch, so we never push to
# it directly). Trigger via the Actions "Run workflow" button whenever you
# want a refresh; review + merge the PR to ship it (merging triggers the
# normal Pages deploy).
#
# The PR is opened with the pre-installed GitHub CLI (gh) — no third-party
# action to download — pushing a side branch and calling `gh pr create`.
#
# One-time setup: Settings > Actions > General > Workflow permissions >
# "Allow GitHub Actions to create and approve pull requests" must be enabled,
# or `gh pr create` is rejected. If it is off, the PR step does NOT fail the
# run — the crawl + branch push already succeeded, so it falls back to printing
# a compare link in the job summary for you to open the PR manually.
#
# Note: the PR is opened with the built-in GITHUB_TOKEN, so CI does not auto-
# run on it (a GITHUB_TOKEN-authored PR cannot trigger other workflows). The
# change is data-only (search-external.json), so just merge the PR yourself.
name: Re-crawl external search index

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: search-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Crawl
        working-directory: search-crawler
        env:
          # Auto-provided token raises the GitHub API rate limit 60 -> 5000/hr.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run crawl

      - name: Open PR with refreshed index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- search-external.json; then
            echo "No changes to search-external.json; nothing to open."
            exit 0
          fi
          BRANCH="chore/search-index-refresh"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add search-external.json
          git commit -m "chore: re-crawl external search index"
          git push --force-with-lease origin "$BRANCH"

          COMPARE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/main...${BRANCH}?expand=1"

          if [ -n "$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[].number')" ]; then
            echo "PR already open for $BRANCH; pushed the update to it."
            exit 0
          fi

          # Opening a PR with the built-in GITHUB_TOKEN requires Settings >
          # Actions > General > Workflow permissions > "Allow GitHub Actions to
          # create and approve pull requests". If that is off, `gh pr create` is
          # rejected. The crawl + branch push above already succeeded, so treat
          # a PR-open failure as non-fatal: surface a compare link and keep the
          # run green instead of stranding the pushed branch behind a red job.
          if gh pr create --base main --head "$BRANCH" \
              --title "chore: re-crawl external search index" \
              --body "Automated refresh of \`search-external.json\` by the **Re-crawl external search index** workflow. Merge to ship the updated cross-domain search index (merging triggers the normal Pages deploy)."; then
            echo "Opened PR for $BRANCH."
          else
            echo "::warning title=PR not opened automatically::Refreshed index was pushed to '$BRANCH', but the PR could not be opened. Enable Settings > Actions > General > Workflow permissions > 'Allow GitHub Actions to create and approve pull requests', or open it manually: $COMPARE_URL"
            {
              echo "### External search index refreshed — open the PR manually"
              echo ""
              echo "The crawl succeeded and the refreshed \`search-external.json\` was pushed to the \`$BRANCH\` branch, but the workflow could not open a pull request automatically (the GITHUB_TOKEN lacks PR-create permission)."
              echo ""
              echo "**To finish:** [open the PR for \`$BRANCH\`]($COMPARE_URL)."
              echo ""
              echo "To let future runs open it automatically, enable **Settings → Actions → General → Workflow permissions → \"Allow GitHub Actions to create and approve pull requests\"**."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

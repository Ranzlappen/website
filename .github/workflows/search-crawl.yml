# Manual re-crawl of the external search index (search-external.json).
# Runs the dependency-free search-crawler module, then opens a pull request
# with the refreshed index (main is a protected branch, so we never push to
# it directly). Trigger via the Actions "Run workflow" button whenever you
# want a refresh; review + merge the PR to ship it (merging triggers the
# normal Pages deploy).
#
# One-time setup: Settings > Actions > General > "Allow GitHub Actions to
# create and approve pull requests" must be enabled.
#
# Note: the PR is opened with the built-in GITHUB_TOKEN, so CI does not auto-
# run on it (a GITHUB_TOKEN-authored PR cannot trigger other workflows). The
# change is data-only (search-external.json), so just merge the PR yourself.
name: Re-crawl external search index

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: search-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Crawl
        working-directory: search-crawler
        env:
          # Auto-provided token raises the GitHub API rate limit 60 -> 5000/hr.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run crawl

      - name: Open PR with refreshed index
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: search-external.json
          branch: chore/search-index-refresh
          delete-branch: true
          commit-message: "chore: re-crawl external search index"
          title: "chore: re-crawl external search index"
          body: |
            Automated refresh of `search-external.json` produced by the
            **Re-crawl external search index** workflow.

            Merge to ship the updated cross-domain search index (merging
            triggers the normal Pages deploy).

# [Status field update] Added status: "published" default for posts.
# Removed jekyll-feed and jekyll-sitemap plugins (replaced by custom
# filtered templates feed.xml and sitemap.xml) to support status filtering.
# ============================================================
# Site Settings
# ============================================================
title: "RanzLappen"
tagline: "Projects, Curiosities & Everything In Between"
description: "A personal blog about passion projects, random experiments, and whatever catches my attention."
url: "https://www.ranzlappen.com"
baseurl: ""
repository: "Ranzlappen/website"

# Author
author:
  name: "RanzLappen"
  email: "info@ranzlappen.com"
  github: "Ranzlappen"
  twitter: "@MatthiasBro"
  linkedin: "matthias-bröring-739505318"
  discord: "ZR39NW4ax"
  reddit: "Blacksun332"
  youtube: "RanzLappen"
  steam: "76561198050017796"

# Build
markdown: kramdown
kramdown:
  input: GFM
  auto_ids: true
  syntax_highlighter: rouge

permalink: /blog/:year/:month/:day/:title/
paginate: 9
paginate_path: "/blog/page:num/"

# Collections & Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      status: "published"
  - scope:
      path: "pages"
      type: "pages"
    values:
      layout: "page"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - LICENSE
  - .gitignore
  - vendor
  - polyvote
  - blog-admin
  - inventory-manager
  - games
  - search-crawler

# Plugins (GitHub Pages compatible)
plugins:
  - jekyll-seo-tag
  - jekyll-paginate

